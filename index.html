<section class="guideHero"><h3>Core idea</h3><p>X-Clash is not only about reaching Castle 30. Real power comes from stacking systems: buildings unlock ceilings, research creates permanent gains, heroes decide damage and formation, gear multiplies the right heroes, and event timing turns the same resources into extra rewards.</p><div class="guideSummary"><div class="guideMini"><b>Build</b><small>Castle, prerequisites, Research Center, barracks, hospitals, economy.</small></div><div class="guideMini"><b>Research</b><small>Permanent strength: speed, economy, troops, march and combat.</small></div><div class="guideMini"><b>Heroes</b><small>Stars, level, skills, shards, roles and faction synergy.</small></div><div class="guideMini"><b>Gear</b><small>Equipment, crystals, scrolls and exclusive shards on the right heroes.</small></div></div></section>
<article class="guideBlock menuGuide"><h3>1. Interface map: profile, titles and buttons</h3><p>The main screen is your command board. Do not treat the icons as decoration: most progress is hidden behind daily clicks, timed rewards and the right menu at the right moment.</p><div class="guideMatrix"><div class="guideMini"><b>Avatar / Home</b><small>Upload avatar, change Traveler name once for free, check level, ID, total power, kills, union, server, rankings, skins, buffs, settings and help.</small></div><div class="guideMini"><b>Server Castle / Titles</b><small>If the ruling union allows it, request timed titles for build, research, resource, healing or training buffs. Prime Minister should be coordinated.</small></div><div class="guideMini"><b>Buff skins</b><small>Avatar frames, castle skins, nameplates, Mystic Beast skins and effects can add ATK, DEF or HP. Beauty is secondary; buffs matter.</small></div><div class="guideMini"><b>Rule</b><small>Before major builds/research: check VS, Arm Race, title buff, union help and resource safety.</small></div></div><div class="menuMap"><div class="menuColumn"><h4>Left side: quick management</h4><div class="menuCard"><span class="menuIcon">🖼️</span><div><b>Avatar / Home</b><small>Profile, ID, server, union, rankings, skins, settings.</small></div></div><div class="menuCard"><span class="menuIcon">⚡</span><div><b>Stamina</b><small>Used for Intel, zombies, beasts and active events. Spend in the right window.</small></div></div><div class="menuCard"><span class="menuIcon">👑</span><div><b>VIP</b><small>Check passive buffs and rewards. Small daily claims add up.</small></div></div><div class="menuCard"><span class="menuIcon">🏗️</span><div><b>Build / Research queues</b><small>Keep queues running; use speedups only when VS/Arm Race makes sense.</small></div></div><div class="menuCard"><span class="menuIcon">🌡️</span><div><b>Season temperature</b><small>Winter heat, furnace, warmth sources and cold-related buffs.</small></div></div><div class="menuCard"><span class="menuIcon">📅</span><div><b>Event calendar</b><small>For R4 also planning and announcements. Always check before spending.</small></div></div><div class="menuCard"><span class="menuIcon">🚚</span><div><b>Wagons</b><small>Send yours, plunder correctly, respect CoK/NAP rules.</small></div></div><div class="menuCard"><span class="menuIcon">🍺</span><div><b>Tavern</b><small>Own quests, support others, treasure digging and map-piece exchanges.</small></div></div><div class="menuCard"><span class="menuIcon">📜</span><div><b>Intel & quests</b><small>Intel, main quests, daily quests and season quests. Often VS-relevant.</small></div></div><div class="menuCard"><span class="menuIcon">💬</span><div><b>Chats & announcements</b><small>Server, union, private, R4/R5 and announcement view.</small></div></div></div><div class="menuColumn"><h4>Bottom row: core systems</h4><div class="menuCard"><span class="menuIcon">🐶</span><div><b>Rescue the dog</b><small>Mini-game; claim rewards when available.</small></div></div><div class="menuCard"><span class="menuIcon">🛡️</span><div><b>Trials</b><small>Adventure, faction trials, summit arena and 3v3. Test teams without troop losses.</small></div></div><div class="menuCard"><span class="menuIcon">🦸</span><div><b>Heroes</b><small>Level, stars, skills, gear, crystals, scrolls and formations.</small></div></div><div class="menuCard"><span class="menuIcon">🤝</span><div><b>Union</b><small>Members, shop, campaign, badges, gifts, tech, help, season contribution, city and logs.</small></div></div><div class="menuCard"><span class="menuIcon">🗺️</span><div><b>World / City</b><small>Switch between map and base. Use for gathering, marches, fights and positioning.</small></div></div></div><div class="menuColumn"><h4>Right side: events and inventory</h4><div class="menuCard"><span class="menuIcon">🛒</span><div><b>Shop</b><small>Purchases. Useful, but never a substitute for timing discipline.</small></div></div><div class="menuCard"><span class="menuIcon">🎁</span><div><b>Value events</b><small>Claim rewards for completed tasks; paid tiers can add extra rewards.</small></div></div><div class="menuCard"><span class="menuIcon">📋</span><div><b>Events</b><small>Main event hub. Read rules before spending items.</small></div></div><div class="menuCard"><span class="menuIcon">⚔️</span><div><b>VS</b><small>Daily theme, weekly overview, duel league and Kill Day attack access.</small></div></div><div class="menuCard"><span class="menuIcon">✉️</span><div><b>Mail</b><small>Battle reports, union notices, event rewards, system rewards and daily reports.</small></div></div><div class="menuCard"><span class="menuIcon">🎒</span><div><b>Bag</b><small>Items, chests, stamina, shields, tickets, resources, speedups, shards, beast and gear materials.</small></div></div></div></div><p class="menuNote"><b>Title discipline:</b> Building/research titles are strongest before long upgrades. Prime Minister duration and removal should be handled by 1-2 trusted people to avoid chaos and long queues.</p></article>
<article class="guideBlock"><h3>2. City growth and buildings</h3><p>The Castle / Main Hall is the main gate, but rushing it blindly creates a hollow account. Before every major upgrade, check the next Castle requirement and build only what supports the next unlock.</p><div class="prioList"><div><b>Castle / Main Hall:</b> highest structural priority because it gates buildings, troop tiers, features and account ceiling.</div><div><b>Prerequisite buildings:</b> upgrade what the next Castle level actually requires. Do not level random buildings just because they are cheap.</div><div><b>Research Center / Academy:</b> top priority because research multiplies almost every other system.</div><div><b>Barracks / training buildings:</b> keep them aligned with troop-tier goals. Higher troops matter more than cosmetic CP.</div><div><b>Hospitals and healing capacity:</b> essential before Kill Day, Ruins, Royal City, CoK and heavy PvP.</div><div><b>Resource buildings and storage:</b> useful, but below Castle, research and troops. Keep production alive without overinvesting.</div></div><p class="guideWarn">Rule: long upgrades before sleep or work, speedups during VS/Arm Race, union help immediately after starting an upgrade.</p></article>
<article class="guideBlock"><h3>3. Research priorities</h3><p>Research is one of the cleanest long-term power systems. It looks less dramatic than a new hero, but it compounds every day.</p><div class="guideMatrix"><div class="guideMini"><b>Development</b><small>Construction speed, research speed, gathering, resource efficiency, march utility.</small></div><div class="guideMini"><b>Military core</b><small>Troop ATK, DEF, HP, march size, troop-tier requirements and healing efficiency.</small></div><div class="guideMini"><b>Event efficiency</b><small>Anything that helps VS, Arm Race, gathering, stamina or repeated rewards.</small></div><div class="guideMini"><b>Union Research</b><small>Small donations every 8h beat random bursts. It helps the whole union.</small></div></div><p>Priority: unlock bottlenecks first, then invest in permanent combat stats. Avoid stopping research queues; an idle Research Center is lost account growth.</p></article>
<article class="guideBlock"><h3>4. Heroes and formations</h3><p>Heroes are not just CP. They define your damage profile, survival, rallies, bosses and PvP performance. Build a core team first instead of spreading materials across every shiny hero.</p><ul><li><strong>Core team first:</strong> main tank, main damage dealers and key support before side heroes.</li><li><strong>Boss teams:</strong> prioritize single-target damage, faction bonus, crit/ATK scaling and damage skills.</li><li><strong>PvP teams:</strong> need durability, counter value, march bonuses and formation synergy.</li><li><strong>Vouchers before universal shards:</strong> open random rewards first, then use universal shards where gaps remain.</li><li><strong>Skill EXP Books:</strong> use on core heroes or boss-damage heroes; prefer useful breakpoints instead of random small upgrades.</li></ul></article>
<article class="guideBlock"><h3>5. Stats: ATK / DEF / HP</h3><p>Stats matter differently depending on the role. Damage heroes want output; tanks want survival; rally and PvP teams need balanced scaling.</p><div class="statGrid"><div class="statCard"><b>ATK / ANG</b><small>Best for damage dealers, World Boss, rallies and faster PvE clears.</small></div><div class="statCard"><b>DEF / VER</b><small>Reduces incoming damage. Useful on tanks and defensive formations.</small></div><div class="statCard"><b>HP / LP</b><small>Increases how long troops/heroes survive. Very valuable in PvP and long fights.</small></div></div><p class="guideWarn">Simple rule: damage gear to damage heroes, survival gear to tanks, utility stats to the heroes whose skills actually use them.</p></article>
<article class="guideBlock"><h3>6. Equipment, crystals and scrolls</h3><p>Gear is where strong accounts start to separate from casual accounts. Do not upgrade every piece equally if your strategy depends on specific heroes.</p><ul><li><strong>Weapons / damage pieces:</strong> strongest on main DPS and World-Boss heroes.</li><li><strong>Armor / helmets:</strong> better on tanks and heroes that must survive long fights.</li><li><strong>Boots / special pieces:</strong> valuable when they support the hero role or damage type.</li><li><strong>Legendary gear crystals:</strong> save and use where the upgrade changes performance, not just CP.</li><li><strong>Gear scrolls:</strong> treat as rare progression items; spend them on long-term gear, not temporary heroes.</li><li><strong>Exclusive Equipment Shards:</strong> only when the hero is core or has a key boss/PvP role.</li></ul><p class="guideWarn">Good upgrade = core hero + correct role + useful breakpoint + event timing.</p></article>
<article class="guideBlock"><h3>7. Resources and spending discipline</h3><p>The game constantly pushes you to spend early. Good accounts wait until the same resource scores multiple systems.</p><div class="upgradeFlow"><div class="flowStep"><b>Save</b><small>Keep packs closed when possible.</small></div><div class="flowStep"><b>Match</b><small>Check VS day and Arm Race window.</small></div><div class="flowStep"><b>Spend</b><small>Use only what hits the current goal.</small></div><div class="flowStep"><b>Queue</b><small>Start the next timer immediately.</small></div><div class="flowStep"><b>Protect</b><small>Shield or spend before going offline.</small></div></div><p>Speedups, Hero EXP, shards, skill books, crystals, scrolls, stamina and recruitment vouchers are event weapons. The same item is worth more when it scores VS, Arm Race or limited-event rewards.</p></article>
<article class="guideBlock"><h3>8. Events: what they are and what to do</h3><p>Events are the engine of X-Clash progression. First check the calendar, then match the event with VS and Arm Race, then spend only what scores.</p><div class="eventDeck"><div class="eventCard"><h4>Wettrüsten / Arm Race</h4><p>Short rotating windows for one task type. It turns normal upgrades into extra rewards.</p><div class="eventMeta"><span>Solo</span><span>4h window</span><span>High value</span></div><ul><li><b class="eventDo">What to do:</b> Open the schedule and wait for the matching theme: build, research, train, hero, Mystic Beast or stamina.</li><li><b class="eventSave">Save / prepare:</b> Speedups, hero EXP, vouchers, stamina and upgrade materials.</li><li><b class="eventAvoid">Avoid:</b> Spending in the wrong window just to finish faster.</li></ul></div><div class="eventCard"><h4>VS / Union Duel</h4><p>Weekly score race. Each day rewards different actions and rewards discipline.</p><div class="eventMeta"><span>Union</span><span>Weekly</span><span>Scoring</span></div><ul><li><b class="eventDo">What to do:</b> Follow the daily theme: Intel, build, research, heroes, training and Kill Day. Combine with matching Arm Race.</li><li><b class="eventSave">Save / prepare:</b> Speedups, shards, hero EXP, tavern quests, wagons and Intel for the right day.</li><li><b class="eventAvoid">Avoid:</b> Random spending; it weakens both your score and the union score.</li></ul></div><div class="eventCard"><h4>World Boss</h4><p>Daily damage benchmark and reliable reward source.</p><div class="eventMeta"><span>Daily</span><span>Boss damage</span><span>Faction bonus</span></div><ul><li><b class="eventDo">What to do:</b> Check the +50% faction bonus, use your best damage team and damage gear, then compare results.</li><li><b class="eventSave">Save / prepare:</b> Best DPS heroes, damage gear, skill upgrades and formation tests.</li><li><b class="eventAvoid">Avoid:</b> Sending random teams without checking faction, gear or boss result.</li></ul></div><div class="eventCard"><h4>Raging Bosses</h4><p>Temporary boss windows, usually played like a burst World Boss.</p><div class="eventMeta"><span>Timed</span><span>PvE burst</span></div><ul><li><b class="eventDo">What to do:</b> Use the best damage team, complete required hits and claim stage/ranking rewards before reset.</li><li><b class="eventSave">Save / prepare:</b> Boss team, damage gear, stamina/attempts if required.</li><li><b class="eventAvoid">Avoid:</b> Weak marches if rewards depend on damage.</li></ul></div><div class="eventCard"><h4>Union / Alliance Boss</h4><p>Scheduled union boss. Strong participation matters more than solo perfection.</p><div class="eventMeta"><span>Union</span><span>Calendar</span><span>Rally</span></div><ul><li><b class="eventDo">What to do:</b> Check the calendar, join on time, follow team/rally order, heal and help.</li><li><b class="eventSave">Save / prepare:</b> March slots, healed troops, correct team and time reminder.</li><li><b class="eventAvoid">Avoid:</b> Scouting or joining/starting from too far away if it breaks timing.</li></ul></div><div class="eventCard"><h4>Ruins Battlefield / Ruins War</h4><p>Fixed-time team battlefield with objectives, hospitals and garrisons.</p><div class="eventMeta"><span>Union</span><span>Fixed time</span><span>Team roles</span></div><ul><li><b class="eventDo">What to do:</b> Enter on time, hold hospitals/objectives, place strong teams in garrisons and use weaker teams on lower targets.</li><li><b class="eventSave">Save / prepare:</b> Calendar choice, reminder, healed troops, assigned roles.</li><li><b class="eventAvoid">Avoid:</b> Arriving late, chasing kills while objectives are empty, or ignoring heals.</li></ul></div><div class="eventCard"><h4>Undead Treasure</h4><p>Active treasure event around special/golden zombies and spawned bosses.</p><div class="eventMeta"><span>Active play</span><span>Shop currency</span></div><ul><li><b class="eventDo">What to do:</b> Kill special zombies, spawn bosses, help kill bosses and spend event points in the shop.</li><li><b class="eventSave">Save / prepare:</b> Stamina and real active time during the event window.</li><li><b class="eventAvoid">Avoid:</b> Playing half-AFK; the value comes from quick hunting and boss follow-up.</li></ul></div><div class="eventCard"><h4>Campaign Attack / Class Boss</h4><p>Limited campaign or class-related boss objective with its own scoring rules.</p><div class="eventMeta"><span>Limited</span><span>Boss</span><span>Class</span></div><ul><li><b class="eventDo">What to do:</b> Read scoring rules first, then use the required class or best boss team. Finish attempts while live.</li><li><b class="eventSave">Save / prepare:</b> Right class/team, attempts, buffs and calendar timing.</li><li><b class="eventAvoid">Avoid:</b> Leaving special combat zones if contribution points are tied to that zone.</li></ul></div><div class="eventCard"><h4>Zombie Overlord Invasion</h4><p>Large zombie/invasion pressure event. Coordination and healing control matter.</p><div class="eventMeta"><span>Union</span><span>Map pressure</span><span>Healing</span></div><ul><li><b class="eventDo">What to do:</b> Coordinate hits, use durable teams, watch battle reports and adjust if losses are high.</li><li><b class="eventSave">Save / prepare:</b> Hospitals, help requests, healed troops and strong PvE teams.</li><li><b class="eventAvoid">Avoid:</b> Feeding wounded troops when healing capacity is overloaded.</li></ul></div><div class="eventCard"><h4>Zombie Siege / Felbloom Invasion</h4><p>Wave or invasion-style event where survival and sustained damage matter.</p><div class="eventMeta"><span>Waves</span><span>Defense</span><span>AoE</span></div><ul><li><b class="eventDo">What to do:</b> Prepare formation, healing and buffs before waves start. Use AoE/sustain/PvE teams if possible.</li><li><b class="eventSave">Save / prepare:</b> Hospitals, buffs, defensive heroes and active time.</li><li><b class="eventAvoid">Avoid:</b> Starting with full hospitals or unhealed troops.</li></ul></div><div class="eventCard"><h4>Kill Day</h4><p>PvP scoring day. Protection is as important as attack.</p><div class="eventMeta"><span>Saturday</span><span>PvP</span><span>Shield</span></div><ul><li><b class="eventDo">What to do:</b> Shield when offline, sleeping or unable to react. Fight only controlled targets and heal smart.</li><li><b class="eventSave">Save / prepare:</b> Shields, relocates, healing speedups and safe troop positions.</li><li><b class="eventAvoid">Avoid:</b> Exposed troops, emotional attacks and giving free points.</li></ul></div><div class="eventCard"><h4>Royal City / CoK / City Clash</h4><p>Map-control fights around cities, king, guards and cross-server rules.</p><div class="eventMeta"><span>Map war</span><span>Diplomacy</span><span>NAP</span></div><ul><li><b class="eventDo">What to do:</b> Reinforce assigned objectives, follow deal rules and check the event calendar.</li><li><b class="eventSave">Save / prepare:</b> Healed teams, teleports, shields and clear leadership instructions.</li><li><b class="eventAvoid">Avoid:</b> Attacking protected castles/mines or breaking NAP rules.</li></ul></div><div class="eventCard"><h4>Wagons, Tavern &amp; daily map tasks</h4><p>Small recurring actions that score on the right day.</p><div class="eventMeta"><span>Daily</span><span>VS-linked</span><span>NAP-sensitive</span></div><ul><li><b class="eventDo">What to do:</b> Send legendary wagons and orange tavern quests on the correct VS day when possible. During CoK, plunder enemy-server wagons.</li><li><b class="eventSave">Save / prepare:</b> Legendary wagons, orange quests and NAP list.</li><li><b class="eventAvoid">Avoid:</b> Confusing wagons with quests/chests; rules may differ.</li></ul></div><div class="eventCard"><h4>Season treasures, mines &amp; city races</h4><p>Season systems that run beside normal gameplay.</p><div class="eventMeta"><span>Season</span><span>Territory</span><span>Union plan</span></div><ul><li><b class="eventDo">What to do:</b> Read the season page, clear zombies, reinforce captures and follow union mine/city targets.</li><li><b class="eventSave">Save / prepare:</b> Stamina, teleports, season resources and coordinated time.</li><li><b class="eventAvoid">Avoid:</b> Solo captures that break territory planning or waste attempts.</li></ul></div><div class="eventCard"><h4>Faction Trials / challenge modes</h4><p>Repeatable PvE checks for teams, factions and formation strength.</p><div class="eventMeta"><span>PvE</span><span>Formation</span></div><ul><li><b class="eventDo">What to do:</b> Use daily attempts, adjust teams and note which faction/role performs best.</li><li><b class="eventSave">Save / prepare:</b> Core heroes, gear swaps and skill books for damage checks.</li><li><b class="eventAvoid">Avoid:</b> Ignoring results; trials are useful formation tests.</li></ul></div><div class="eventCard"><h4>Library Siege / special timed events</h4><p>Occasional events with unique rules. Treat them as calendar events first.</p><div class="eventMeta"><span>Special</span><span>Timed</span><span>Read rules</span></div><ul><li><b class="eventDo">What to do:</b> Read the event screen, follow union timing and use the assigned entry/attack logic.</li><li><b class="eventSave">Save / prepare:</b> Active time, correct team and stage/shop claim before reset.</li><li><b class="eventAvoid">Avoid:</b> Spending rare resources before you know what actually scores.</li></ul></div></div><p class="guideWarn">Event priority: Daily basics → VS day → matching Arm Race → special events → union support → timed battles. The best players do not click more; they spend at the right moment.</p></article>
<article class="guideBlock"><h3>9. Daily, VS and Arm Race</h3><p>Daily keeps the account alive; VS tells you what to push; Arm Race tells you when to push it.</p><div class="guidePriority"><div><b>Monday:</b> Intel, stamina, gathering, Hero EXP, Mystic Beast.</div><div><b>Tuesday:</b> building, building power, legendary wagons, orange tavern quests, recruitment.</div><div><b>Wednesday:</b> research, tech power, Intel, crystals, Mystic Beast chests.</div><div><b>Thursday:</b> heroes: vouchers first, then universal shards; Hero EXP and skill books in Hero window.</div><div><b>Friday:</b> mixed speedups, power, training and Ruins calendar.</div><div><b>Saturday:</b> Kill Day: shield offline, fight smart, heal carefully.</div><div><b>Sunday:</b> no VS: prepare Monday, save last Intel if safe, send gathering before reset.</div></div></article>
<article class="guideBlock"><h3>10. Solo and team</h3><p>Solo builds the account; the union turns accounts into map control.</p><span class="tag">World Boss</span><span class="tag">Wagons</span><span class="tag">Ruins</span><span class="tag">Union Boss</span><span class="tag">CoK</span><span class="tag">Kill Day</span><span class="tag">Mines / Cities</span><span class="tag">Season events</span><ul><li>Solo: active queues, gathering, saving resources, using windows, protecting troops.</li><li>Team: rallies, donations, reinforcements, Ruins roles and city/mine captures.</li><li>Leadership: Daily → VS → Arm Race → Specials → Support → Events.</li><li>NAP: check before wagons, tavern quests, mines, castles, CoK and Kill Day.</li></ul></article>`,

<section class="guideHero"><h3>Kernidee</h3><p>X-Clash besteht nicht nur daraus, die Burg auf Level 30 zu bringen. Echte Stärke entsteht aus vielen Systemen: Gebäude öffnen Grenzen, Forschung gibt dauerhafte Werte, Helden bestimmen Schaden und Formation, Ausrüstung verstärkt die richtigen Helden, und gutes Event-Timing macht aus denselben Ressourcen zusätzliche Belohnungen.</p><div class="guideSummary"><div class="guideMini"><b>Aufbau</b><small>Burg, Voraussetzungen, Forschungszentrum, Kasernen, Krankenhäuser, Wirtschaft.</small></div><div class="guideMini"><b>Forschung</b><small>Dauerhafte Stärke: Tempo, Wirtschaft, Truppen, Marsch und Kampf.</small></div><div class="guideMini"><b>Helden</b><small>Sterne, Level, Skills, Shards, Rollen und Fraktions-Synergie.</small></div><div class="guideMini"><b>Ausrüstung</b><small>Gear, Kristalle, Schriftrollen und exklusive Shards auf den richtigen Helden.</small></div></div></section>
<article class="guideBlock menuGuide"><h3>1. Bildschirm, Zuhause und Titel</h3><p>Der Hauptbildschirm ist deine Kommandozentrale. Die Symbole sind nicht nur Menü-Deko: Hier liegen Daily-Routine, Timing, Belohnungen, Titel-Buffs und viele kleine Fortschrittsquellen.</p><div class="guideMatrix"><div class="guideMini"><b>Avatarbild / Zuhause</b><small>Avatar hochladen, Traveler-Name 1x kostenlos ändern, Level, ID, Kampfkraft, Kills, Union, Server, Ranglisten, Skins, Buffs, Einstellungen und Hilfe.</small></div><div class="guideMini"><b>Serverburg / Titel</b><small>Wenn die Königs-Union es erlaubt: zeitlich begrenzte Titel für Ressourcen, Bau, Forschung, Heilung oder Training beantragen.</small></div><div class="guideMini"><b>Skins mit Buffs</b><small>Avatarrahmen, Burg, Namensschild, Mystische Bestie und Spezialeffekte können ANG, VER oder LP geben. Buff vor Optik.</small></div><div class="guideMini"><b>Grundregel</b><small>Vor grossen Bau-/Forschungsstarts prüfen: VS, Arm Race, Titel-Buff, Union-Hilfe und Ressourcensicherheit.</small></div></div><div class="menuMap"><div class="menuColumn"><h4>Linke Seite: schnelle Verwaltung</h4><div class="menuCard"><span class="menuIcon">🖼️</span><div><b>Avatar / Zuhause</b><small>Profil, ID, Server, Union, Ranglisten, Skins, Einstellungen.</small></div></div><div class="menuCard"><span class="menuIcon">⚡</span><div><b>Ausdauer</b><small>Für Intel, Zombies, Bestien und aktive Events. Möglichst im passenden Fenster nutzen.</small></div></div><div class="menuCard"><span class="menuIcon">👑</span><div><b>VIP</b><small>Übersicht über Buffs und Belohnungen. Kleine tägliche Claims summieren sich.</small></div></div><div class="menuCard"><span class="menuIcon">🏗️</span><div><b>Bau- & Forschungsliste</b><small>Queues aktiv halten; Speedups nur nutzen, wenn VS/Arm Race passt.</small></div></div><div class="menuCard"><span class="menuIcon">🌡️</span><div><b>Winter-Wärme</b><small>Zeigt Wärmequellen, Ofen-/Kälte-Status und Season-Buffs.</small></div></div><div class="menuCard"><span class="menuIcon">📅</span><div><b>Eventkalender</b><small>Für R4 auch Planung und Ankündigung. Vor Ausgaben immer prüfen.</small></div></div><div class="menuCard"><span class="menuIcon">🚚</span><div><b>Wagen</b><small>Eigene Wagen senden, fremde plündern, CoK- und NAP-Regeln beachten.</small></div></div><div class="menuCard"><span class="menuIcon">🍺</span><div><b>Taverne</b><small>Eigene Quests, Unterstützung, Schatzgrabung und Tausch von Schatzkartenstücken.</small></div></div><div class="menuCard"><span class="menuIcon">📜</span><div><b>Intel & Quests</b><small>Intel, Hauptquests, tägliche Quests und Season-Quests. Oft wichtig für VS.</small></div></div><div class="menuCard"><span class="menuIcon">💬</span><div><b>Chats & Ankündigungen</b><small>Server, Union, Privat, R4/R5 und Übersicht aller Ankündigungen.</small></div></div></div><div class="menuColumn"><h4>Untere Leiste: Kernsysteme</h4><div class="menuCard"><span class="menuIcon">🐶</span><div><b>Rette den Hund</b><small>Mini-Spiel mit einfachen Belohnungen. Claims mitnehmen.</small></div></div><div class="menuCard"><span class="menuIcon">🛡️</span><div><b>Prüfung</b><small>Abenteuerreise, Fraktionsprüfungen, Gipfelarena und 3v3 — Tests ohne Truppenverluste.</small></div></div><div class="menuCard"><span class="menuIcon">🦸</span><div><b>Helden</b><small>Level, Sterne, Skills, Ausrüstung, Kristalle, Schriftrollen und Formationen.</small></div></div><div class="menuCard"><span class="menuIcon">🤝</span><div><b>Allianz / Union</b><small>Mitglieder, Shop, Feldzug, Abzeichen, Geschenke, Technologie, Hilfe, Season-Beitrag, Stadt und Logs.</small></div></div><div class="menuCard"><span class="menuIcon">🗺️</span><div><b>Welt / Kleinstadt</b><small>Wechsel zwischen Karte und Burg. Wichtig für Sammeln, Märsche, Kämpfe und Positionierung.</small></div></div></div><div class="menuColumn"><h4>Rechte Seite: Events & Inventar</h4><div class="menuCard"><span class="menuIcon">🛒</span><div><b>Einkaufszentrum</b><small>Käufe gegen Geld. Optional, aber Timing ersetzt kein Geld.</small></div></div><div class="menuCard"><span class="menuIcon">🎁</span><div><b>Wert-Events</b><small>Belohnungen für erledigte Aufgaben; teilweise zusätzliche Kauf-Belohnungen.</small></div></div><div class="menuCard"><span class="menuIcon">📋</span><div><b>Events</b><small>Wichtiger Event-Hub. Regeln lesen, bevor Items ausgegeben werden.</small></div></div><div class="menuCard"><span class="menuIcon">⚔️</span><div><b>VS</b><small>Tagesthema, Wochenübersicht, Duell-Liga und Allianzangriff/Killday-Zugang.</small></div></div><div class="menuCard"><span class="menuIcon">✉️</span><div><b>Mail</b><small>Kampfberichte, Union-Mails, Eventbelohnungen, Systembelohnungen und tägliche Berichte.</small></div></div><div class="menuCard"><span class="menuIcon">🎒</span><div><b>Tasche</b><small>Items, Kisten, Ausdauer, Schilde, Tickets, Ressourcen, Speedups, Shards, Bestien- und Gear-Material.</small></div></div></div></div><p class="menuNote"><b>Titel-Disziplin:</b> Bau-/Forschungstitel sind vor langen Upgrades extrem stark. Der Premierminister sollte von 1-2 zuverlässigen Personen koordiniert werden, sonst entstehen Chaos und lange Wartezeiten.</p></article>
<article class="guideBlock"><h3>2. Stadtaufbau und Gebäude</h3><p>Die Burg / Haupthalle ist das wichtigste Tor, aber blindes Rushen macht einen hohlen Account. Vor jedem grossen Upgrade zuerst prüfen, welche Gebäude die nächste Burgstufe wirklich verlangt.</p><div class="prioList"><div><b>Burg / Haupthalle:</b> höchste strukturelle Priorität, weil sie Gebäude, Truppenstufen, Features und Account-Decke öffnet.</div><div><b>Voraussetzungs-Gebäude:</b> nur das leveln, was für die nächste Burgstufe oder Strategie wirklich nötig ist.</div><div><b>Forschungszentrum / Akademie:</b> Top-Priorität, weil Forschung fast alle anderen Systeme multipliziert.</div><div><b>Kasernen / Trainingsgebäude:</b> an Truppenstufen ausrichten. Bessere Truppen zählen mehr als kosmetische KK.</div><div><b>Krankenhäuser / Heilkapazität:</b> wichtig vor Kill Day, Ruins, Royal City, CoK und starkem PvP.</div><div><b>Ressourcen-Gebäude / Lager:</b> nützlich, aber unter Burg, Forschung und Truppen. Produktion stabil halten, nicht überinvestieren.</div></div><p class="guideWarn">Regel: lange Upgrades vor Schlaf/Arbeit, Speedups während VS/Arm Race, Union-Hilfe direkt nach Start holen.</p></article>
<article class="guideBlock"><h3>3. Forschung</h3><p>Forschung ist eines der saubersten Langzeit-Systeme. Sie wirkt weniger spektakulär als ein neuer Held, aber sie verstärkt den Account jeden Tag.</p><div class="guideMatrix"><div class="guideMini"><b>Entwicklung</b><small>Baugeschwindigkeit, Forschungsgeschwindigkeit, Sammeln, Ressourceneffizienz, Marsch-Nutzen.</small></div><div class="guideMini"><b>Militär-Kern</b><small>Truppen-ANG, VER, LP, Marschgrösse, Truppenstufen und Heil-Effizienz.</small></div><div class="guideMini"><b>Event-Effizienz</b><small>Alles, was VS, Arm Race, Sammeln, Ausdauer oder wiederholbare Belohnungen stärkt.</small></div><div class="guideMini"><b>Union Research</b><small>Kleine Spenden alle 8h sind stärker als zufällige Schübe. Es hilft der ganzen Union.</small></div></div><p>Priorität: Engpässe freischalten, dann dauerhafte Kampfwerte. Ein stillstehendes Forschungszentrum ist verlorenes Wachstum.</p></article>
<article class="guideBlock"><h3>4. Helden und Formationen</h3><p>Helden sind nicht nur KK. Sie bestimmen Schaden, Überleben, Rallys, Bosse und PvP. Zuerst ein Kernteam bauen, nicht alles gleichmässig verteilen.</p><ul><li><strong>Kernteam zuerst:</strong> Haupttank, Haupt-Damage und wichtige Supports vor Nebenhelden.</li><li><strong>Boss-Teams:</strong> Single-Target-Damage, Fraktionsbonus, Krit/ANG-Skalierung und Damage-Skills priorisieren.</li><li><strong>PvP-Teams:</strong> brauchen Haltbarkeit, Counter-Wert, Marschboni und Formations-Synergie.</li><li><strong>Vouchers vor Universal Shards:</strong> Zufallsbelohnungen zuerst öffnen, danach Lücken gezielt füllen.</li><li><strong>Skill EXP Books:</strong> auf Core-Helden oder Boss-Damage-Helden; lieber sinnvolle Breakpoints als zufällige Mini-Upgrades.</li></ul></article>
<article class="guideBlock"><h3>5. Werte: ANG / VER / LP</h3><p>Werte zählen je nach Rolle anders. Damage-Helden wollen Output; Tanks wollen Überleben; Rally- und PvP-Teams brauchen saubere Balance.</p><div class="statGrid"><div class="statCard"><b>ANG / Attack</b><small>Beste Investition für Damage Dealer, World Boss, Rallys und schnelleres PvE.</small></div><div class="statCard"><b>VER / Defense</b><small>Reduziert eingehenden Schaden. Stark auf Tanks und defensiven Formationen.</small></div><div class="statCard"><b>LP / HP</b><small>Erhöht, wie lange Truppen/Helden überleben. Sehr wertvoll in PvP und langen Kämpfen.</small></div></div><p class="guideWarn">Einfach: Damage-Gear auf Damage-Helden, Survival-Gear auf Tanks, Utility dort, wo Skills es wirklich nutzen.</p></article>
<article class="guideBlock"><h3>6. Ausrüstung, Kristalle und Schriftrollen</h3><p>Ausrüstung trennt starke Accounts von Casual Accounts. Nicht jedes Teil gleich leveln, wenn deine Strategie auf bestimmten Helden beruht.</p><ul><li><strong>Waffen / Damage-Teile:</strong> auf Haupt-DPS und World-Boss-Helden am stärksten.</li><li><strong>Rüstung / Helme:</strong> besser auf Tanks und Helden, die lange Kämpfe überleben müssen.</li><li><strong>Stiefel / Spezialteile:</strong> wertvoll, wenn sie Rolle oder Schadenstyp des Helden unterstützen.</li><li><strong>Legendäre Gear-Kristalle:</strong> dort nutzen, wo das Upgrade Leistung verändert, nicht nur KK.</li><li><strong>Gear-Schriftrollen:</strong> seltene Progression; auf langfristiges Gear, nicht auf Übergangshelden.</li><li><strong>Exclusive Equipment Shards:</strong> nur, wenn der Held core ist oder eine klare Boss/PvP-Rolle hat.</li></ul><p class="guideWarn">Gutes Upgrade = Core-Held + richtige Rolle + sinnvoller Breakpoint + Event-Timing.</p></article>
<article class="guideBlock"><h3>7. Ressourcen und Ausgabedisziplin</h3><p>Das Spiel will ständig, dass du sofort ausgibst. Gute Accounts warten, bis dieselbe Ressource mehrere Systeme gleichzeitig trifft.</p><div class="upgradeFlow"><div class="flowStep"><b>Sparen</b><small>Packs geschlossen halten, wenn möglich.</small></div><div class="flowStep"><b>Abgleichen</b><small>VS-Tag und Arm-Race-Fenster prüfen.</small></div><div class="flowStep"><b>Ausgeben</b><small>Nur nutzen, was das aktuelle Ziel trifft.</small></div><div class="flowStep"><b>Queue</b><small>Nächsten Timer sofort starten.</small></div><div class="flowStep"><b>Schützen</b><small>Vor offline Schild oder Ressourcen verbauen.</small></div></div><p>Speedups, Hero EXP, Shards, Skill Books, Kristalle, Schriftrollen, Ausdauer und Recruitment Vouchers sind Event-Waffen. Dasselbe Item ist mehr wert, wenn es zusätzlich VS, Arm Race oder Spezialbelohnungen scored.</p></article>
<article class="guideBlock"><h3>8. Events: was es ist und was man tun muss</h3><p>Events sind der Motor des Fortschritts in X-Clash. Erst Kalender prüfen, dann VS und Arm Race abgleichen, dann nur das nutzen, was Punkte oder starke Rewards bringt.</p><div class="eventDeck"><div class="eventCard"><h4>Wettrüsten / Arm Race</h4><p>Kurze rotierende Fenster für einen Aufgabentyp. Normale Upgrades werden dadurch zu Extra-Rewards.</p><div class="eventMeta"><span>Solo</span><span>4h-Fenster</span><span>Hoher Wert</span></div><ul><li><b class="eventDo">Tun:</b> Plan öffnen und auf das passende Thema warten: Bau, Forschung, Training, Helden, Mystic Beast oder Ausdauer.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Speedups, Hero EXP, Vouchers, Ausdauer und Upgrade-Material.</li><li><b class="eventAvoid">Vermeiden:</b> Im falschen Fenster ausgeben, nur weil man schnell fertig sein will.</li></ul></div><div class="eventCard"><h4>VS / Union Duel</h4><p>Wöchentlicher Punktewettkampf. Jeder Tag belohnt andere Aktionen und Disziplin.</p><div class="eventMeta"><span>Union</span><span>Wöchentlich</span><span>Scoring</span></div><ul><li><b class="eventDo">Tun:</b> Tagesfokus einhalten: Intel, Bau, Forschung, Helden, Training und Kill Day. Mit passendem Arm Race kombinieren.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Speedups, Shards, Hero EXP, Tavern Quests, Wagen und Intel für den richtigen Tag.</li><li><b class="eventAvoid">Vermeiden:</b> Zufälliges Ausgeben; das schwächt eigenen Score und Union-Score.</li></ul></div><div class="eventCard"><h4>Weltboss</h4><p>Täglicher Damage-Test und verlässliche Reward-Quelle.</p><div class="eventMeta"><span>Daily</span><span>Boss-Damage</span><span>Fraktionsbonus</span></div><ul><li><b class="eventDo">Tun:</b> +50% Fraktionsbonus prüfen, bestes Damage-Team und Damage-Gear nutzen, Ergebnisse vergleichen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Beste DPS-Helden, Damage-Gear, Skill-Upgrades und Formations-Tests.</li><li><b class="eventAvoid">Vermeiden:</b> Zufällige Teams schicken, ohne Fraktion, Gear oder Ergebnis zu prüfen.</li></ul></div><div class="eventCard"><h4>Rasende Bosse</h4><p>Temporäre Boss-Fenster, meistens wie ein Burst-Weltboss zu spielen.</p><div class="eventMeta"><span>Timed</span><span>PvE-Burst</span></div><ul><li><b class="eventDo">Tun:</b> Bestes Damage-Team nutzen, Pflichtangriffe erledigen und Stage-/Ranking-Rewards vor Reset holen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Boss-Team, Damage-Gear, falls nötig Ausdauer/Versuche.</li><li><b class="eventAvoid">Vermeiden:</b> Schwache Märsche, wenn Belohnungen vom Schaden abhängen.</li></ul></div><div class="eventCard"><h4>Allianz-/Unionboss</h4><p>Geplanter Union-Boss. Viele pünktliche Teilnehmer sind wichtiger als Solo-Perfektion.</p><div class="eventMeta"><span>Union</span><span>Kalender</span><span>Rally</span></div><ul><li><b class="eventDo">Tun:</b> Kalender prüfen, pünktlich joinen, Team-/Rally-Reihenfolge befolgen, heilen und helfen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Marschslots, geheilte Truppen, korrektes Team und Reminder.</li><li><b class="eventAvoid">Vermeiden:</b> Spähen oder aus zu grosser Distanz starten/joinen, wenn das Timing leidet.</li></ul></div><div class="eventCard"><h4>Schlachtfeld der Ruinen / Ruins War</h4><p>Fixer Team-Battle mit Zielen, Krankenhäusern und Garnisonen.</p><div class="eventMeta"><span>Union</span><span>Fixe Zeit</span><span>Teamrollen</span></div><ul><li><b class="eventDo">Tun:</b> Pünktlich eintreten, Krankenhäuser/Ziele halten, starke Teams in Garnisonen, schwächere Teams gegen kleinere Ziele.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Zeitwahl, Reminder, geheilte Truppen und zugewiesene Rollen.</li><li><b class="eventAvoid">Vermeiden:</b> Zu spät kommen, Kills jagen während Ziele leer sind oder Heilung ignorieren.</li></ul></div><div class="eventCard"><h4>Untoten-Schatz</h4><p>Aktives Schatz-Event rund um Spezial-/goldene Zombies und gespawnte Bosse.</p><div class="eventMeta"><span>Aktiv spielen</span><span>Shop-Währung</span></div><ul><li><b class="eventDo">Tun:</b> Spezial-Zombies töten, Bosse spawnen, Bosskills unterstützen und Punkte im Shop einsetzen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Ausdauer und echte aktive Spielzeit im Event-Fenster.</li><li><b class="eventAvoid">Vermeiden:</b> Halb-AFK spielen; der Wert kommt durch aktives Suchen und schnelle Boss-Reaktion.</li></ul></div><div class="eventCard"><h4>Feldzugangriff / Klass-Boss</h4><p>Limitierter Feldzug- oder Klassen-Boss mit eigener Wertung.</p><div class="eventMeta"><span>Limitiert</span><span>Boss</span><span>Klasse</span></div><ul><li><b class="eventDo">Tun:</b> Scoring-Regeln zuerst lesen, dann passende Klasse oder bestes Boss-Team nutzen. Versuche während Aktivzeit erledigen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Richtige Klasse/Team, Versuche, Buffs und Kalender-Timing.</li><li><b class="eventAvoid">Vermeiden:</b> Spezial-Kampfzonen verlassen, wenn Beitragspunkte an diese Zone gebunden sind.</li></ul></div><div class="eventCard"><h4>Invasion von Zombie-Overlord</h4><p>Grosser Zombie-/Invasionsdruck. Koordination und Heilkontrolle zählen.</p><div class="eventMeta"><span>Union</span><span>Map-Druck</span><span>Heilung</span></div><ul><li><b class="eventDo">Tun:</b> Treffer koordinieren, robuste Teams nutzen, Kampfberichte prüfen und bei hohen Verlusten anpassen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Krankenhäuser, Hilfen, geheilte Truppen und starke PvE-Teams.</li><li><b class="eventAvoid">Vermeiden:</b> Verwundete stapeln, wenn Heilkapazität bereits überlastet ist.</li></ul></div><div class="eventCard"><h4>Zombie Siege / Felbloom Invasion</h4><p>Wellen- oder Invasions-Event, bei dem Überleben und konstanter Schaden zählen.</p><div class="eventMeta"><span>Wellen</span><span>Defense</span><span>AoE</span></div><ul><li><b class="eventDo">Tun:</b> Formation, Heilung und Buffs vor Start vorbereiten. Falls möglich AoE-/Sustain-/PvE-Teams nutzen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Krankenhäuser, Buffs, defensive Helden und aktive Zeit.</li><li><b class="eventAvoid">Vermeiden:</b> Mit vollen Krankenhäusern oder ungeheilten Truppen starten.</li></ul></div><div class="eventCard"><h4>Kill Day</h4><p>PvP-Punktetag. Schutz ist genauso wichtig wie Angriff.</p><div class="eventMeta"><span>Samstag</span><span>PvP</span><span>Schild</span></div><ul><li><b class="eventDo">Tun:</b> Schild aktivieren, wenn offline, schlafend oder nicht reaktionsfähig. Nur kontrollierte Ziele kämpfen und smart heilen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Schilde, Umzüge, Heil-Speedups und sichere Truppenpositionen.</li><li><b class="eventAvoid">Vermeiden:</b> Offene Truppen, emotionale Angriffe und Gratispunkte.</li></ul></div><div class="eventCard"><h4>Royal City / CoK / City Clash</h4><p>Map-Control-Kämpfe um Stadt, König, Wächter und Cross-Server-Regeln.</p><div class="eventMeta"><span>Map War</span><span>Diplomatie</span><span>NAP</span></div><ul><li><b class="eventDo">Tun:</b> Zugewiesene Ziele verstärken, Deals befolgen und Event-Kalender prüfen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Geheilte Teams, Teleports, Schilde und klare Leadership-Anweisung.</li><li><b class="eventAvoid">Vermeiden:</b> Geschützte Burgen/Minen angreifen oder NAP-Regeln brechen.</li></ul></div><div class="eventCard"><h4>Wagen, Taverne &amp; tägliche Map-Aufgaben</h4><p>Kleine wiederkehrende Aktionen, die am richtigen Tag punkten.</p><div class="eventMeta"><span>Daily</span><span>VS-relevant</span><span>NAP-sensibel</span></div><ul><li><b class="eventDo">Tun:</b> Legendäre Wagen und orange Tavern Quests möglichst am passenden VS-Tag senden. Bei CoK Gegner-Server-Wagen plündern.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Legendäre Wagen, orange Quests und NAP-Liste.</li><li><b class="eventAvoid">Vermeiden:</b> Wagen mit Quests/Kisten verwechseln; Regeln können unterschiedlich sein.</li></ul></div><div class="eventCard"><h4>Season-Schätze, Minen &amp; City Race</h4><p>Season-Systeme, die neben dem normalen Gameplay laufen.</p><div class="eventMeta"><span>Season</span><span>Territorium</span><span>Union-Plan</span></div><ul><li><b class="eventDo">Tun:</b> Season-Seite lesen, Zombies säubern, Eroberungen verstärken und Union-Ziele für Minen/Städte befolgen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Ausdauer, Teleports, Season-Ressourcen und koordinierte Zeit.</li><li><b class="eventAvoid">Vermeiden:</b> Solo-Eroberungen, die den Territoriumsplan stören oder Versuche verschwenden.</li></ul></div><div class="eventCard"><h4>Faction Trials / Challenge-Modi</h4><p>Wiederholbare PvE-Checks für Teams, Fraktionen und Formationsstärke.</p><div class="eventMeta"><span>PvE</span><span>Formation</span></div><ul><li><b class="eventDo">Tun:</b> Tägliche Versuche nutzen, Teams anpassen und merken, welche Fraktion/Rolle am besten läuft.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Core-Helden, Gear-Wechsel und Skillbücher für Damage-Checks.</li><li><b class="eventAvoid">Vermeiden:</b> Ergebnisse ignorieren; Trials sind gute Formations-Tests.</li></ul></div><div class="eventCard"><h4>Library Siege / spezielle Timed Events</h4><p>Gelegentliche Events mit eigenen Regeln. Erst als Kalender-Event behandeln.</p><div class="eventMeta"><span>Special</span><span>Timed</span><span>Regeln lesen</span></div><ul><li><b class="eventDo">Tun:</b> Event-Screen lesen, Union-Timing befolgen und zugewiesene Eintritts-/Angriffslogik nutzen.</li><li><b class="eventSave">Sparen / vorbereiten:</b> Aktive Zeit, richtiges Team und Stage-/Shop-Claim vor Reset.</li><li><b class="eventAvoid">Vermeiden:</b> Seltene Ressourcen ausgeben, bevor klar ist, was wirklich punktet.</li></ul></div></div><p class="guideWarn">Event-Priorität: Daily Basics → VS-Tag → passendes Arm Race → Specials → Union Support → Timed Battles. Gute Spieler klicken nicht mehr; sie geben im richtigen Moment aus.</p></article>
<article class="guideBlock"><h3>9. Daily, VS und Arm Race</h3><p>Daily hält den Account am Leben; VS sagt, was du pushst; Arm Race sagt, wann du es pushst.</p><div class="guidePriority"><div><b>Montag:</b> Intel, Ausdauer, Sammeln, Hero EXP, Mystic Beast.</div><div><b>Dienstag:</b> Bau, Gebäude-KK, legendäre Wagen, orange Tavern Quests, Recruitment.</div><div><b>Mittwoch:</b> Forschung, Tech-KK, Intel, Kristalle, Mystic Beast Chests.</div><div><b>Donnerstag:</b> Helden: Vouchers zuerst, danach Universal Shards; Hero EXP und Skill Books im Hero-Fenster.</div><div><b>Freitag:</b> gemischte Speedups, KK, Training und Ruins-Kalender.</div><div><b>Samstag:</b> Kill Day: offline Schild, smart kämpfen, gezielt heilen.</div><div><b>Sonntag:</b> kein VS: Montag vorbereiten, letzte Intel sparen wenn sicher, Sammeln vor Reset senden.</div></div></article>
<article class="guideBlock"><h3>10. Solo und Team</h3><p>Solo baut den Account; die Union macht aus Accounts Map-Kontrolle.</p><span class="tag">Weltboss</span><span class="tag">Wagen</span><span class="tag">Ruins</span><span class="tag">Union Boss</span><span class="tag">CoK</span><span class="tag">Kill Day</span><span class="tag">Minen / Städte</span><span class="tag">Season Events</span><ul><li>Solo: Queues aktiv halten, sammeln, Ressourcen sparen, Fenster nutzen, Truppen schützen.</li><li>Team: Rallys, Spenden, Verstärkungen, Ruins-Rollen und Stadt-/Minen-Captures.</li><li>Leadership: Daily → VS → Arm Race → Specials → Support → Events.</li><li>NAP: vor Wagen, Tavernen-Quests, Minen, Burgen, CoK und Kill Day prüfen.</li></ul></article>`,

<section class="guideHero"><h3>Idea central</h3><p>X-Clash no consiste solo en subir el castillo al nivel 30. El poder real viene de varios sistemas acumulados: edificios desbloquean límites, investigación da mejoras permanentes, héroes deciden daño y formación, equipo multiplica a los héroes correctos y el timing de eventos convierte los mismos recursos en más recompensas.</p><div class="guideSummary"><div class="guideMini"><b>Construcción</b><small>Castillo, requisitos, centro de investigación, cuarteles, hospitales, economía.</small></div><div class="guideMini"><b>Investigación</b><small>Fuerza permanente: velocidad, economía, tropas, marcha y combate.</small></div><div class="guideMini"><b>Héroes</b><small>Estrellas, nivel, skills, shards, roles y sinergia de facción.</small></div><div class="guideMini"><b>Equipo</b><small>Gear, cristales, pergaminos y shards exclusivos en héroes correctos.</small></div></div></section>
<article class="guideBlock menuGuide"><h3>1. Mapa de pantalla, perfil y títulos</h3><p>La pantalla principal es el centro de mando. Los iconos guían la rutina diaria, el timing de eventos, recompensas y buffs temporales.</p><div class="guideMatrix"><div class="guideMini"><b>Avatar / Home</b><small>Cambiar avatar, nombre gratis una vez, nivel, ID, poder, kills, unión, servidor, rankings, skins, buffs, ajustes y ayuda.</small></div><div class="guideMini"><b>Castillo del servidor / títulos</b><small>Si la unión gobernante lo permite, pedir títulos temporales para recursos, construcción, investigación, curación o entrenamiento.</small></div><div class="guideMini"><b>Skins con buffs</b><small>Marcos, castillos, nombres, Mystic Beast y efectos pueden dar ATQ, DEF o HP.</small></div><div class="guideMini"><b>Regla</b><small>Antes de grandes mejoras: revisar VS, Arm Race, título, ayuda de unión y seguridad de recursos.</small></div></div><div class="menuMap"><div class="menuColumn"><h4>Lado izquierdo</h4><div class="menuCard"><span class="menuIcon">🖼️</span><div><b>Avatar / Home</b><small>Perfil, ID, servidor, unión, rankings, skins, ajustes.</small></div></div><div class="menuCard"><span class="menuIcon">⚡</span><div><b>Stamina</b><small>Intel, zombies, bestias y eventos activos. Usar en la ventana correcta.</small></div></div><div class="menuCard"><span class="menuIcon">👑</span><div><b>VIP</b><small>Buffs y recompensas diarias.</small></div></div><div class="menuCard"><span class="menuIcon">🏗️</span><div><b>Construcción / Investigación</b><small>Mantener colas activas; speedups solo con buen timing.</small></div></div><div class="menuCard"><span class="menuIcon">🌡️</span><div><b>Calor de temporada</b><small>Estado de frío, horno, fuentes de calor y buffs.</small></div></div><div class="menuCard"><span class="menuIcon">📅</span><div><b>Calendario</b><small>Planificación, anuncios y timing de eventos.</small></div></div><div class="menuCard"><span class="menuIcon">🚚</span><div><b>Carros</b><small>Enviar, saquear y respetar CoK/NAP.</small></div></div><div class="menuCard"><span class="menuIcon">🍺</span><div><b>Taverna</b><small>Quests, apoyo, tesoros y piezas de mapa.</small></div></div><div class="menuCard"><span class="menuIcon">📜</span><div><b>Intel & quests</b><small>Intel, quests principales, diarias y de temporada.</small></div></div></div><div class="menuColumn"><h4>Barra inferior</h4><div class="menuCard"><span class="menuIcon">🐶</span><div><b>Rescue Dog</b><small>Mini-juego y recompensas.</small></div></div><div class="menuCard"><span class="menuIcon">🛡️</span><div><b>Pruebas</b><small>Aventura, facciones, arena y 3v3 sin pérdidas.</small></div></div><div class="menuCard"><span class="menuIcon">🦸</span><div><b>Héroes</b><small>Nivel, estrellas, skills, equipo, cristales, pergaminos.</small></div></div><div class="menuCard"><span class="menuIcon">🤝</span><div><b>Unión</b><small>Miembros, tienda, campaña, regalos, tecnología, ayuda, ciudad y logs.</small></div></div><div class="menuCard"><span class="menuIcon">🗺️</span><div><b>Mundo / Base</b><small>Mapa, base, recolección, marchas y combates.</small></div></div></div><div class="menuColumn"><h4>Lado derecho</h4><div class="menuCard"><span class="menuIcon">🛒</span><div><b>Tienda</b><small>Compras opcionales.</small></div></div><div class="menuCard"><span class="menuIcon">🎁</span><div><b>Value Events</b><small>Recompensas por tareas y posibles tiers de pago.</small></div></div><div class="menuCard"><span class="menuIcon">📋</span><div><b>Eventos</b><small>Leer reglas antes de gastar items.</small></div></div><div class="menuCard"><span class="menuIcon">⚔️</span><div><b>VS</b><small>Tema diario, semana, liga y acceso Kill Day.</small></div></div><div class="menuCard"><span class="menuIcon">✉️</span><div><b>Mail</b><small>Reportes, avisos, recompensas y sistema.</small></div></div><div class="menuCard"><span class="menuIcon">🎒</span><div><b>Bolsa</b><small>Items, recursos, speedups, shards, bestias y gear.</small></div></div></div></div><p class="menuNote"><b>Disciplina de títulos:</b> Los títulos de construcción/investigación son muy fuertes antes de mejoras largas. Coordinar con pocas personas evita caos y colas.</p></article>
<article class="guideBlock"><h3>2. Ciudad y edificios</h3><p>El castillo / sala principal es la puerta principal, pero rushearlo sin plan crea una cuenta vacía. Antes de cada mejora grande revisa qué edificios pide el siguiente nivel.</p><div class="prioList"><div><b>Castillo:</b> máxima prioridad estructural porque desbloquea edificios, tropas, funciones y techo de cuenta.</div><div><b>Edificios requisito:</b> sube lo que realmente pide el siguiente castillo o tu estrategia.</div><div><b>Centro de investigación:</b> prioridad alta porque multiplica casi todo lo demás.</div><div><b>Cuarteles / entrenamiento:</b> alinear con objetivos de tier de tropas. Mejores tropas valen más que CP cosmético.</div><div><b>Hospitales:</b> esenciales antes de Kill Day, Ruins, Royal City, CoK y PvP fuerte.</div><div><b>Producción y almacenes:</b> útiles, pero por debajo de castillo, investigación y tropas.</div></div><p class="guideWarn">Regla: mejoras largas antes de dormir/trabajar, speedups durante VS/Arm Race, ayuda de unión inmediatamente.</p></article>
<article class="guideBlock"><h3>3. Investigación</h3><p>La investigación es progreso permanente. No se ve tan espectacular como un héroe nuevo, pero escala todos los días.</p><div class="guideMatrix"><div class="guideMini"><b>Desarrollo</b><small>Velocidad de construcción, investigación, recolección, eficiencia y utilidad de marcha.</small></div><div class="guideMini"><b>Militar</b><small>ATQ, DEF, HP, tamaño de marcha, requisitos de tropas y eficiencia de curación.</small></div><div class="guideMini"><b>Eficiencia de eventos</b><small>Todo lo que ayuda a VS, Arm Race, recolección, stamina o recompensas repetidas.</small></div><div class="guideMini"><b>Union Research</b><small>Donar cada 8h es mejor que hacerlo al azar. Ayuda a toda la unión.</small></div></div><p>Prioridad: desbloquear cuellos de botella, luego estadísticas permanentes de combate. Centro de investigación parado = crecimiento perdido.</p></article>
<article class="guideBlock"><h3>4. Héroes y formaciones</h3><p>Los héroes no son solo CP. Definen daño, supervivencia, rallies, bosses y PvP. Construye primero un equipo core.</p><ul><li><strong>Core primero:</strong> tanque principal, daño principal y supports clave.</li><li><strong>Boss teams:</strong> daño single-target, bonus de facción, crítico/ATQ y skills de daño.</li><li><strong>PvP:</strong> durabilidad, counters, bonus de marcha y sinergia.</li><li><strong>Vouchers antes de universal shards:</strong> abre recompensas aleatorias primero, luego rellena huecos.</li><li><strong>Skill EXP Books:</strong> para héroes core o de boss damage; mejor breakpoints útiles que upgrades al azar.</li></ul></article>
<article class="guideBlock"><h3>5. Stats: ATQ / DEF / HP</h3><p>Cada stat vale según el rol. DPS quiere daño; tanque quiere sobrevivir; PvP y rallies necesitan equilibrio.</p><div class="statGrid"><div class="statCard"><b>ATQ / Attack</b><small>Mejor para damage dealers, World Boss, rallies y PvE rápido.</small></div><div class="statCard"><b>DEF / Defensa</b><small>Reduce daño recibido. Útil en tanques y defensa.</small></div><div class="statCard"><b>HP / Vida</b><small>Aumenta supervivencia. Muy importante en PvP y peleas largas.</small></div></div><p class="guideWarn">Simple: gear de daño a DPS, gear de supervivencia a tanques, utilidad donde las skills la usan.</p></article>
<article class="guideBlock"><h3>6. Equipo, cristales y pergaminos</h3><p>El gear separa cuentas fuertes de cuentas casuales. No subas todo igual si tu estrategia depende de héroes concretos.</p><ul><li><strong>Armas / daño:</strong> mejor en DPS principal y héroes de World Boss.</li><li><strong>Armadura / cascos:</strong> mejor en tanques y héroes que deben aguantar.</li><li><strong>Botas / piezas especiales:</strong> buenas si apoyan el rol o tipo de daño.</li><li><strong>Cristales legendarios:</strong> gastar donde cambia rendimiento, no solo CP.</li><li><strong>Pergaminos de gear:</strong> raros; para gear de largo plazo.</li><li><strong>Exclusive Equipment Shards:</strong> solo en héroes core o con rol claro de boss/PvP.</li></ul><p class="guideWarn">Buen upgrade = héroe core + rol correcto + breakpoint útil + timing de evento.</p></article>
<article class="guideBlock"><h3>7. Recursos y disciplina</h3><p>El juego empuja a gastar pronto. Las buenas cuentas esperan hasta que el mismo recurso puntúa en varios sistemas.</p><div class="upgradeFlow"><div class="flowStep"><b>Guardar</b><small>Mantén packs cerrados si puedes.</small></div><div class="flowStep"><b>Alinear</b><small>Comprueba día VS y ventana Arm Race.</small></div><div class="flowStep"><b>Gastar</b><small>Solo lo que pega al objetivo actual.</small></div><div class="flowStep"><b>Cola</b><small>Inicia el siguiente timer.</small></div><div class="flowStep"><b>Proteger</b><small>Escudo o gastar antes de offline.</small></div></div><p>Speedups, EXP, shards, skill books, cristales, pergaminos, stamina y vouchers valen más cuando también dan puntos de evento.</p></article>
<article class="guideBlock"><h3>8. Eventos: qué son y qué hacer</h3><p>Los eventos son el motor del progreso en X-Clash. Primero revisa calendario, luego combina VS con Arm Race y solo usa lo que da puntos o buenas recompensas.</p><div class="eventDeck"><div class="eventCard"><h4>Arm Race / Wettrüsten</h4><p>Ventanas cortas con una tarea concreta. Convierte mejoras normales en recompensas extra.</p><div class="eventMeta"><span>Solo</span><span>4h</span><span>Alto valor</span></div><ul><li><b class="eventDo">Qué hacer:</b> Abrir el calendario y esperar el tema correcto: construcción, investigación, entrenamiento, héroes, Mystic Beast o stamina.</li><li><b class="eventSave">Guardar / preparar:</b> Speedups, Hero EXP, vouchers, stamina y materiales de mejora.</li><li><b class="eventAvoid">Evitar:</b> Gastar en la ventana equivocada solo por terminar antes.</li></ul></div><div class="eventCard"><h4>VS / Union Duel</h4><p>Carrera semanal de puntos. Cada día premia acciones diferentes.</p><div class="eventMeta"><span>Unión</span><span>Semanal</span><span>Puntos</span></div><ul><li><b class="eventDo">Qué hacer:</b> Seguir el foco diario: Intel, construcción, investigación, héroes, entrenamiento y Kill Day. Combinar con Arm Race.</li><li><b class="eventSave">Guardar / preparar:</b> Speedups, shards, Hero EXP, tavern quests, carros e Intel para el día correcto.</li><li><b class="eventAvoid">Evitar:</b> Gastar al azar; baja tu puntuación y la de la unión.</li></ul></div><div class="eventCard"><h4>World Boss</h4><p>Prueba diaria de daño y fuente estable de recompensas.</p><div class="eventMeta"><span>Diario</span><span>Daño Boss</span><span>Facción</span></div><ul><li><b class="eventDo">Qué hacer:</b> Revisar el +50% de facción, usar el mejor equipo de daño y gear de daño, comparar resultados.</li><li><b class="eventSave">Guardar / preparar:</b> Mejores DPS, gear de daño, skills y pruebas de formación.</li><li><b class="eventAvoid">Evitar:</b> Enviar equipos aleatorios sin revisar facción, gear o resultado.</li></ul></div><div class="eventCard"><h4>Raging Bosses</h4><p>Ventanas temporales de boss, normalmente como World Boss rápido.</p><div class="eventMeta"><span>Timed</span><span>PvE</span></div><ul><li><b class="eventDo">Qué hacer:</b> Usar el mejor equipo de daño, completar golpes necesarios y reclamar recompensas antes del reset.</li><li><b class="eventSave">Guardar / preparar:</b> Equipo de boss, gear de daño y intentos/stamina si aplica.</li><li><b class="eventAvoid">Evitar:</b> Intentos débiles si la recompensa depende del daño.</li></ul></div><div class="eventCard"><h4>Union / Alliance Boss</h4><p>Jefe programado de unión. La puntualidad del grupo importa mucho.</p><div class="eventMeta"><span>Unión</span><span>Calendario</span><span>Rally</span></div><ul><li><b class="eventDo">Qué hacer:</b> Revisar calendario, entrar puntual, seguir orden de equipos/rally, curar y ayudar.</li><li><b class="eventSave">Guardar / preparar:</b> Marchas, tropas curadas, equipo correcto y recordatorio.</li><li><b class="eventAvoid">Evitar:</b> Espiar o entrar/iniciar desde muy lejos si rompe el timing.</li></ul></div><div class="eventCard"><h4>Ruins Battlefield / Ruins War</h4><p>Batalla fija de equipo con objetivos, hospitales y guarniciones.</p><div class="eventMeta"><span>Unión</span><span>Hora fija</span><span>Roles</span></div><ul><li><b class="eventDo">Qué hacer:</b> Entrar puntual, mantener hospitales/objetivos, poner equipos fuertes en guarnición y equipos menores en objetivos pequeños.</li><li><b class="eventSave">Guardar / preparar:</b> Hora elegida, recordatorio, tropas curadas y roles asignados.</li><li><b class="eventAvoid">Evitar:</b> Llegar tarde, cazar kills con objetivos vacíos o ignorar curación.</li></ul></div><div class="eventCard"><h4>Undead Treasure</h4><p>Evento activo de tesoro con zombies especiales/dorados y bosses.</p><div class="eventMeta"><span>Activo</span><span>Tienda</span></div><ul><li><b class="eventDo">Qué hacer:</b> Matar zombies especiales, generar bosses, ayudar a matarlos y gastar puntos en tienda.</li><li><b class="eventSave">Guardar / preparar:</b> Stamina y tiempo activo real en la ventana del evento.</li><li><b class="eventAvoid">Evitar:</b> Jugar medio AFK; el valor viene de buscar y reaccionar rápido.</li></ul></div><div class="eventCard"><h4>Campaign Attack / Class Boss</h4><p>Objetivo limitado de campaña o boss de clase.</p><div class="eventMeta"><span>Limitado</span><span>Boss</span><span>Clase</span></div><ul><li><b class="eventDo">Qué hacer:</b> Leer reglas de puntuación, usar clase requerida o mejor equipo de boss y completar intentos.</li><li><b class="eventSave">Guardar / preparar:</b> Clase/equipo correcto, intentos, buffs y calendario.</li><li><b class="eventAvoid">Evitar:</b> Salir de zonas especiales si los puntos dependen de esa zona.</li></ul></div><div class="eventCard"><h4>Zombie Overlord Invasion</h4><p>Gran presión de zombies/invasión. Coordinación y curación importan.</p><div class="eventMeta"><span>Unión</span><span>Mapa</span><span>Curación</span></div><ul><li><b class="eventDo">Qué hacer:</b> Coordinar golpes, usar equipos resistentes, revisar reportes y ajustar si hay muchas pérdidas.</li><li><b class="eventSave">Guardar / preparar:</b> Hospitales, ayudas, tropas curadas y equipos PvE fuertes.</li><li><b class="eventAvoid">Evitar:</b> Acumular heridos cuando la capacidad de curación está llena.</li></ul></div><div class="eventCard"><h4>Zombie Siege / Felbloom Invasion</h4><p>Evento de oleadas o invasión donde cuentan supervivencia y daño sostenido.</p><div class="eventMeta"><span>Oleadas</span><span>Defensa</span><span>AoE</span></div><ul><li><b class="eventDo">Qué hacer:</b> Preparar formación, curación y buffs antes del inicio. Usar AoE/sustain/PvE si se puede.</li><li><b class="eventSave">Guardar / preparar:</b> Hospitales, buffs, héroes defensivos y tiempo activo.</li><li><b class="eventAvoid">Evitar:</b> Empezar con hospitales llenos o tropas sin curar.</li></ul></div><div class="eventCard"><h4>Kill Day</h4><p>Día PvP de puntos. Protección vale tanto como atacar.</p><div class="eventMeta"><span>Sábado</span><span>PvP</span><span>Escudo</span></div><ul><li><b class="eventDo">Qué hacer:</b> Activar escudo si estás offline, durmiendo o sin reacción. Luchar solo objetivos controlados y curar bien.</li><li><b class="eventSave">Guardar / preparar:</b> Escudos, teleports, speedups de cura y tropas seguras.</li><li><b class="eventAvoid">Evitar:</b> Tropas expuestas, ataques emocionales y puntos gratis.</li></ul></div><div class="eventCard"><h4>Royal City / CoK / City Clash</h4><p>Control de mapa: ciudad, rey, guardianes y reglas cross-server.</p><div class="eventMeta"><span>Mapa</span><span>Diplomacia</span><span>NAP</span></div><ul><li><b class="eventDo">Qué hacer:</b> Reforzar objetivos asignados, seguir acuerdos y revisar calendario.</li><li><b class="eventSave">Guardar / preparar:</b> Equipos curados, teleports, escudos e instrucciones claras.</li><li><b class="eventAvoid">Evitar:</b> Atacar castillos/minas protegidas o romper NAP.</li></ul></div><div class="eventCard"><h4>Carros, Tavern y tareas diarias</h4><p>Acciones pequeñas que puntúan en el día correcto.</p><div class="eventMeta"><span>Diario</span><span>VS</span><span>NAP</span></div><ul><li><b class="eventDo">Qué hacer:</b> Enviar carros legendarios y tavern quests naranjas en el día VS correcto. En CoK, saquear carros del servidor enemigo.</li><li><b class="eventSave">Guardar / preparar:</b> Carros legendarios, quests naranjas y lista NAP.</li><li><b class="eventAvoid">Evitar:</b> Confundir carros con quests/cofres; pueden tener reglas distintas.</li></ul></div><div class="eventCard"><h4>Tesoros de temporada, minas y City Race</h4><p>Sistemas de temporada que corren junto al gameplay normal.</p><div class="eventMeta"><span>Temporada</span><span>Territorio</span><span>Unión</span></div><ul><li><b class="eventDo">Qué hacer:</b> Leer la página de temporada, limpiar zombies, reforzar capturas y seguir objetivos de minas/ciudades.</li><li><b class="eventSave">Guardar / preparar:</b> Stamina, teleports, recursos de temporada y tiempo coordinado.</li><li><b class="eventAvoid">Evitar:</b> Capturas solo que rompen el plan territorial.</li></ul></div><div class="eventCard"><h4>Faction Trials / modos challenge</h4><p>Checks PvE repetibles para equipos, facciones y formaciones.</p><div class="eventMeta"><span>PvE</span><span>Formación</span></div><ul><li><b class="eventDo">Qué hacer:</b> Usar intentos diarios, ajustar equipos y anotar qué facción/rol funciona mejor.</li><li><b class="eventSave">Guardar / preparar:</b> Héroes core, cambios de gear y skill books para daño.</li><li><b class="eventAvoid">Evitar:</b> Ignorar resultados; sirven para probar formaciones.</li></ul></div><div class="eventCard"><h4>Library Siege / eventos especiales</h4><p>Eventos ocasionales con reglas únicas. Primero tratarlos como eventos de calendario.</p><div class="eventMeta"><span>Especial</span><span>Timed</span><span>Reglas</span></div><ul><li><b class="eventDo">Qué hacer:</b> Leer la pantalla del evento, seguir timing de unión y lógica asignada.</li><li><b class="eventSave">Guardar / preparar:</b> Tiempo activo, equipo correcto y reclamar etapas/tienda antes del reset.</li><li><b class="eventAvoid">Evitar:</b> Gastar recursos raros antes de saber qué puntúa.</li></ul></div></div><p class="guideWarn">Prioridad: básicos diarios → día VS → Arm Race correcto → especiales → soporte unión → batallas con hora fija. Los buenos jugadores no hacen más clics; gastan en el momento correcto.</p></article>
<article class="guideBlock"><h3>9. Daily, VS y Arm Race</h3><p>Daily mantiene la cuenta; VS dice qué empujar; Arm Race dice cuándo empujarlo.</p><div class="guidePriority"><div><b>Lunes:</b> Intel, stamina, recolección, EXP de héroe, Mystic Beast.</div><div><b>Martes:</b> construcción, poder de edificios, wagons legendarios, taberna naranja, reclutamiento.</div><div><b>Miércoles:</b> investigación, tech power, Intel, cristales, cofres Mystic Beast.</div><div><b>Jueves:</b> héroes: vouchers primero, luego universal shards; EXP y skill books en ventana de héroes.</div><div><b>Viernes:</b> speedups mixtos, poder, entrenamiento y calendario Ruins.</div><div><b>Sábado:</b> Kill Day: escudo offline, pelear inteligente, curar con cuidado.</div><div><b>Domingo:</b> sin VS: preparar lunes, guardar Intel si es seguro, recolectar antes del reset.</div></div></article>
<article class="guideBlock"><h3>10. Solo y equipo</h3><p>Solo construye la cuenta; la unión convierte cuentas en control del mapa.</p><span class="tag">World Boss</span><span class="tag">Wagons</span><span class="tag">Ruins</span><span class="tag">Union Boss</span><span class="tag">CoK</span><span class="tag">Kill Day</span><span class="tag">Minas / ciudades</span><span class="tag">Season events</span><ul><li>Solo: colas activas, recolección, guardar recursos, usar ventanas, proteger tropas.</li><li>Equipo: rallies, donaciones, refuerzos, roles en Ruins y capturas.</li><li>Liderazgo: Daily → VS → Arm Race → Especiales → Soporte → Eventos.</li><li>NAP: revisar antes de wagons, taberna, minas, castillos, CoK y Kill Day.</li></ul></article>`,
