<section class="guideHero"><h3>Ideia central</h3><p>X-Clash não é só levar o castelo ao nível 30. O poder real vem de vários sistemas acumulados: edifícios liberam limites, pesquisa dá ganhos permanentes, heróis definem dano e formação, gear multiplica os heróis certos e o timing de eventos transforma os mesmos recursos em mais recompensas.</p><div class="guideSummary"><div class="guideMini"><b>Construir</b><small>Castelo, requisitos, centro de pesquisa, quartéis, hospitais, economia.</small></div><div class="guideMini"><b>Pesquisa</b><small>Força permanente: velocidade, economia, tropas, marcha e combate.</small></div><div class="guideMini"><b>Heróis</b><small>Estrelas, nível, skills, shards, funções e sinergia de facção.</small></div><div class="guideMini"><b>Gear</b><small>Equipamentos, cristais, pergaminhos e shards exclusivos nos heróis certos.</small></div></div></section>
<article class="guideBlock menuGuide"><h3>1. Mapa da tela, perfil e títulos</h3><p>A tela principal é o centro de comando. Os ícones controlam rotina diária, eventos, recompensas e buffs temporários.</p><div class="guideMatrix"><div class="guideMini"><b>Avatar / Home</b><small>Avatar, mudar nome grátis uma vez, nível, ID, poder, kills, união, servidor, rankings, skins, buffs, configurações e ajuda.</small></div><div class="guideMini"><b>Castelo do servidor / títulos</b><small>Se a união governante permitir, pedir títulos temporários para recursos, construção, pesquisa, cura ou treino.</small></div><div class="guideMini"><b>Skins com buffs</b><small>Molduras, castelos, nomes, Mystic Beast e efeitos podem dar ATQ, DEF ou HP.</small></div><div class="guideMini"><b>Regra</b><small>Antes de upgrades grandes: revisar VS, Arm Race, título, ajuda da união e segurança dos recursos.</small></div></div><div class="menuMap"><div class="menuColumn"><h4>Lado esquerdo</h4><div class="menuCard"><span class="menuIcon">🖼️</span><div><b>Avatar / Home</b><small>Perfil, ID, servidor, união, rankings, skins, configurações.</small></div></div><div class="menuCard"><span class="menuIcon">⚡</span><div><b>Stamina</b><small>Intel, zombies, bestas e eventos ativos. Usar na janela certa.</small></div></div><div class="menuCard"><span class="menuIcon">👑</span><div><b>VIP</b><small>Buffs e recompensas diárias.</small></div></div><div class="menuCard"><span class="menuIcon">🏗️</span><div><b>Construção / Pesquisa</b><small>Manter filas ativas; speedups só com bom timing.</small></div></div><div class="menuCard"><span class="menuIcon">🌡️</span><div><b>Calor da temporada</b><small>Frio, forno, fontes de calor e buffs.</small></div></div><div class="menuCard"><span class="menuIcon">📅</span><div><b>Calendário</b><small>Planejamento, anúncios e timing de eventos.</small></div></div><div class="menuCard"><span class="menuIcon">🚚</span><div><b>Carruagens</b><small>Enviar, saquear e respeitar CoK/NAP.</small></div></div><div class="menuCard"><span class="menuIcon">🍺</span><div><b>Taverna</b><small>Quests, apoio, tesouros e peças de mapa.</small></div></div><div class="menuCard"><span class="menuIcon">📜</span><div><b>Intel & quests</b><small>Intel, quests principais, diárias e de temporada.</small></div></div></div><div class="menuColumn"><h4>Barra inferior</h4><div class="menuCard"><span class="menuIcon">🐶</span><div><b>Rescue Dog</b><small>Mini-game e recompensas.</small></div></div><div class="menuCard"><span class="menuIcon">🛡️</span><div><b>Provas</b><small>Aventura, facções, arena e 3v3 sem perdas.</small></div></div><div class="menuCard"><span class="menuIcon">🦸</span><div><b>Heróis</b><small>Nível, estrelas, skills, gear, cristais, pergaminhos.</small></div></div><div class="menuCard"><span class="menuIcon">🤝</span><div><b>União</b><small>Membros, loja, campanha, presentes, tecnologia, ajuda, cidade e logs.</small></div></div><div class="menuCard"><span class="menuIcon">🗺️</span><div><b>Mundo / Base</b><small>Mapa, base, coleta, marchas e combates.</small></div></div></div><div class="menuColumn"><h4>Lado direito</h4><div class="menuCard"><span class="menuIcon">🛒</span><div><b>Loja</b><small>Compras opcionais.</small></div></div><div class="menuCard"><span class="menuIcon">🎁</span><div><b>Value Events</b><small>Recompensas por tarefas e tiers pagos.</small></div></div><div class="menuCard"><span class="menuIcon">📋</span><div><b>Eventos</b><small>Ler regras antes de gastar itens.</small></div></div><div class="menuCard"><span class="menuIcon">⚔️</span><div><b>VS</b><small>Tema diário, semana, liga e acesso Kill Day.</small></div></div><div class="menuCard"><span class="menuIcon">✉️</span><div><b>Mail</b><small>Relatórios, avisos, recompensas e sistema.</small></div></div><div class="menuCard"><span class="menuIcon">🎒</span><div><b>Bolsa</b><small>Itens, recursos, speedups, shards, bestas e gear.</small></div></div></div></div><p class="menuNote"><b>Disciplina de títulos:</b> Títulos de construção/pesquisa são muito fortes antes de upgrades longos. Coordinar com poucas pessoas evita caos e filas.</p></article>
<article class="guideBlock"><h3>2. Cidade e edifícios</h3><p>O castelo / salão principal é o grande portão, mas rushar sem plano cria uma conta oca. Antes de cada upgrade grande, confira o que o próximo nível realmente exige.</p><div class="prioList"><div><b>Castelo:</b> prioridade estrutural máxima porque libera edifícios, tiers de tropas, funções e teto da conta.</div><div><b>Edifícios requisito:</b> suba o que o próximo castelo ou sua estratégia realmente precisa.</div><div><b>Centro de pesquisa:</b> prioridade alta porque multiplica quase todos os sistemas.</div><div><b>Quartéis / treino:</b> alinhar com objetivos de tier de tropas. Tropas melhores valem mais que CP cosmético.</div><div><b>Hospitais:</b> essenciais antes de Kill Day, Ruins, Royal City, CoK e PvP pesado.</div><div><b>Produção e armazéns:</b> úteis, mas abaixo de castelo, pesquisa e tropas.</div></div><p class="guideWarn">Regra: upgrades longos antes de dormir/trabalhar, speedups durante VS/Arm Race, ajuda da união logo após iniciar.</p></article>
<article class="guideBlock"><h3>3. Pesquisa</h3><p>Pesquisa é progresso permanente. Parece menos dramática que um herói novo, mas escala todos os dias.</p><div class="guideMatrix"><div class="guideMini"><b>Desenvolvimento</b><small>Velocidade de construção, pesquisa, coleta, eficiência e utilidade de marcha.</small></div><div class="guideMini"><b>Militar</b><small>ATQ, DEF, HP, tamanho da marcha, requisitos de tropas e eficiência de cura.</small></div><div class="guideMini"><b>Eficiência de eventos</b><small>Tudo que ajuda VS, Arm Race, coleta, stamina ou recompensas repetidas.</small></div><div class="guideMini"><b>Union Research</b><small>Doar a cada 8h é melhor que doar aleatoriamente. Ajuda toda a união.</small></div></div><p>Prioridade: liberar gargalos, depois stats permanentes de combate. Centro de pesquisa parado = crescimento perdido.</p></article>
<article class="guideBlock"><h3>4. Heróis e formações</h3><p>Heróis não são só CP. Eles definem dano, sobrevivência, rallies, bosses e PvP. Construa primeiro um time core.</p><ul><li><strong>Core primeiro:</strong> tanque principal, dano principal e supports importantes.</li><li><strong>Times de boss:</strong> single-target damage, bônus de facção, crítico/ATQ e skills de dano.</li><li><strong>PvP:</strong> durabilidade, counters, bônus de marcha e sinergia.</li><li><strong>Vouchers antes de shards universais:</strong> abra recompensas aleatórias primeiro, depois complete lacunas.</li><li><strong>Skill EXP Books:</strong> para heróis core ou de boss damage; melhor breakpoint útil do que upgrade aleatório.</li></ul></article>
<article class="guideBlock"><h3>5. Stats: ATQ / DEF / HP</h3><p>Cada stat vale conforme a função. DPS quer dano; tanque quer sobreviver; PvP e rallies precisam de equilíbrio.</p><div class="statGrid"><div class="statCard"><b>ATQ / Attack</b><small>Melhor para damage dealers, World Boss, rallies e PvE rápido.</small></div><div class="statCard"><b>DEF / Defesa</b><small>Reduz dano recebido. Útil em tanques e defesa.</small></div><div class="statCard"><b>HP / Vida</b><small>Aumenta sobrevivência. Muito importante em PvP e lutas longas.</small></div></div><p class="guideWarn">Simples: gear de dano em DPS, gear de sobrevivência em tanques, utilidade onde as skills usam.</p></article>
<article class="guideBlock"><h3>6. Gear, cristais e pergaminhos</h3><p>Gear separa contas fortes de contas casuais. Não suba tudo igual se sua estratégia depende de heróis específicos.</p><ul><li><strong>Armas / dano:</strong> melhor em DPS principal e heróis de World Boss.</li><li><strong>Armadura / capacetes:</strong> melhor em tanques e heróis que precisam aguentar.</li><li><strong>Botas / peças especiais:</strong> boas se apoiam a função ou tipo de dano.</li><li><strong>Cristais lendários:</strong> use onde muda desempenho, não só CP.</li><li><strong>Pergaminhos de gear:</strong> raros; use em gear de longo prazo.</li><li><strong>Exclusive Equipment Shards:</strong> só em heróis core ou com papel claro em boss/PvP.</li></ul><p class="guideWarn">Bom upgrade = herói core + função certa + breakpoint útil + timing de evento.</p></article>
<article class="guideBlock"><h3>7. Recursos e disciplina</h3><p>O jogo tenta fazer você gastar cedo. Boas contas esperam até o mesmo recurso pontuar em vários sistemas.</p><div class="upgradeFlow"><div class="flowStep"><b>Guardar</b><small>Mantenha packs fechados se possível.</small></div><div class="flowStep"><b>Alinhar</b><small>Confira dia VS e janela Arm Race.</small></div><div class="flowStep"><b>Gastar</b><small>Use só o que acerta o objetivo.</small></div><div class="flowStep"><b>Fila</b><small>Inicie o próximo timer.</small></div><div class="flowStep"><b>Proteger</b><small>Escudo ou gastar antes de offline.</small></div></div><p>Speedups, EXP, shards, skill books, cristais, pergaminhos, stamina e vouchers valem mais quando também dão pontos de evento.</p></article>
<article class="guideBlock"><h3>8. Eventos: o que são e o que fazer</h3><p>Eventos são o motor do progresso em X-Clash. Primeiro veja o calendário, depois combine VS com Arm Race e só então use o que dá pontos ou boas recompensas.</p><div class="eventDeck"><div class="eventCard"><h4>Arm Race / Wettrüsten</h4><p>Janelas curtas com um tipo de tarefa. Transformam upgrades normais em recompensas extras.</p><div class="eventMeta"><span>Solo</span><span>4h</span><span>Alto valor</span></div><ul><li><b class="eventDo">O que fazer:</b> Abrir o calendário e esperar o tema certo: construção, pesquisa, treino, heróis, Mystic Beast ou stamina.</li><li><b class="eventSave">Guardar / preparar:</b> Speedups, Hero EXP, vouchers, stamina e materiais de upgrade.</li><li><b class="eventAvoid">Evitar:</b> Gastar na janela errada só para terminar rápido.</li></ul></div><div class="eventCard"><h4>VS / Union Duel</h4><p>Corrida semanal de pontos. Cada dia recompensa ações diferentes.</p><div class="eventMeta"><span>União</span><span>Semanal</span><span>Pontuação</span></div><ul><li><b class="eventDo">O que fazer:</b> Seguir o foco diário: Intel, construção, pesquisa, heróis, treino e Kill Day. Combinar com Arm Race.</li><li><b class="eventSave">Guardar / preparar:</b> Speedups, shards, Hero EXP, tavern quests, carruagens e Intel para o dia certo.</li><li><b class="eventAvoid">Evitar:</b> Gastar aleatoriamente; isso reduz sua pontuação e a da união.</li></ul></div><div class="eventCard"><h4>World Boss</h4><p>Teste diário de dano e fonte estável de recompensas.</p><div class="eventMeta"><span>Diário</span><span>Dano Boss</span><span>Facção</span></div><ul><li><b class="eventDo">O que fazer:</b> Conferir bônus de facção +50%, usar melhor time de dano e gear de dano, comparar resultados.</li><li><b class="eventSave">Guardar / preparar:</b> Melhores DPS, gear de dano, skills e testes de formação.</li><li><b class="eventAvoid">Evitar:</b> Enviar times aleatórios sem revisar facção, gear ou resultado.</li></ul></div><div class="eventCard"><h4>Raging Bosses</h4><p>Janelas temporárias de boss, normalmente como World Boss rápido.</p><div class="eventMeta"><span>Timed</span><span>PvE</span></div><ul><li><b class="eventDo">O que fazer:</b> Usar melhor time de dano, completar ataques necessários e coletar recompensas antes do reset.</li><li><b class="eventSave">Guardar / preparar:</b> Time de boss, gear de dano e tentativas/stamina se necessário.</li><li><b class="eventAvoid">Evitar:</b> Tentativas fracas se a recompensa depende do dano.</li></ul></div><div class="eventCard"><h4>Union / Alliance Boss</h4><p>Boss programado da união. Pontualidade do grupo vale muito.</p><div class="eventMeta"><span>União</span><span>Calendário</span><span>Rally</span></div><ul><li><b class="eventDo">O que fazer:</b> Conferir calendário, entrar pontualmente, seguir ordem de times/rally, curar e ajudar.</li><li><b class="eventSave">Guardar / preparar:</b> Marchas, tropas curadas, time certo e lembrete.</li><li><b class="eventAvoid">Evitar:</b> Espionar ou entrar/iniciar de longe se isso quebra o timing.</li></ul></div><div class="eventCard"><h4>Ruins Battlefield / Ruins War</h4><p>Batalha fixa de equipe com objetivos, hospitais e guarnições.</p><div class="eventMeta"><span>União</span><span>Hora fixa</span><span>Funções</span></div><ul><li><b class="eventDo">O que fazer:</b> Entrar no horário, manter hospitais/objetivos, colocar times fortes em guarnição e times menores em alvos menores.</li><li><b class="eventSave">Guardar / preparar:</b> Horário escolhido, lembrete, tropas curadas e funções.</li><li><b class="eventAvoid">Evitar:</b> Chegar tarde, caçar kills com objetivos vazios ou ignorar cura.</li></ul></div><div class="eventCard"><h4>Undead Treasure</h4><p>Evento ativo de tesouro com zombies especiais/dourados e bosses.</p><div class="eventMeta"><span>Ativo</span><span>Loja</span></div><ul><li><b class="eventDo">O que fazer:</b> Matar zombies especiais, gerar bosses, ajudar nos bosses e gastar pontos na loja.</li><li><b class="eventSave">Guardar / preparar:</b> Stamina e tempo ativo real na janela do evento.</li><li><b class="eventAvoid">Evitar:</b> Jogar meio AFK; o valor vem de caçar e reagir rápido.</li></ul></div><div class="eventCard"><h4>Campaign Attack / Class Boss</h4><p>Objetivo limitado de campanha ou boss de classe.</p><div class="eventMeta"><span>Limitado</span><span>Boss</span><span>Classe</span></div><ul><li><b class="eventDo">O que fazer:</b> Ler regras de pontuação, usar classe exigida ou melhor time de boss e concluir tentativas.</li><li><b class="eventSave">Guardar / preparar:</b> Classe/time correto, tentativas, buffs e calendário.</li><li><b class="eventAvoid">Evitar:</b> Sair de zonas especiais se os pontos dependem dessa zona.</li></ul></div><div class="eventCard"><h4>Zombie Overlord Invasion</h4><p>Grande pressão de zombies/invasão. Coordenação e cura importam.</p><div class="eventMeta"><span>União</span><span>Mapa</span><span>Cura</span></div><ul><li><b class="eventDo">O que fazer:</b> Coordenar ataques, usar times resistentes, revisar relatórios e ajustar se houver muitas perdas.</li><li><b class="eventSave">Guardar / preparar:</b> Hospitais, ajudas, tropas curadas e times PvE fortes.</li><li><b class="eventAvoid">Evitar:</b> Acumular feridos quando a cura está lotada.</li></ul></div><div class="eventCard"><h4>Zombie Siege / Felbloom Invasion</h4><p>Evento de ondas ou invasão onde sobrevivência e dano constante contam.</p><div class="eventMeta"><span>Ondas</span><span>Defesa</span><span>AoE</span></div><ul><li><b class="eventDo">O que fazer:</b> Preparar formação, cura e buffs antes do começo. Usar AoE/sustain/PvE se possível.</li><li><b class="eventSave">Guardar / preparar:</b> Hospitais, buffs, heróis defensivos e tempo ativo.</li><li><b class="eventAvoid">Evitar:</b> Começar com hospitais cheios ou tropas sem cura.</li></ul></div><div class="eventCard"><h4>Kill Day</h4><p>Dia PvP de pontos. Proteção vale tanto quanto ataque.</p><div class="eventMeta"><span>Sábado</span><span>PvP</span><span>Escudo</span></div><ul><li><b class="eventDo">O que fazer:</b> Ativar escudo se estiver offline, dormindo ou sem reação. Lutar só alvos controlados e curar bem.</li><li><b class="eventSave">Guardar / preparar:</b> Escudos, teleports, speedups de cura e tropas seguras.</li><li><b class="eventAvoid">Evitar:</b> Tropas expostas, ataques emocionais e pontos grátis.</li></ul></div><div class="eventCard"><h4>Royal City / CoK / City Clash</h4><p>Controle de mapa: cidade, rei, guardas e regras cross-server.</p><div class="eventMeta"><span>Mapa</span><span>Diplomacia</span><span>NAP</span></div><ul><li><b class="eventDo">O que fazer:</b> Reforçar objetivos designados, seguir acordos e revisar calendário.</li><li><b class="eventSave">Guardar / preparar:</b> Times curados, teleports, escudos e instruções claras.</li><li><b class="eventAvoid">Evitar:</b> Atacar castelos/minas protegidos ou quebrar NAP.</li></ul></div><div class="eventCard"><h4>Carruagens, Taverna e tarefas diárias</h4><p>Ações pequenas que pontuam no dia certo.</p><div class="eventMeta"><span>Diário</span><span>VS</span><span>NAP</span></div><ul><li><b class="eventDo">O que fazer:</b> Enviar carruagens lendárias e tavern quests laranjas no dia VS correto. No CoK, saquear carruagens do servidor inimigo.</li><li><b class="eventSave">Guardar / preparar:</b> Carruagens lendárias, quests laranjas e lista NAP.</li><li><b class="eventAvoid">Evitar:</b> Confundir carruagens com quests/baús; podem ter regras diferentes.</li></ul></div><div class="eventCard"><h4>Tesouros de temporada, minas e City Race</h4><p>Sistemas de temporada que rodam junto ao gameplay normal.</p><div class="eventMeta"><span>Temporada</span><span>Território</span><span>União</span></div><ul><li><b class="eventDo">O que fazer:</b> Ler a página da temporada, limpar zombies, reforçar capturas e seguir alvos de minas/cidades.</li><li><b class="eventSave">Guardar / preparar:</b> Stamina, teleports, recursos de temporada e tempo coordenado.</li><li><b class="eventAvoid">Evitar:</b> Capturas solo que quebram o plano territorial.</li></ul></div><div class="eventCard"><h4>Faction Trials / modos challenge</h4><p>Checks PvE repetíveis para times, facções e formações.</p><div class="eventMeta"><span>PvE</span><span>Formação</span></div><ul><li><b class="eventDo">O que fazer:</b> Usar tentativas diárias, ajustar times e notar qual facção/função funciona melhor.</li><li><b class="eventSave">Guardar / preparar:</b> Heróis core, troca de gear e skill books para dano.</li><li><b class="eventAvoid">Evitar:</b> Ignorar resultados; trials servem para testar formações.</li></ul></div><div class="eventCard"><h4>Library Siege / eventos especiais</h4><p>Eventos ocasionais com regras únicas. Primeiro trate como evento de calendário.</p><div class="eventMeta"><span>Especial</span><span>Timed</span><span>Regras</span></div><ul><li><b class="eventDo">O que fazer:</b> Ler a tela do evento, seguir timing da união e lógica designada.</li><li><b class="eventSave">Guardar / preparar:</b> Tempo ativo, time correto e coletar etapas/loja antes do reset.</li><li><b class="eventAvoid">Evitar:</b> Gastar recursos raros antes de saber o que pontua.</li></ul></div></div><p class="guideWarn">Prioridade: básicos diários → dia VS → Arm Race correto → especiais → suporte união → batalhas com horário fixo. Bons jogadores não clicam mais; gastam no momento certo.</p></article>
<article class="guideBlock"><h3>9. Daily, VS e Arm Race</h3><p>Daily mantém a conta; VS diz o que empurrar; Arm Race diz quando empurrar.</p><div class="guidePriority"><div><b>Segunda:</b> Intel, stamina, coleta, EXP de herói, Mystic Beast.</div><div><b>Terça:</b> construção, poder de edifícios, wagons lendários, taverna laranja, recrutamento.</div><div><b>Quarta:</b> pesquisa, tech power, Intel, cristais, baús Mystic Beast.</div><div><b>Quinta:</b> heróis: vouchers primeiro, depois shards universais; EXP e skill books na janela de heróis.</div><div><b>Sexta:</b> speedups mistos, poder, treino e calendário Ruins.</div><div><b>Sábado:</b> Kill Day: escudo offline, lutar inteligente, curar com cuidado.</div><div><b>Domingo:</b> sem VS: preparar segunda, guardar Intel se for seguro, coletar antes do reset.</div></div></article>
<article class="guideBlock"><h3>10. Solo e equipe</h3><p>Solo constrói a conta; a união transforma contas em controle do mapa.</p><span class="tag">World Boss</span><span class="tag">Wagons</span><span class="tag">Ruins</span><span class="tag">Union Boss</span><span class="tag">CoK</span><span class="tag">Kill Day</span><span class="tag">Minas / cidades</span><span class="tag">Season events</span><ul><li>Solo: filas ativas, coleta, guardar recursos, usar janelas, proteger tropas.</li><li>Equipe: rallies, doações, reforços, funções em Ruins e capturas.</li><li>Liderança: Daily → VS → Arm Race → Especiais → Suporte → Eventos.</li><li>NAP: revisar antes de wagons, taverna, minas, castelos, CoK e Kill Day.</li></ul></article>`};
