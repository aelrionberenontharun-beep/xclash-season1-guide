<title>X-Clash Command Hub</title>
<style>
:root{--bg:#07111f;--panel:#0e2035;--text:#f5fbff;--muted:#bad0e3;--line:rgba(255,255,255,.16);--accent:#8be9ff;--gold:#f7d46b;--red:#fb7185;--green:#86efac}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:"Aptos Display","Trebuchet MS","Segoe UI Variable","Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(135deg,#07111f,#24150a 62%,#07111f);color:var(--text);line-height:1.55}button,select,input,textarea{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;background:rgba(5,10,20,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}.brand{font-weight:1000}.brand small{display:block;color:var(--muted);font-weight:650;font-size:12px}.flags{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.flags button{min-width:54px;height:40px;border-radius:13px;border:1px solid rgba(255,224,138,.28);background:linear-gradient(145deg,rgba(242,196,103,.22),rgba(255,255,255,.10));color:#fff7dc;font-size:14px;font-weight:1000;letter-spacing:0;text-shadow:0 2px 8px rgba(0,0,0,.6)}.flags button.active{border-color:var(--gold);background:linear-gradient(135deg,#f7d46b,#d7953b);color:#111827;text-shadow:none}
main{max-width:1220px;margin:auto;padding:16px 12px 96px}.page{display:none}.page.active{display:block}.hero,.card,.tile{border:1px solid var(--line);border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.04));box-shadow:0 18px 58px rgba(0,0,0,.28)}.hero{overflow:hidden}.heroText{text-align:center;padding:22px}.hero h1{font-size:clamp(2rem,8vw,5rem);line-height:.9;margin:0;text-transform:uppercase}.hero p{font-weight:850;color:var(--accent);font-size:clamp(1rem,3vw,1.5rem);margin:.7rem 0 0}.hero img{display:block;width:100%;height:auto}.lead{text-align:center;color:var(--muted);font-size:1.05rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
.guideStack{display:grid;grid-template-columns:1fr;gap:12px;margin:16px 0 18px}.guideStack .tile{min-height:108px;border-left:5px solid var(--accent)}.guideStack .tile.seasonWinter{background:linear-gradient(135deg,rgba(139,233,255,.22),rgba(255,255,255,.055));border-left-color:#8be9ff}.guideStack .tile.seasonDesert{background:linear-gradient(135deg,rgba(247,212,107,.24),rgba(255,255,255,.055));border-left-color:#f3b35b}.guideContent{display:grid;gap:14px}.guideBlock{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.075);padding:18px;box-shadow:0 12px 34px rgba(0,0,0,.20)}.guideBlock h3{margin:.1rem 0 .5rem;color:var(--accent);font-size:1.2rem}.guideBlock p{color:var(--muted);margin:.2rem 0 .8rem}.guideBlock ul{margin:.4rem 0 0;padding-left:20px}.guideBlock li{margin:.35rem 0}.guidePriority{display:grid;gap:10px;margin-top:10px}.guidePriority div{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(2,6,23,.35)}.guidePriority b{color:var(--gold)}
.tile{text-align:left;color:var(--text);padding:18px;min-height:136px}.tile:hover{border-color:var(--accent);transform:translateY(-2px)}.tile span{font-size:34px;display:block}.tile b{font-size:1.3rem;display:block;margin:8px 0}.tile small{color:var(--muted)}.card{padding:16px;margin-bottom:14px}.card h2,.card h3{color:var(--accent);margin-top:0}
.pills{display:flex;gap:8px;margin-bottom:12px;overflow:auto}.pills button,.btn,.platform button{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.08);color:var(--text);font-weight:850;padding:10px 12px}.pills button.active,.platform button.active,.primary{background:linear-gradient(135deg,var(--gold),var(--accent));color:#07111f;border:0}label{display:block;color:var(--muted);font-size:13px;margin:10px 0 5px;font-weight:800}input,select,textarea{width:100%;font-size:16px;color:var(--text);background:rgba(2,6,23,.68);border:1px solid var(--line);border-radius:14px;padding:11px;outline:none}textarea{resize:vertical}.row,.timeGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1.2fr .9fr .9fr;gap:10px}.platform{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tick{margin:0;background:rgba(2,6,23,.45);border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center}.result{white-space:pre-wrap;background:rgba(2,6,23,.55);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:12px;color:#dbeafe}.timeItem{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(2,6,23,.45)}.timeItem b{display:block;color:var(--muted);font-size:12px}.timeItem span{font-weight:900}.count{font-size:13px;color:var(--muted);font-weight:850}.count.over{color:var(--red)}
.seasonShell{display:grid;grid-template-columns:280px 1fr;gap:16px}.seasonSide{position:sticky;top:74px;align-self:start}.chapterList{display:grid;gap:8px}.chapterList a{border:1px solid var(--line);border-radius:14px;padding:9px 10px;color:var(--muted);background:rgba(255,255,255,.06)}.chapter{background:rgba(255,255,255,.075);border:1px solid var(--line);border-radius:24px;padding:20px;margin:14px 0}.chapter h2{color:var(--accent)}.chapter li{margin:.45rem 0}.chapter-card{min-height:118px}.guideBlock,.guideHero{scroll-margin-top:92px}.gameplaySide .btn{width:100%;margin-bottom:10px}.gameplayShell .chapterList a.active{border-color:var(--gold);background:rgba(247,212,107,.16);color:var(--text)}.hidden{display:none}.napRow{display:grid;grid-template-columns:82px 82px 1fr;gap:8px;margin-bottom:8px}.napOpts{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:35;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(5,10,20,.94);border-top:1px solid var(--line);backdrop-filter:blur(16px)}.bottom button{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.08);color:var(--text);padding:9px 5px;font-size:12px;font-weight:850}.bottom button.active{border-color:var(--gold);background:rgba(247,212,107,.16)}@media(max-width:520px){.bottom{gap:4px;padding-left:6px;padding-right:6px}.bottom button{font-size:10px;padding:8px 2px;border-radius:12px}}.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(12px);opacity:0;transition:.2s;background:#fff;color:#111;padding:10px 14px;border-radius:99px;font-weight:900;z-index:80}.toast.show{opacity:1;transform:translateX(-50%)}
@media(max-width:860px){.grid,.seasonShell,.row,.row3,.timeGrid{grid-template-columns:1fr}.checks{grid-template-columns:1fr 1fr}.platform{grid-template-columns:1fr}.seasonSide{position:static}.brand small{display:none}.napRow{grid-template-columns:1fr 1fr}.napOpts{grid-template-columns:1fr 1fr}}

/* Visual polish + scene effects */
body{position:relative;overflow-x:hidden;transition:background .55s ease,color .25s ease}
body:before{content:"";position:fixed;inset:-20%;z-index:-3;pointer-events:none;background:
 radial-gradient(circle at 12% 12%,rgba(139,233,255,.22),transparent 24%),
 radial-gradient(circle at 86% 18%,rgba(247,212,107,.22),transparent 26%),
 radial-gradient(circle at 52% 108%,rgba(167,139,250,.16),transparent 34%);
 animation:ambientDrift 18s ease-in-out infinite alternate;filter:saturate(1.2)}
body:after{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.26;background:
 linear-gradient(115deg,transparent 0 42%,rgba(255,255,255,.09) 45%,transparent 49%),
 repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 1px,transparent 1px 44px);
 mask-image:linear-gradient(to bottom,black,transparent 88%)}
@keyframes ambientDrift{0%{transform:translate3d(-1%,0,0) scale(1)}100%{transform:translate3d(1.5%,1%,0) scale(1.04)}}
body.scene-home{background:radial-gradient(circle at 18% 10%,rgba(255,226,143,.30),transparent 24%),radial-gradient(circle at 86% 18%,rgba(87,210,198,.18),transparent 28%),linear-gradient(135deg,#221407 0%,#7a4a1d 38%,#d7a85b 62%,#1d2b30 100%)}
body.scene-game,body.scene-gameplay{background:linear-gradient(135deg,#07111f 0%,#11294a 42%,#2e173f 78%,#07111f 100%)}
body.scene-tools{background:linear-gradient(135deg,#050611 0%,#0d233f 38%,#311848 76%,#050611 100%)}
body.scene-seasons{background:linear-gradient(135deg,#061a30 0%,#2b190d 50%,#07111f 100%)}
body.scene-settings{background:linear-gradient(135deg,#07111f 0%,#162235 50%,#111827 100%)}
body.scene-winter{--accent:#8be9ff;--gold:#ffffff;background:linear-gradient(135deg,#03111f 0%,#0d2c4f 52%,#e8fbff 170%)}
body.scene-desert{--accent:#f3b35b;--gold:#f7d46b;background:linear-gradient(135deg,#1b0f08 0%,#5d3517 52%,#f7d46b 170%)}
main{position:relative;z-index:2}.top,.bottom{z-index:40}.bottom{z-index:45}
#fx{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;opacity:.86}.fx{position:absolute;will-change:transform,opacity}.fx.flake{top:-8vh;color:#e7fbff;text-shadow:0 0 12px rgba(139,233,255,.95);animation:fallSnow linear infinite}.fx.sand{left:-12vw;width:9px;height:3px;border-radius:999px;background:#f7c071;box-shadow:0 0 12px rgba(247,192,113,.75);animation:sandDrift linear infinite}.fx.spark{width:5px;height:5px;border-radius:50%;background:rgba(247,212,107,.95);box-shadow:0 0 16px rgba(247,212,107,.85);animation:sparkRise linear infinite}.fx.ember{width:6px;height:6px;border-radius:55% 45% 55% 45%;background:#fb923c;box-shadow:0 0 16px rgba(251,146,60,.8);animation:emberRise linear infinite}.fx.rune{font-size:18px;color:rgba(167,139,250,.72);text-shadow:0 0 14px rgba(167,139,250,.8);animation:runeFloat ease-in-out infinite}.fx.streak{height:2px;width:96px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(139,233,255,.82),transparent);filter:blur(.2px);animation:streakSlide linear infinite}.fx.leaf{font-size:18px;color:rgba(134,239,172,.72);text-shadow:0 0 12px rgba(134,239,172,.75);animation:leafFloat linear infinite}
@keyframes fallSnow{from{transform:translate3d(0,-10vh,0) rotate(0deg);opacity:.1}15%{opacity:.95}to{transform:translate3d(var(--dx),112vh,0) rotate(360deg);opacity:.25}}
@keyframes sandDrift{from{transform:translate3d(-12vw,var(--y),0) rotate(0deg);opacity:.08}12%{opacity:.72}to{transform:translate3d(118vw,calc(var(--y) - 22vh),0) rotate(18deg);opacity:.08}}
@keyframes sparkRise{from{transform:translate3d(var(--x),108vh,0) scale(.65);opacity:0}15%{opacity:.85}to{transform:translate3d(calc(var(--x) + var(--dx)), -8vh,0) scale(1.15);opacity:0}}
@keyframes emberRise{from{transform:translate3d(var(--x),110vh,0) rotate(0deg);opacity:0}15%{opacity:.9}to{transform:translate3d(calc(var(--x) + var(--dx)), -12vh,0) rotate(240deg);opacity:0}}
@keyframes runeFloat{0%{transform:translate3d(var(--x),var(--y),0) rotate(-8deg);opacity:.12}50%{opacity:.72}100%{transform:translate3d(calc(var(--x) + var(--dx)),calc(var(--y) - 14vh),0) rotate(8deg);opacity:.08}}
@keyframes streakSlide{from{transform:translate3d(-20vw,var(--y),0) rotate(-18deg);opacity:0}20%{opacity:.65}to{transform:translate3d(120vw,calc(var(--y) - 18vh),0) rotate(-18deg);opacity:0}}
@keyframes leafFloat{from{transform:translate3d(var(--x),-8vh,0) rotate(0deg);opacity:0}20%{opacity:.72}to{transform:translate3d(calc(var(--x) + var(--dx)),108vh,0) rotate(300deg);opacity:.08}}
.hero,.card,.tile,.chapter{position:relative;overflow:hidden;backdrop-filter:blur(9px);transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease,background .35s ease}.hero{background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.045)),radial-gradient(circle at 20% 10%,rgba(139,233,255,.24),transparent 30%),radial-gradient(circle at 86% 20%,rgba(247,212,107,.22),transparent 28%)}.heroText{background:linear-gradient(180deg,rgba(3,8,18,.48),rgba(3,8,18,.08))}.card:before,.tile:before,.chapter:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.10),transparent 38%,rgba(255,255,255,.035));opacity:.72}.tile:after{content:"";position:absolute;right:-54px;bottom:-64px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,var(--accent),transparent 64%);opacity:.14;filter:blur(1px)}.tile:hover,.card:hover{box-shadow:0 24px 70px rgba(0,0,0,.34),0 0 36px rgba(139,233,255,.08)}.grid .tile:nth-child(1){background:linear-gradient(135deg,rgba(139,233,255,.20),rgba(255,255,255,.055))}.grid .tile:nth-child(2){background:linear-gradient(135deg,rgba(167,139,250,.21),rgba(255,255,255,.055))}.grid .tile:nth-child(3){background:linear-gradient(135deg,rgba(247,212,107,.22),rgba(255,255,255,.055))}.grid .tile:nth-child(4){background:linear-gradient(135deg,rgba(134,239,172,.18),rgba(255,255,255,.055))}.guideStack .tile:nth-child(1){background:linear-gradient(135deg,rgba(167,139,250,.24),rgba(139,233,255,.10))}.seasonWinter,.scene-winter .card,.scene-winter .chapter{background:linear-gradient(135deg,rgba(139,233,255,.24),rgba(255,255,255,.065)),rgba(4,20,38,.62)!important;border-color:rgba(139,233,255,.34)}.seasonDesert,.scene-desert .card,.scene-desert .chapter{background:linear-gradient(135deg,rgba(243,179,91,.27),rgba(91,46,13,.13)),rgba(53,29,12,.66)!important;border-color:rgba(243,179,91,.34)}.scene-tools .card{background:linear-gradient(145deg,rgba(125,211,252,.14),rgba(167,139,250,.10)),rgba(4,9,20,.66)}.scene-game .card,.scene-gameplay .card,.scene-gameplay .guideBlock{background:linear-gradient(145deg,rgba(139,233,255,.14),rgba(247,212,107,.08)),rgba(5,14,26,.70)}.guideBlock{overflow:hidden}.guideBlock:after{content:"⚔️";position:absolute;right:14px;top:8px;font-size:42px;opacity:.08}.guideBlock:nth-child(2):after{content:"🕒"}.guideBlock:nth-child(3):after{content:"🧭"}.guideBlock:nth-child(4):after{content:"🤝"}.guideBlock:nth-child(5):after{content:"📣"}.timeItem{background:linear-gradient(145deg,rgba(139,233,255,.12),rgba(2,6,23,.42))}.primary{box-shadow:0 0 26px rgba(139,233,255,.18),0 0 18px rgba(247,212,107,.16)}
@media(prefers-reduced-motion:reduce){#fx,.fx,body:before{animation:none!important;display:none!important}.hero,.card,.tile,.chapter{transition:none!important}}


.guideHero{border:1px solid var(--line);border-radius:24px;padding:20px;background:linear-gradient(135deg,rgba(139,233,255,.18),rgba(167,139,250,.10),rgba(247,212,107,.09));box-shadow:0 18px 52px rgba(0,0,0,.24)}
.guideHero h3{margin:.1rem 0 .4rem;color:var(--accent);font-size:1.35rem}.guideHero p{margin:.2rem 0;color:var(--muted)}
.guideSummary,.guideMatrix,.statGrid,.upgradeFlow{display:grid;gap:10px;margin-top:12px}.guideSummary{grid-template-columns:repeat(4,minmax(0,1fr))}.guideMatrix{grid-template-columns:repeat(2,minmax(0,1fr))}.statGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.upgradeFlow{grid-template-columns:repeat(5,minmax(0,1fr))}
.guideMini,.statCard,.flowStep{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(2,6,23,.36)}.guideMini b,.statCard b,.flowStep b{color:var(--gold);display:block;margin-bottom:4px}.guideMini small,.statCard small,.flowStep small{color:var(--muted);display:block;line-height:1.35}.guideBlock .tag{display:inline-block;margin:3px 5px 3px 0;padding:4px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.08);font-size:.84rem;color:#dbeafe}.eventDeck{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px}.eventCard{border:1px solid var(--line);border-radius:18px;padding:14px;background:linear-gradient(145deg,rgba(2,6,23,.42),rgba(255,255,255,.055));box-shadow:0 12px 32px rgba(0,0,0,.18)}.eventCard h4{margin:0 0 8px;color:var(--gold);font-size:1rem}.eventCard p{margin:0 0 8px;color:#eef6ff}.eventCard ul{margin:0;padding-left:19px}.eventCard li{margin:.32rem 0}.eventMeta{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0}.eventMeta span{border:1px solid var(--line);border-radius:999px;padding:3px 8px;background:rgba(255,255,255,.08);font-size:.78rem;color:#dbeafe}.eventDo{color:#86efac;font-weight:850}.eventAvoid{color:#fb7185;font-weight:850}.eventSave{color:#f7d46b;font-weight:850}.eventCalendar{color:#8be9ff;font-weight:850}.guideWarn{border-left:4px solid var(--gold);padding:11px 13px;border-radius:14px;background:rgba(247,212,107,.10);color:#f8fafc;margin:10px 0}.guideBlock strong{color:#f8fafc}.prioList{counter-reset:prio;display:grid;gap:9px;margin-top:10px}.prioList div{counter-increment:prio;border:1px solid var(--line);border-radius:16px;padding:11px 12px 11px 46px;background:rgba(2,6,23,.36);position:relative}.prioList div:before{content:counter(prio);position:absolute;left:12px;top:12px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--accent));color:#07111f;font-weight:1000}.prioList b{color:var(--gold)}
@media(max-width:860px){.guideSummary,.guideMatrix,.statGrid,.upgradeFlow,.eventDeck,.menuMap,.menuGuide .guideMatrix{grid-template-columns:1fr}.guideHero{padding:16px}}


.menuMap{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px}.menuColumn{border:1px solid var(--line);border-radius:18px;padding:12px;background:linear-gradient(145deg,rgba(2,6,23,.42),rgba(255,255,255,.055));box-shadow:0 12px 32px rgba(0,0,0,.16)}.menuColumn h4{margin:0 0 10px;color:var(--gold);font-size:1rem}.menuCard{display:grid;grid-template-columns:34px 1fr;gap:9px;align-items:start;border:1px solid rgba(255,255,255,.11);border-radius:14px;padding:9px;margin:7px 0;background:rgba(255,255,255,.055)}.menuCard .menuIcon{font-size:24px;line-height:1}.menuCard b{display:block;color:#f8fafc;font-size:.92rem;line-height:1.15}.menuCard small{display:block;color:var(--muted);font-size:.82rem;line-height:1.28;margin-top:2px}.menuNote{border-left:4px solid var(--accent);padding:10px 12px;border-radius:14px;background:rgba(139,233,255,.10);margin:12px 0 0;color:#eef6ff}.menuGuide .guideMatrix{grid-template-columns:repeat(2,minmax(0,1fr))}

/* Codex mobile/NAP refinement */
@media(max-width:760px){
  main{padding-left:10px;padding-right:10px}
  .grid,.seasonShell,.row,.row3,.timeGrid,.guideSummary,.guideMatrix,.statGrid,.upgradeFlow,.eventDeck,.menuMap,.menuGuide .guideMatrix{grid-template-columns:1fr!important}
  .card,.tile,.chapter,.guideBlock,.guideHero,.menuColumn{border-radius:18px;padding:14px}
  .guideMini,.statCard,.flowStep,.menuCard{width:100%;min-width:0}
  .menuCard{grid-template-columns:34px minmax(0,1fr)}
  .menuCard b,.guideMini b{overflow-wrap:anywhere}
  .checks{grid-template-columns:1fr 1fr}
  .napRow{display:grid;grid-template-columns:3.9rem 3.7rem repeat(4,minmax(34px,1fr));gap:6px;align-items:center;margin:7px 0}
  .napRow input[type=text]{min-width:0;text-align:center;padding-left:5px;padding-right:5px;text-transform:uppercase}
  .napMini{height:42px;display:grid;place-items:center;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);font-weight:900}
  .napMini input{position:absolute;opacity:0;pointer-events:none}
  .napMini span{font-size:1.04rem;line-height:1}
  .napMini:has(input:checked){border-color:rgba(247,212,107,.85);box-shadow:0 0 0 1px rgba(247,212,107,.35) inset;background:rgba(247,212,107,.16);color:#fff7cc}
  .napLegend{display:grid;grid-template-columns:3.9rem 3.7rem repeat(4,minmax(34px,1fr));gap:6px;margin:8px 0 4px;color:var(--muted);font-size:.72rem;font-weight:800;text-align:center}
}
@media(min-width:761px){
  .napRow{display:grid;grid-template-columns:90px 90px repeat(4,64px);gap:8px;align-items:center;margin:8px 0}
  .napMini{height:44px;display:grid;place-items:center;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);font-weight:900}
  .napMini input{position:absolute;opacity:0;pointer-events:none}
  .napMini:has(input:checked){border-color:rgba(247,212,107,.85);box-shadow:0 0 0 1px rgba(247,212,107,.35) inset;background:rgba(247,212,107,.16)}
  .napLegend{display:grid;grid-template-columns:90px 90px repeat(4,64px);gap:8px;margin:8px 0 4px;color:var(--muted);font-size:.78rem;font-weight:850;text-align:center}
}


/* iOS/mobile readability and publication protection notes */
.archiveFooter{max-width:1220px;margin:0 auto 86px;padding:14px 12px 20px;color:#d6e4f2;font-size:.82rem;line-height:1.45}
.archiveFooter .archiveNotice{border:1px solid rgba(214,228,242,.18);border-radius:16px;background:linear-gradient(145deg,rgba(4,10,22,.92),rgba(10,20,38,.88));padding:12px 14px;box-shadow:0 12px 32px rgba(0,0,0,.26)}
.archiveFooter b{color:#f8fbff}
@media(max-width:900px){
  :root{--text:#f8fbff;--muted:#d6e4f2;--line:rgba(214,228,242,.24)}

/* Codex iOS tool surface fix: readable dark cards, stable checkboxes, full-width actions */
@media(max-width:900px){
  html,body{min-height:100%;background:#050b16!important}
  main{background:linear-gradient(180deg,rgba(5,11,22,.98),rgba(8,14,28,.96))!important}
  .page{background:transparent!important}
  .scene-tools main,.scene-gameplay main,.scene-game main{background:linear-gradient(180deg,rgba(4,10,22,.98),rgba(9,18,36,.96))!important}

  .hero,.card,.tile,.chapter,.guideBlock,.guideHero,.menuColumn,.eventCard,.timeItem,.result,.tick,.menuCard,.guideMini{
    background-color:#081225!important;
    background-image:linear-gradient(145deg,rgba(6,15,31,.99),rgba(13,27,52,.96))!important;
    color:#f8fbff!important;
    -webkit-backdrop-filter:none!important;
    backdrop-filter:none!important;
  }
  .scene-winter .card,.scene-winter .chapter,.scene-winter .tile,.seasonWinter{
    background-image:linear-gradient(145deg,rgba(5,22,42,.99),rgba(10,38,66,.96))!important;

  .scene-desert .card,.scene-desert .chapter,.scene-desert .tile,.seasonDesert{
    background-image:linear-gradient(145deg,rgba(30,16,8,.99),rgba(61,34,14,.96))!important;
  }
  .card:before,.tile:before,.chapter:before,.guideBlock:after,.tile:after{
    display:none!important;
    content:none!important;
  }
  .card>*,
  .tile>*,
  .chapter>*,
  .guideBlock>*,
  .guideHero>*{
    position:relative;
    z-index:1;
  }

  .checks{grid-template-columns:1fr!important;gap:9px!important}
  .tick{
    width:100%!important;
    min-height:48px!important;
    display:grid!important;
    grid-template-columns:28px minmax(0,1fr)!important;
    align-items:center!important;
    gap:10px!important;
    padding:10px 12px!important;
    overflow:visible!important;
    background:linear-gradient(145deg,rgba(4,10,22,.98),rgba(11,22,42,.96))!important;
  }
  .tick input[type="checkbox"]{
    -webkit-appearance:none!important;
    appearance:none!important;
    width:24px!important;
    height:24px!important;
    min-width:24px!important;
    margin:0!important;
    border-radius:8px!important;
    border:2px solid rgba(214,228,242,.7)!important;

    box-shadow:0 2px 8px rgba(0,0,0,.45)!important;

  .tick input[type="checkbox"]:checked{
    background:linear-gradient(135deg,#77f28f,#f7d46b)!important;
    border-color:#f7d46b!important;
    box-shadow:0 0 0 2px rgba(247,212,107,.18),0 0 16px rgba(134,239,172,.38)!important;
  }
  .tick input[type="checkbox"]:checked::after{
    content:"✓";
    display:grid;
    place-items:center;
    color:#07111f;
    font-weight:1000;
    font-size:17px;
    line-height:20px;
  }
  .tick span{
    display:block!important;
    min-width:0!important;
    color:#f8fbff!important;
    overflow-wrap:anywhere!important;
    white-space:normal!important;
    line-height:1.22!important;
    text-shadow:0 2px 8px rgba(0,0,0,.72)!important;
  }

  #timeTool>.card:last-child{
    display:grid!important;
    gap:10px!important;
    padding:14px!important;
  }
  #timeTool>.card:last-child .btn,
  #annTool .card .btn,
  #napPanel .btn,
  #settings .btn{
    width:100%!important;
    display:flex!important;
    align-items:center!important;
    justify-content:center!important;
    min-height:48px!important;
    margin:0!important;
    white-space:normal!important;
    text-align:center!important;
    line-height:1.18!important;
    border-radius:15px!important;
    background:linear-gradient(145deg,rgba(9,18,36,.98),rgba(14,31,58,.96))!important;
    color:#f8fbff!important;
    border:1px solid rgba(214,228,242,.25)!important;
    text-shadow:0 2px 8px rgba(0,0,0,.75)!important;
    box-shadow:0 10px 24px rgba(0,0,0,.35)!important;
  }
  #timeTool>.card:last-child .btn.primary,
  #annTool .card .btn.primary,
  #settings .btn.primary{
    background:linear-gradient(135deg,rgba(20,94,128,.98),rgba(102,72,22,.98))!important;
    border:1px solid rgba(247,212,107,.55)!important;
    color:#fff7cc!important;
    box-shadow:0 0 0 1px rgba(247,212,107,.16) inset,0 12px 28px rgba(0,0,0,.42)!important;
  }
  .primary{color:#fff7cc!important}
  .result,.timeItem,input,select,textarea{
    background:#050b16!important;
    background-image:linear-gradient(145deg,rgba(3,8,18,.98),rgba(8,18,36,.96))!important;
  }
  .archiveFooter{background:#050b16!important;margin-bottom:calc(84px + env(safe-area-inset-bottom))!important}
}
@supports (-webkit-touch-callout:none){
  @media(max-width:900px){
    body{background:#050b16!important}
    .hero,.card,.tile,.chapter,.guideBlock,.guideHero,.menuColumn,.eventCard,.timeItem,.result,.tick,.menuCard,.guideMini{
      background:#081225!important;
      background-image:linear-gradient(145deg,#061022,#0d1b34)!important;
    }
    #timeTool>.card:last-child .btn,
    #annTool .card .btn,
    #napPanel .btn,
    #settings .btn{
      -webkit-appearance:none!important;
      appearance:none!important;
    }
  }
}


/* Codex atmosphere pass: illustrated mobile-safe fantasy scenes */
body{
  background-color:#050b16!important;
  background-size:cover;
}
body.scene-home{background:
  radial-gradient(circle at 12% 12%,rgba(139,233,255,.24),transparent 28%),
  radial-gradient(circle at 90% 18%,rgba(247,212,107,.23),transparent 30%),
  radial-gradient(circle at 50% 100%,rgba(167,139,250,.20),transparent 38%),
  linear-gradient(135deg,#050b16 0%,#101f42 46%,#3a1d4b 74%,#070d1a 100%)!important}
body.scene-tools{background:
  radial-gradient(circle at 15% 16%,rgba(34,211,238,.24),transparent 32%),
  radial-gradient(circle at 88% 20%,rgba(247,212,107,.20),transparent 28%),
  linear-gradient(135deg,#030711 0%,#07223f 46%,#26114a 78%,#050811 100%)!important}
body.scene-game,body.scene-gameplay{background:
  radial-gradient(circle at 16% 10%,rgba(139,233,255,.23),transparent 34%),
  radial-gradient(circle at 84% 30%,rgba(134,239,172,.18),transparent 31%),
  linear-gradient(135deg,#04101f 0%,#0d2d52 46%,#2b1546 82%,#050b16 100%)!important}
body.scene-seasons{background:
  radial-gradient(circle at 10% 18%,rgba(139,233,255,.24),transparent 30%),
  radial-gradient(circle at 88% 16%,rgba(243,179,91,.27),transparent 31%),
  linear-gradient(135deg,#041326 0%,#18243d 42%,#4b270d 100%)!important}
body.scene-winter{--accent:#8be9ff;--gold:#e8fbff;background:
  radial-gradient(ellipse at 18% 4%,rgba(232,251,255,.46),transparent 30%),
  radial-gradient(ellipse at 80% 10%,rgba(74,222,255,.30),transparent 34%),
  linear-gradient(155deg,#020916 0%,#06203e 42%,#0f4f78 76%,#03111f 100%)!important}
body.scene-desert{--accent:#f3b35b;--gold:#f7d46b;background:
  radial-gradient(ellipse at 20% 8%,rgba(247,212,107,.34),transparent 33%),
  radial-gradient(ellipse at 86% 18%,rgba(251,146,60,.28),transparent 31%),
  linear-gradient(155deg,#160907 0%,#4b230d 48%,#8a4b17 78%,#1b0f08 100%)!important}

body:before{
  opacity:.92!important;
  background:
    radial-gradient(ellipse at 50% 115%,rgba(0,0,0,.68),transparent 48%),
    linear-gradient(100deg,transparent 0 18%,rgba(139,233,255,.13) 24%,transparent 35% 60%,rgba(247,212,107,.11) 70%,transparent 86%),
    repeating-linear-gradient(118deg,rgba(255,255,255,.035) 0 1px,transparent 1px 24px)!important;
  animation:ambientDrift 18s ease-in-out infinite alternate!important;
}
body:after{
  opacity:.52!important;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle at 20% 20%,rgba(139,233,255,.20),transparent 22%),
    radial-gradient(circle at 85% 24%,rgba(247,212,107,.16),transparent 24%),
    linear-gradient(115deg,transparent 0 38%,rgba(255,255,255,.13) 45%,transparent 54%)!important;
  animation:stormVeil 12s linear infinite!important;
}
body.scene-winter:after{
  background:
    linear-gradient(110deg,transparent 0 30%,rgba(139,233,255,.22) 38%,transparent 50%),
    repeating-linear-gradient(102deg,rgba(232,251,255,.10) 0 2px,transparent 2px 30px)!important;
}
body.scene-desert:after{
  background:
    linear-gradient(105deg,transparent 0 25%,rgba(247,192,113,.24) 38%,transparent 52%),
    repeating-linear-gradient(100deg,rgba(247,192,113,.11) 0 3px,transparent 3px 34px)!important;
}
@keyframes stormVeil{from{transform:translate3d(-4%,0,0) skewX(-4deg)}to{transform:translate3d(4%,1.2%,0) skewX(-4deg)}}

#fx{opacity:1!important}
.fx.flake{font-weight:900;color:#f4fdff!important;text-shadow:0 0 10px rgba(139,233,255,.95),0 0 22px rgba(232,251,255,.65)!important}
.fx.sand{height:4px!important;width:18px!important;background:linear-gradient(90deg,transparent,#f7d46b,#fb923c,transparent)!important;box-shadow:0 0 18px rgba(247,192,113,.95)!important}
.fx.spark{width:6px!important;height:6px!important;box-shadow:0 0 20px rgba(247,212,107,.95),0 0 34px rgba(139,233,255,.38)!important}
.fx.rune{font-weight:900;color:rgba(191,219,254,.84)!important;text-shadow:0 0 16px rgba(139,233,255,.75),0 0 26px rgba(167,139,250,.65)!important}
.fx.streak{height:3px!important;width:140px!important;background:linear-gradient(90deg,transparent,rgba(139,233,255,.95),rgba(255,255,255,.8),transparent)!important}

.hero{
  border-color:rgba(139,233,255,.32)!important;
  box-shadow:0 22px 70px rgba(0,0,0,.42),0 0 34px rgba(139,233,255,.18),0 0 58px rgba(247,212,107,.10)!important;
}
.tile,.card,.chapter,.guideBlock,.guideHero,.menuColumn,.eventCard{
  box-shadow:0 18px 52px rgba(0,0,0,.44),0 0 0 1px rgba(255,255,255,.035) inset,0 0 26px rgba(139,233,255,.055)!important;
}
.tile{border-left:4px solid rgba(139,233,255,.72)!important}
.grid .tile:nth-child(2),.guideStack .tile:nth-child(1){border-left-color:rgba(167,139,250,.84)!important}
.grid .tile:nth-child(3),.seasonDesert{border-left-color:rgba(247,212,107,.9)!important}
.grid .tile:nth-child(4){border-left-color:rgba(134,239,172,.84)!important}

@media(max-width:900px){
  body:before{opacity:.82!important}
  body:after{opacity:.40!important}
  #fx{opacity:.78!important}
  main{background:linear-gradient(180deg,rgba(5,11,22,.50),rgba(5,11,22,.72))!important}
  .hero,.card,.tile,.chapter,.guideBlock,.guideHero,.menuColumn,.eventCard,.timeItem,.result,.tick,.menuCard,.guideMini{
    border-color:rgba(139,233,255,.22)!important;
    box-shadow:0 18px 48px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.045) inset,0 0 28px rgba(139,233,255,.08)!important;
  }
  .scene-winter .card,.scene-winter .chapter,.scene-winter .tile,.seasonWinter{
    border-color:rgba(139,233,255,.40)!important;
    box-shadow:0 18px 48px rgba(0,0,0,.55),0 0 30px rgba(139,233,255,.12)!important;
  }
  .scene-desert .card,.scene-desert .chapter,.scene-desert .tile,.seasonDesert{
    border-color:rgba(247,212,107,.38)!important;
    box-shadow:0 18px 48px rgba(0,0,0,.55),0 0 30px rgba(247,146,60,.12)!important;
  }
}


/* Codex verified Season 2 content cards */
.s2VerifiedHero{position:relative;overflow:hidden}
.s2VerifiedHero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 12% 8%,rgba(255,210,117,.18),transparent 34%),radial-gradient(circle at 92% 12%,rgba(98,214,255,.13),transparent 30%);pointer-events:none}
.s2VerifiedHero>*{position:relative}
.chapterKicker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.s2StatusBadge{display:inline-flex;align-items:center;min-height:28px;padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.18);font-size:.78rem;font-weight:900;letter-spacing:.01em;color:#f9fbff;background:rgba(8,18,36,.82);box-shadow:0 8px 20px rgba(0,0,0,.18)}
.s2StatusBadge.confirmed{border-color:rgba(76,235,169,.48);background:linear-gradient(135deg,rgba(18,103,77,.92),rgba(10,44,52,.92))}
.s2StatusBadge.strategy{border-color:rgba(114,207,255,.48);background:linear-gradient(135deg,rgba(24,75,126,.92),rgba(31,42,88,.92))}
.s2StatusBadge.awaiting{border-color:rgba(255,213,116,.55);background:linear-gradient(135deg,rgba(125,82,17,.94),rgba(72,42,20,.94))}

<script>
const SEASON_DATA={"s1Content":{"en":"<article class=\"chapter\" id=\"s1-en-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay &amp; season rules</h2>\n<h3>Core rules</h3><ul>\n<li>Season 1: Winter Is Coming / Polar Tempest lasts 56 days and combines survival, territory control, alliance logistics, class progress, expedition and ranking.</li>\n<li>Temperatures fall over time. Zombies, Behemoths and monsters become stronger, other kingdoms become rivals, and the alliance must secure heat, territory and resources together.</li>\n<li>Week 8 is the settlement week. Ranking and rewards depend strongly on Ice Crystals produced and held through occupied polar cities.</li>\n</ul>\n<h3>Weeks 1–4</h3><ul>\n<li>Week 1 teaches City Race, Ice Crystals, temperature, freezing, thawing, heating, resources and buildings.</li>\n<li>Week 2 focuses more on Hero Promotion, especially Crystal and boost heroes.</li>\n<li>Week 3 opens Kingdom Expedition with outposts, foreign Frost Mines and connected territory.</li>\n<li>Week 4 adds Kingdom War Declaration, city loot, random opponents and larger Ice Crystal opportunities.</li>\n</ul>\n<h3>Heat and resistance</h3><ul>\n<li>The personal Heat Furnace raises castle temperature and Season Resistance. The Alliance Furnace raises domain temperature for grouped members.</li>\n<li>Below −20 °C, castles can freeze. Frozen targets must be thawed before occupation, attacks, gathering or other actions.</li>\n<li>Polar Zombies and Behemoths carry the Icefield Virus; low resistance can create heavy losses.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-en-2-tasks\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Tasks: players &amp; union</h2>\n<h3>Players</h3><ul>\n<li>Check Season Preview, event calendar and alliance announcements daily. Current in-game rules beat older Discord notes.</li>\n<li>Spend stamina deliberately across Frost Mine monsters, Polar monsters, Elite Zombies, Behemoths, recurring events and treasures.</li>\n<li>Keep the Heat Furnace active, use overload during Cold Snap, claim rewards, heat allies and collect Snowland Treasures.</li>\n<li>Use Level Swap and boosts strategically; level-based skills may lock until the hero is leveled again.</li>\n</ul>\n<h3>Union</h3><ul>\n<li>Manage Coal. Donate to the Alliance Furnace, occupy higher Frost Mines and avoid wasting fuel.</li>\n<li>Upgrade seasonal buildings: Heat Furnace, Mithril Workshop, Hall of War and Alliance Furnace.</li>\n<li>Push Alliance Season Contribution through mutual help, siege, cleanup and enemy-loss points.</li>\n</ul>\n<h3>Path of Survival</h3><ul>\n<li>Path of Survival gives daily direction: Cold Snap heat help, kingdom conflict, enemy defeat and reward stages.</li>\n<li>Use it as focus, but align it with diplomacy, alliance plan and resource protection.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-en-3-systems\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Events &amp; systems</h2>\n<h3>Cold Snap</h3><ul>\n<li>Cold Snap strongly lowers temperatures in all regions; level 10 can show down to −90 °C.</li>\n<li>Typical tasks: Heat Furnace active 3000 seconds, overload active 3000 seconds, donate Coal to Alliance Furnace 10 times.</li>\n</ul>\n<h3>Farm Escape</h3><ul>\n<li>Swipe animals into the barn; identical animals cancel each other; the barn holds up to 5 different animals.</li>\n<li>Daily stages give Coal, Mithril, Gold and chests.</li>\n</ul>\n<h3>Treasure, swap, boost, promotion</h3><ul>\n<li>Snowland Treasures become visible at 0 °C ground temperature; send scouts after the ice melts or breaks, max 5 per day.</li>\n<li>Level Swap exchanges two hero levels; stars, ascension and skills remain separate.</li>\n<li>Season Boosts come from event castle skins, heroes and decorations; decorations work only after placement and bonuses expire after season end.</li>\n<li>Crystal, Sera, Fenixia and Daphne give +5% monster damage. Snow Night Parade lowers enemy castle temperature by 3 °C after successful attacks.</li>\n<li>Hero Promotion focuses on Crystal; do not spend S shards or swap vouchers carelessly.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-en-4-expedition\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Kingdom Expedition &amp; War Declaration</h2>\n<h3>Expedition</h3><ul>\n<li>Build an Alliance Outpost before operating in other kingdoms. Members should send teams to shorten construction.</li>\n<li>After completion, Lords can relocate and occupy Frost Mines in range. Occupied Frost Mines become starting points for connected territory.</li>\n<li>R4+ can build outposts. Max 4 per alliance, only 1 per kingdom, and built outposts cannot be removed.</li>\n</ul>\n<h3>War Declaration</h3><ul>\n<li>Declarations are possible Wednesday and Saturday. R4+ can declare cities in the season group.</li>\n<li>A city can only be declared if an alliance Frost Mine is connected to the target city.</li>\n<li>Successful occupation gives loot; first foreign occupation gives city loot shown in the city list.</li>\n</ul>\n<h3>Risk</h3><ul>\n<li>Sunday to Friday, blackland castles can be attacked by other kingdoms. On Saturday, enemy castles in other kingdoms can be attacked.</li>\n<li>War, defense or diplomacy are leadership choices; the rules allow more than every union must use.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-en-5-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Strategy, diplomacy &amp; experience</h2>\n<h3>Core strategy</h3><ul>\n<li>Power comes from route, heat, Coal, Frost Mines, cities, class skills, stamina and clear leadership.</li>\n<li>Frost Mines secure Coal and territory. Cities secure Ice Crystals, heat and strategic position.</li>\n<li>Castles should stay warm, protected and connected; scattered members freeze faster and react slower.</li>\n</ul>\n<h3>Diplomacy vs. war</h3><ul>\n<li>Each union chooses its style. War brings points and loot, but costs soldiers, healing, focus and diplomacy.</li>\n<li>Coexistence, agreements and holding windows can be more efficient than constant zeroing.</li>\n<li>Clear rules for tiles, blackland and city targets prevent unnecessary conflict.</li>\n</ul>\n<h3>First 4 weeks</h3><ul>\n<li>Many players underestimate Coal, heat, stamina and positioning. These basics decide whether a union stays operational.</li>\n<li>Level-6 cities and high goals often require diplomacy or early planning. Late pathing and late outposts cost tempo.</li>\n<li>Everyone can contribute: heat, donate, clear monsters, collect treasures, send teams, reinforce and read announcements.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-en-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Next 4 weeks &amp; endgame plan</h2>\n<h3>Priorities</h3><ul>\n<li>Secure the highest possible city and Frost Mine quality. Holding useful targets matters more than short captures.</li>\n<li>Stabilize Coal supply; without Coal, furnaces, overload and Cold Snap tasks collapse.</li>\n<li>Develop Class EXP and class skills; normal skills remain valuable, season skills may reset and refund.</li>\n<li>Review boost heroes and Level Swap strategically, especially Crystal, Sera, Fenixia and Daphne.</li>\n</ul>\n<h3>Week 7/8</h3><ul>\n<li>Week 7 is likely the decisive push phase for City Race, Ice Crystals, high cities and final territory security.</li>\n<li>Week 8 is settlement. Rewards depend on alliance ranking; uncoordinated final attacks can hurt more than help.</li>\n<li>Royal City and Royal Furnace are prestigious, but short reward windows may be more realistic than permanent control.</li>\n</ul>\n<h3>Leadership checklist</h3><ul>\n<li>Post daily focus: heat, stamina, Frost Mines, cities, treasures, Cold Snap, expedition or war.</li>\n<li>Separate R4/R5 tasks: outposts, declarations, diplomacy, city list, rewards, furnace position and member placement.</li>\n<li>Before major moves check calendar, Frost Mine connection, temperature, Coal, stamina, diplomacy and fallback plan.</li>\n</ul>\n</article>","de":"<article class=\"chapter\" id=\"s1-de-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay &amp; Saisonregeln</h2>\n<h3>Was Season 1 grundsätzlich ist</h3><ul>\n<li>Saison 1: Ankunft des Winters / Winter Is Coming / Polar Tempest dauert 56 Tage und ist kein reines Kriegsevent, sondern eine Mischung aus Überleben, Gebietskontrolle, Allianzlogistik, Klassenfortschritt, Expedition und Ranking.</li>\n<li>Die Temperaturen sinken weiter. Zombies, Behemoths und Monster werden stärker, andere Königreiche werden zu Konkurrenten, und die Allianz muss Wärme, Gebiet und Ressourcen gemeinsam sichern.</li>\n<li>Die Saisonabrechnung erfolgt in Woche 8. Entscheidend ist vor allem, wie viele Eiskristalle die Allianz durch besetzte Polarstädte produziert und hält.</li>\n</ul>\n<h3>Woche 1 bis 4 – bekannte Ingame-Struktur</h3><ul>\n<li>Woche 1 erklärt Stadtrennen, Eiskristalle, Temperatur, Einfrieren, Auftauen, Erhitzen, Saisonressourcen und saisonale Gebäude.</li>\n<li>Woche 2 bringt Heldenbeförderung stärker in den Fokus: Kristall kann über die Saisonmechanik transformiert werden; Boost-Helden und passende Ressourcen gewinnen an Bedeutung.</li>\n<li>Woche 3 öffnet die Königreichsexpedition: Außenposten, Frostminen in anderen Königreichen und verbundene Gebietserweiterung werden zentral.</li>\n<li>Woche 4 bringt Königreichskriegserklärung und regionsübergreifenden Konflikt: Kriegserklärungen, Stadtbeute, zufällige Gegner und große Eiskristallmengen werden wichtiger.</li>\n</ul>\n<h3>Wärme, Einfrieren und Saisonresistenz</h3><ul>\n<li>Der persönliche Wärmeofen erhöht die Burgtemperatur und gibt Saisonresistenz. Der Allianzofen erhöht die Domänentemperatur im Gebiet, damit mehrere Burgen gemeinsam geschützt werden.</li>\n<li>Bleibt die Burgtemperatur längere Zeit unter −20 °C, friert die Burg ein. Gezielte Ortungsaktionen und Rallys sind dann nicht möglich.</li>\n<li>Eingefrorene Ziele müssen vor Besetzen, Angreifen, Sammeln oder anderen Aktionen aufgetaut werden. Auftauen verbraucht Ausdauer und erfolgreiche Versuche geben Klassen-EP.</li>\n<li>Polarzombies und Behemoths tragen das Eisfeldvirus. Ohne ausreichende Saisonresistenz werden Truppen geschwächt und Verluste können stark steigen.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-de-2-tasks\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Aufgaben: Spieler &amp; Union</h2>\n<h3>Was jeder Spieler täglich tun sollte</h3><ul>\n<li>Season Preview, Eventkalender und Allianzankündigungen täglich prüfen. Regeln ändern sich phasenweise; ältere Discord-Infos sind hilfreich, aber aktuelle Ingame-Regeln haben Vorrang.</li>\n<li>Ausdauer bewusst einsetzen: Frostminenmonster, Polarmonster, Elite-Zombies, Behemoths, Eventmonster und wiederkehrende Events konkurrieren um dieselbe Ressource.</li>\n<li>Wärmeofen aktiv halten, bei Kälteeinbruch Überlastung nutzen, Belohnungen abholen und bei Bedarf Verbündete erwärmen.</li>\n<li>Schneelandschätze sammeln, sobald sie sichtbar werden. Maximal 5 pro Tag; Kundschafter losschicken, wenn das Eis geschmolzen oder gebrochen ist.</li>\n<li>Leveltausch und Boosts nicht blind nutzen. Leveltausch kann levelgebundene Fähigkeiten sperren, bis der Held wieder hochgelevelt wird.</li>\n</ul>\n<h3>Was die Union gemeinsam tun sollte</h3><ul>\n<li>Kohle an den Allianzofen spenden, aber nicht sinnlos verschwenden. Je höher Ofenlevel und Kälteeinbruch, desto wichtiger wird Kohlemanagement.</li>\n<li>Höherstufige Frostminen besetzen, um laufende Kohleversorgung zu sichern. Frostminen sind nicht nur Gebiet, sondern Treibstoff für den Allianzfortschritt.</li>\n<li>Saisongebäude sinnvoll ausbauen: Wärmeofen/Saisonresistenz, Mithril-Werkstatt, Halle des Krieges und Allianzofen wirken direkt auf Überleben und Kampfwerte.</li>\n<li>Allianz-Saisonbeitrag aktiv pushen: gegenseitige Hilfe, Belagerung, Aufräumen und Verlustpunkte liefern Ranglistenwert und Truhen.</li>\n</ul>\n<h3>Pfad des Überlebens</h3><ul>\n<li>Der Pfad des Überlebens gibt konkrete Etappenziele wie Kälteeinbruch-Wärmehilfe, Konflikt der Königreiche und Feindbesiegung vor.</li>\n<li>Beispiele: gemeinsame Wärmehilfe für Verbündete, Eiskristalle von anderen Königreichen sammeln und Soldaten anderer Königreiche besiegen.</li>\n<li>Diese Aufgaben sind gute Orientierung für Tagesfokus, sollten aber mit Allianzplan, Diplomatie und Ressourcenschutz abgeglichen werden.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-de-3-systems\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Events &amp; Systeme</h2>\n<h3>Kälteeinbruch</h3><ul>\n<li>Kälteeinbruch senkt die Temperaturen in allen Regionen stark. Beispiel aus dem Spiel: Level 10 kann bis −90 °C anzeigen.</li>\n<li>Typische Aufgaben: Wärmeofen 3000 Sekunden aktiv halten, Wärmeofen 3000 Sekunden im Überlastungsmodus halten, 10× Kohle an Allianzofen spenden.</li>\n<li>Nicht abgeholte Kälteeinbruch-Belohnungen werden nach Eventende per Mail zugestellt, trotzdem sollten aktive Spieler sie direkt einsammeln.</li>\n</ul>\n<h3>Bauernhof / Farm Escape</h3><ul>\n<li>Farm Escape ist ein Minispiel: Tiere werden durch Wischen bewegt, gleiche Tiere heben sich gegenseitig auf, und die Scheune fasst bis zu 5 verschiedene Tiere.</li>\n<li>Ist die Scheune voll, ist das Spiel vorbei. Tagesstufen bringen Belohnungen wie Kohle, Mithril, Gold und Truhen.</li>\n<li>Strategisch ist es Nebeninhalt, aber für Saisonressourcen trotzdem nützlich.</li>\n</ul>\n<h3>Schneelandschatz, Leveltausch, Season Boost und Heldenbeförderung</h3><ul>\n<li>Schneelandschätze erscheinen in Städten und werden sichtbar, wenn die Bodentemperatur 0 °C oder mehr erreicht. Temperatur steigt durch Klassenfähigkeiten, Allianzofen oder besetzte Städte.</li>\n<li>Leveltausch tauscht Level zweier Helden. Sterne, Aufstieg und Skillinvestitionen sind separat; levelgebundene Fähigkeiten können vorübergehend gesperrt werden.</li>\n<li>Season Boosts kommen von eventbezogenen Burg-Skins, Helden und Dekorationen. Dekorationen wirken erst nach Anbringung, alle Eventboni verfallen nach Saisonende.</li>\n<li>Sichtbare Boosts: Kristall, Sera, Fenixia und Daphne geben je +5 % Monsterschaden. Schneenachtparade senkt bei erfolgreichen Angriffen die Temperatur einer feindlichen Burg um 3 °C.</li>\n<li>Heldenbeförderung: Kristall steht im Fokus und kann über die Saisonmechanik transformiert werden. S-Splitter und Leveltausch deshalb nicht unbedacht ausgeben.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-de-4-expedition\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Kingdom Expedition &amp; War Declaration</h2>\n<h3>Königreichsexpedition</h3><ul>\n<li>Um in anderen Königreichen aktiv zu werden, muss zuerst ein Allianzaußenposten gebaut werden. Während der Bauphase sollten Mitglieder Teams senden, um die Bauzeit zu verkürzen.</li>\n<li>Nach Fertigstellung können Lords in dieses Königreich umziehen und Frostminen im Bereich des Außenpostens besetzen.</li>\n<li>Nach Besetzung einer Frostmine kann diese als Ausgangspunkt für verbundene Gebietserweiterung genutzt werden.</li>\n<li>R4+ können Außenposten bauen. Außenposten werden nach und nach freigeschaltet; maximal 4 pro Allianz, aber nur 1 pro Königreich.</li>\n<li>Ein errichteter Außenposten kann nicht entfernt werden. Standort und Zielkönigreich müssen sorgfältig gewählt werden.</li>\n</ul>\n<h3>Kriegserklärung des Königreichs</h3><ul>\n<li>Kriegserklärungen sind nach Eventbeginn nur mittwochs und samstags möglich. Sobald sie verfügbar sind, kann am selben Tag erklärt werden.</li>\n<li>R4+ können Städten anderer Allianzen im eigenen Königreich oder in anderen Königreichen der Saisongruppe den Krieg erklären.</li>\n<li>Eine Stadt kann erst erklärt werden, wenn eine Frostmine der Allianz mit der Zielstadt verbunden ist.</li>\n<li>Nach Erklärung kann die Stadt angegriffen und besetzt werden. Erfolgreiche Besetzung einer erklärten Stadt gibt Beutebelohnungen.</li>\n<li>Wird eine Stadt erstmals von einer Allianz aus einem anderen Königreich besetzt, gibt sie Stadtbeute. Die Beute ist in der Städteliste sichtbar.</li>\n</ul>\n<h3>Kampfregeln und Risiko</h3><ul>\n<li>An Nicht-Kriegstagen Sonntag bis Freitag können Burgen im Schwarzland von Lords anderer Königreiche angegriffen werden.</li>\n<li>Am Kriegstag Samstag können Lords Burgen feindlicher Lords in anderen Königreichen angreifen.</li>\n<li>Ob eine Union aktiv Krieg führt, defensiv spielt oder Diplomatie priorisiert, ist eine Führungsentscheidung. Die Regeln erlauben mehr, als jede Union zwingend nutzen muss.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-de-5-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Strategie, Diplomatie &amp; Erfahrungen</h2>\n<h3>Grundstrategie</h3><ul>\n<li>Stärke entsteht nicht durch Einzelaktionen, sondern durch Route, Wärme, Kohle, Frostminen, Städte, Klassenfähigkeiten, Ausdauer und klare Führung.</li>\n<li>Frostminen sichern Kohle und Gebiet. Städte sichern Eiskristalle, Wärme und strategische Position. Beides muss zusammen geplant werden.</li>\n<li>Burgen sollten in warmen, geschützten und sinnvoll verbundenen Gebieten stehen. Verstreute Mitglieder frieren schneller, reagieren langsamer und kosten mehr Koordination.</li>\n</ul>\n<h3>Diplomatie vs. Krieg</h3><ul>\n<li>Jede Union muss selbst entscheiden, wie aggressiv sie spielt. Krieg kann Punkte und Beute bringen, kostet aber Soldaten, Heilung, Nerven und oft Diplomatie.</li>\n<li>Koexistenz, Absprachen und Haltefenster können effizienter sein als ständiges Nullsetzen. Besonders bei großen Machtunterschieden ist Diplomatie oft ressourcenschonender.</li>\n<li>Tiles/Felder, Schwarzland und Stadtziele sollten klar geregelt werden. Unklare Regeln führen schneller zu Konflikt als echte Strategie.</li>\n</ul>\n<h3>Erfahrungen der ersten 4 Wochen</h3><ul>\n<li>Die wichtigste Erfahrung: Viele Spieler unterschätzen Kohle, Wärme, Ausdauer und Positionierung. Genau diese Basics entscheiden aber, ob eine Union handlungsfähig bleibt.</li>\n<li>Level-6-Städte und hohe Ziele sind oft nur mit Diplomatie oder starker Vorplanung erreichbar. Wer zu spät pathing und Außenposten plant, verliert Tempo.</li>\n<li>Community-Infos sind wertvoll, aber Live-Regeln und Eventkalender können abweichen. Ingame prüfen, bevor große Entscheidungen getroffen werden.</li>\n<li>Nicht jeder muss kämpfen, aber jeder kann beitragen: erwärmen, spenden, Monster räumen, Schätze sammeln, Teams senden, Verstärkung stellen, Informationen lesen.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-de-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Nächste 4 Wochen &amp; Endgame-Plan</h2>\n<h3>Prioritäten für die zweite Saisonhälfte</h3><ul>\n<li>Höchstmögliche Stadt- und Frostminenqualität sichern. Halten zählt langfristig mehr als kurz etwas einzunehmen und sofort wieder zu verlieren.</li>\n<li>Kohleversorgung stabilisieren. Ohne Kohle brechen Wärmeofen, Allianzofen, Überlastung und viele Kälteeinbruch-Aufgaben zusammen.</li>\n<li>Klassen-EP und Klassenfähigkeiten weiterentwickeln. Normale Fähigkeiten bleiben langfristig wertvoll; Saisonfähigkeiten können am Ende zurückgesetzt und erstattet werden.</li>\n<li>Boost-Helden und Leveltausch strategisch prüfen, besonders Kristall, Sera, Fenixia und Daphne.</li>\n</ul>\n<h3>Endgame und Woche 7/8</h3><ul>\n<li>Woche 7 gilt aus Community-Erfahrung als entscheidende Push-Phase für City Race, Eiskristalle, hohe Städte und letzte Gebietssicherung.</li>\n<li>Woche 8 bringt die Saisonabrechnung. Belohnungen basieren auf Allianzranking; unkoordinierte letzte Angriffe können mehr schaden als nützen.</li>\n<li>Königsstadt und Königsofen sind prestigeträchtig, aber nicht jede Union wird dauerhaft darum spielen. Kurze Haltefenster für Belohnungen können realistischer sein als Dauerkontrolle.</li>\n</ul>\n<h3>Führungscheckliste</h3><ul>\n<li>Täglichen Fokus posten: Wärme, Ausdauer, Frostminen, Städte, Schätze, Kälteeinbruch, Expedition oder Krieg.</li>\n<li>R4/R5-Aufgaben trennen: Außenposten, Kriegserklärungen, Diplomatie, Stadtliste, Belohnungen, Ofenposition, Mitgliederplatzierung.</li>\n<li>Klare Regeln kommunizieren: wann kämpfen, wen nicht angreifen, wie mit Tiles umgehen, wann Schilde sinnvoll sind und welche Ziele Priorität haben.</li>\n<li>Vor jedem großen Schritt prüfen: Eventkalender, Verbindung über Frostminen, Temperatur, Kohlebestand, Ausdauer, Diplomatie und Rückzugsplan.</li>\n</ul>\n</article>","es":"<article class=\"chapter\" id=\"s1-es-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay y reglas de temporada</h2>\n<h3>Core</h3><ul>\n<li>Temporada 1 dura 56 días. Season 1 combines survival, territory, alliance logistics, class progress, expedition and ranking.</li>\n<li>Occupied polar cities produce Cristales de Hielo; Week 8 settles ranking and rewards.</li>\n<li>Horno de Calor protects the castle, while Horno de Alianza heats the alliance area.</li>\n<li>Below −20 °C castles can freeze; frozen targets must be thawed before actions.</li>\n</ul>\n<h3>Weeks 1–4</h3><ul>\n<li>Week 1: temperature, freezing, resources and buildings. Week 2: hero promotion and Crystal. Week 3: expedition and outposts. Week 4: declarations and cross-region conflict.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-es-2-tasks\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Tareas: jugadores y alianza</h2>\n<h3>Player</h3><ul>\n<li>Check preview, calendar and announcements daily.</li>\n<li>Spend stamina with priority: mine monsters, zombies, Behemoths, events and treasures.</li>\n<li>Keep Horno de Calor active, use overload in Ola de Frío, heat allies and collect rewards.</li>\n</ul>\n<h3>Union</h3><ul>\n<li>Manage Carbón, donate to Horno de Alianza and occupy higher Frost Mines.</li>\n<li>Upgrade Horno de Calor, Mithril workshop, Hall of War and seasonal buildings.</li>\n<li>Use contribution: mutual help, siege, cleanup and enemy-loss points.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-es-3-systems\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Eventos y sistemas</h2>\n<h3>Ola de Frío</h3><ul>\n<li>Ola de Frío lowers kingdom temperature. Typical tasks: furnace active, overload active and Carbón donations.</li>\n</ul>\n<h3>Systems</h3><ul>\n<li>Tesoro del Nevario: visible at 0 °C ground temperature, max 5 per day.</li>\n<li>Intercambio de Nivel: swaps hero levels; level-based skills may lock until re-leveled.</li>\n<li>Season Boost: Crystal, Sera, Fenixia and Daphne give +5% monster damage; decorations work only after placement.</li>\n<li>Farm Escape gives resources such as Carbón, Mithril and chests.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-es-4-expedition\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Expedición y declaración de guerra</h2>\n<h3>Expedición del Reino</h3><ul>\n<li>To operate in other kingdoms, build an Puesto Avanzado de Alianza; members send teams to shorten build time.</li>\n<li>After completion, occupy Frost Mines in range and expand connected territory.</li>\n<li>Max 4 outposts per alliance, only 1 per kingdom, and a built outpost cannot be removed.</li>\n</ul>\n<h3>War</h3><ul>\n<li>Declarations are possible Wednesday and Saturday. R4+ declares cities connected through a Frost Mine.</li>\n<li>Sunday to Friday blackland carries risk; Saturday allows attacks on enemy castles in other kingdoms.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-es-5-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Estrategia, diplomacia y experiencia</h2>\n<h3>Choice</h3><ul>\n<li>Each alliance chooses its style: active war, defense, coexistence or diplomacy.</li>\n<li>Diplomacy can save soldiers and enable agreements for cities, mines and reward windows.</li>\n<li>Clear rules for tiles, cities and targets prevent unnecessary conflict.</li>\n</ul>\n<h3>Experience</h3><ul>\n<li>Common mistakes: spending stamina without plan, ignoring heat, late pathing and weak outpost coordination.</li>\n<li>Everyone can contribute: heat, donate, clear monsters, send teams, reinforce and read announcements.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-es-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Próximas 4 semanas y final</h2>\n<h3>Priorities</h3><ul>\n<li>Secure better cities and mines for Cristales de Hielo and Carbón.</li>\n<li>Prepare Week 7/8 as the decisive phase for City Race, ranking and settlement.</li>\n<li>Ciudad Real is prestigious, but short reward windows may be more realistic than permanent control.</li>\n</ul>\n</article>","br":"<article class=\"chapter\" id=\"s1-br-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay e regras da temporada</h2>\n<h3>Core</h3><ul>\n<li>A Temporada 1 dura 56 dias. Season 1 combines survival, territory, alliance logistics, class progress, expedition and ranking.</li>\n<li>Occupied polar cities produce Cristais de Gelo; Week 8 settles ranking and rewards.</li>\n<li>Forno de Calor protects the castle, while Forno da Aliança heats the alliance area.</li>\n<li>Below −20 °C castles can freeze; frozen targets must be thawed before actions.</li>\n</ul>\n<h3>Weeks 1–4</h3><ul>\n<li>Week 1: temperature, freezing, resources and buildings. Week 2: hero promotion and Crystal. Week 3: expedition and outposts. Week 4: declarations and cross-region conflict.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-br-2-tasks\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Tarefas: jogadores e aliança</h2>\n<h3>Player</h3><ul>\n<li>Check preview, calendar and announcements daily.</li>\n<li>Spend stamina with priority: mine monsters, zombies, Behemoths, even  Estratégia, diplomacia e experiência</h2>\n<h3>Choice</h3><ul>\n<li>Each alliance chooses its style: active war, defense, coexistence or diplomacy.</li>\n<li>Diplomacy can save soldiers and enable agreements for cities, mines and reward windows.</li>\n<li>Clear rules for tiles, cities and targets prevent unnecessary conflict.</li>\n</ul>\n<h3>Experience</h3><ul>\n<li>Common mistakes: spending stamina without plan, ignoring heat, late pathing and weak outpost coordination.</li>\n<li>Everyone can contribute: heat, donate, clear monsters, send teams, reinforce and read announcements.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-br-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Próximas 4 semanas e final</h2>\n<h3>Priorities</h3><ul>\n<li>Secure better cities and mines for Cristais de Gelo and Carvão.</li>\n<li>Prepare Week 7/8 as the decisive phase for City Race, ranking and settlement.</li>\n<li>Cidade Real is prestigious, but short reward windows may be more realistic than permanent control.</li>\n</ul>\n</article>","fr":"<article class=\"chapter\" id=\"s1-fr-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay et règles de saison</h2>\n<h3>Core</h3><ul>\n<li>La Saison 1 dure 56 jours. Season 1 combines survival, territory, alliance logistics, class progress, expedition and ranking.</li>\n<li>Occupied polar cities produce Cristaux de Glace; Week 8 settles ranking and rewards.</li>\n<li>Four de Chaleur protects the castle, while Four d’Alliance heats the alliance area.</li>\n<li>Below −20 °C castles can freeze; frozen targets must be thawed before actions.</li>\n</ul>\n<h3>Weeks 1–4</h3><ul>\n<li>Week 1: temperature, freezing, resources and buildings. Week 2: hero promotion and Crystal. Week 3: expedition and outposts. Week 4: declarations and cross-region conflict.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-fr-2-tasks\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\" kland carries risk; Saturday allows attacks on enemy castles in other kingdoms.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-fr-5-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Stratégie, diplomatie et expérience</h2>\n<h3>Choice</h3><ul>\n<li>Each alliance chooses its style: active war, defense, coexistence or diplomacy.</li>\n<li>Diplomacy can save soldiers and enable agreements for cities, mines and reward windows.</li>\n<li>Clear rules for tiles, cities and targets prevent unnecessary conflict.</li>\n</ul>\n<h3>Experience</h3><ul>\n<li>Common mistakes: spending stamina without plan, ignoring heat, late pathing and weak outpost coordination.</li>\n<li>Everyone can contribute: heat, donate, clear monsters, send teams, reinforce and read announcements.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-fr-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Prochaines 4 semaines et fin de saison</h2>\n<h3>Priorities</h3><ul>\n<li>Secure better cities and mines for Cristaux de Glace and Charbon.</li>\n<li>Prepare Week 7/8 as the decisive phase for City Race, ranking and settlement.</li>\n<li>Cité Royale is prestigious, but short reward windows may be more realistic than permanent control.</li>\n</ul>\n</article>","gr":"<article class=\"chapter\" id=\"s1-gr-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay ÎºÎ±Î¹ ÎºÎ±Î½ÏŒÎ½ÎµÏ‚ ÏƒÎµÎ¶ÏŒÎ½</h2>\n<h3>Core</h3><ul>\n<li>Î— Î£ÎµÎ¶ÏŒÎ½ 1 Î´Î¹Î±ÏÎºÎµÎ¯ 56 Î·Î¼Î­ÏÎµÏ‚. Season 1 combines survival, territory, alliance logistics, class progress, expedition and ranking.</li>\n<li>Occupied polar cities produce ÎšÏÏÏƒÏ„Î±Î»Î»Î¿Î¹ Î Î¬Î³Î¿Ï…; Week 8 settles ranking and rewards.</li>\n<li>Î¦Î¿ÏÏÎ½Î¿Ï‚ Î˜ÎµÏÎ¼ÏŒÏ„Î·Ï„Î±Ï‚ protects the castle, while Î¦Î¿ÏÏÎ½Î¿Ï‚ Î£Ï…Î¼Î¼Î±Ï‡Î¯Î±Ï‚ heats the alliance area.</li>\n<li>Below −20 °C castles can freeze; frozen targets must be thawed before actions.</li>\n</ul>\n<h3>Wee
