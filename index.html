l donations.</li>\n</ul>\n<h3>Systems</h3><ul>\n<li>Skarb ÅšnieÅ¼nej Krainy: visible at 0 °C ground temperature, max 5 per day.</li>\n<li>Zamiana Poziomów: swaps hero levels; level-based skills may lock until re-leveled.</li>\n<li>Season Boost: Crystal, Sera, Fenixia and Daphne give +5% monster damage; decorations work only after placement.</li>\n<li>Farm Escape gives resources such as WÄ™giel, Mithril and chests.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-pl-4-expedition\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Ekspedycja i deklaracja wojny</h2>\n<h3>Ekspedycja Królestwa</h3><ul>\n<li>To operate in other kingdoms, build an Posterunek Sojuszu; members send teams to shorten build time.</li>\n<li>After completion, occupy Frost Mines in range and expand connected territory.</li>\n<li>Max 4 outposts per alliance, only 1 per kingdom, and a built outpost cannot be removed.</li>\n</ul>\n<h3>War</h3><ul>\n<li>Declarations are possible Wednesday and Saturday. R4+ declares cities connected through a Frost Mine.</li>\n<li>Sunday to Friday blackland carries risk; Saturday allows attacks on enemy castles in other kingdoms.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-pl-5-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Strategia, dyplomacja i doÅ›wiadczenie</h2>\n<h3>Choice</h3><ul>\n<li>Each alliance chooses its style: active war, defense, coexistence or diplomacy.</li>\n<li>Diplomacy can save soldiers and enable agreements for cities, mines and reward windows.</li>\n<li>Clear rules for tiles, cities and targets prevent unnecessary conflict.</li>\n</ul>\n<h3>Experience</h3><ul>\n<li>Common mistakes: spending stamina without plan, ignoring heat, late pathing and weak outpost coordination.</li>\n<li>Everyone can contribute: heat, donate, clear monsters, send teams, reinforce and read announcements.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-pl-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Kolejne 4 tygodnie i koÅ„cówka</h2>\n<h3>Priorities</h3><ul>\n<li>Secure better cities and mines for KrysztaÅ‚y Lodu and WÄ™giel.</li>\n<li>Prepare Week 7/8 as the decisive phase for City Race, ranking and settlement.</li>\n<li>Królewskie Miasto is prestigious, but short reward windows may be more realistic than permanent control.</li>\n</ul>\n</article>","nl":"<article class=\"chapter\" id=\"s1-nl-1-gameplay\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>1. Gameplay & seizoensregels</h2>\n<h3>Kernregels</h3><ul>\n<li>Season 1: Winter Is Coming / Polar Tempest duurt 56 dagen en combineert overleven, gebiedscontrole, alliantie-logistiek, klasseprogressie, expeditie en ranking.</li>\n<li>De temperatuur daalt gedurende het seizoen. Zombies, Behemoths en monsters worden sterker, andere koninkrijken worden rivalen, en de alliantie moet warmte, gebied en grondstoffen samen veiligstellen.</li>\n<li>Week 8 is de settlement-week. Ranking en beloningen hangen vooral af van de hoeveelheid Ice Crystals die via bezette poolsteden worden geproduceerd en vastgehouden.</li>\n</ul>\n<h3>Week 1-4</h3><ul>\n<li>Week 1 introduceert City Race, Ice Crystals, temperatuur, bevriezen, ontdooien, verwarmen, grondstoffen en gebouwen.</li>\n<li>Week 2 legt meer nadruk op Hero Promotion, vooral Crystal en boost-helden.</li>\n<li>Week 3 opent Kingdom Expedition met outposts, Frost Mines in andere koninkrijken en verbonden territorium.</li>\n<li>Week 4 brengt Kingdom War Declaration, city loot, willekeurige tegenstanders en grotere Ice Crystal-kansen.</li>\n</ul>\n<h3>Warmte en weerstand</h3><ul>\n<li>De persoonlijke Heat Furnace verhoogt kasteeltemperatuur en Season Resistance. De Alliance Furnace verhoogt de domeintemperatuur voor gegroepeerde leden.</li>\n<li>Onder -20 °C kunnen kastelen bevriezen. Bevroren doelen moeten eerst worden ontdooid voordat bezetting, aanvallen, verzamelen of andere acties mogelijk zijn.</li>\n<li>Polar Zombies en Behemoths dragen het Icefield Virus; lage weerstand kan zware verliezen veroorzaken.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-nl-2-tasks\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>2. Taken: spelers & alliantie</h2>\n<h3>Spelers</h3><ul>\n<li>Controleer dagelijks Season Preview, eventkalender en alliantieberichten. Actuele regels in het spel gaan altijd boven oudere Discord-notities.</li>\n<li>Gebruik stamina bewust voor Frost Mine-monsters, Polar monsters, Elite Zombies, Behemoths, terugkerende events en treasures.</li>\n<li>Houd de Heat Furnace actief, gebruik overload tijdens Cold Snap, claim beloningen, verwarm bondgenoten en verzamel Snowland Treasures.</li>\n<li>Gebruik Level Swap en boosts strategisch; level-gebonden skills kunnen tijdelijk geblokkeerd zijn tot de held opnieuw is geleveld.</li>\n</ul>\n<h3>Alliantie</h3><ul>\n<li>Beheer Coal zorgvuldig. Doneer aan de Alliance Furnace, bezet hogere Frost Mines en verspil geen brandstof.</li>\n<li>Upgrade seizoensgebouwen: Heat Furnace, Mithril Workshop, Hall of War en Alliance Furnace.</li>\n<li>Verhoog Alliance Season Contribution via hulp, belegering, opruimen en punten door vijandelijke verliezen.</li>\n</ul>\n<h3>Path of Survival</h3><ul>\n<li>Path of Survival geeft dagelijkse richting: warmtehulp tijdens Cold Snap, koninkrijksconflict, vijanden verslaan en beloningsfases.</li>\n<li>Gebruik het als focus, maar stem het af op diplomatie, alliantieplan en bescherming van grondstoffen.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-nl-3-systems\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>3. Events & systemen</h2>\n<h3>Cold Snap</h3><ul>\n<li>Cold Snap verlaagt de temperatuur sterk in alle regio’s; hoge levels kunnen extreem koud worden.</li>\n<li>Typische taken zijn Heat Furnace actief houden, overload gebruiken en Coal aan de Alliance Furnace doneren.</li>\n</ul>\n<h3>Farm Escape</h3><ul>\n<li>Veeg dieren naar de schuur; identieke dieren heffen elkaar op; de schuur kan maximaal 5 verschillende dieren bevatten.</li>\n<li>Dagelijkse stages geven Coal, Mithril, Gold en chests.</li>\n</ul>\n<h3>Treasure, swap, boost, promotie</h3><ul>\n<li>Snowland Treasures worden zichtbaar bij 0 °C grondtemperatuur; stuur scouts nadat het ijs smelt of breekt, maximaal 5 per dag.</li>\n<li>Level Swap wisselt twee hero-levels; sterren, ascension en skills blijven apart.</li>\n<li>Season Boosts komen van event castle skins, helden en decoraties; bonussen verlopen aan het einde van het seizoen.</li>\n<li>Hero Promotion focust op Crystal; gebruik S-shards en swap-vouchers niet blind.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-nl-4-expedition\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>4. Kingdom Expedition & War Declaration</h2>\n<h3>Expeditie</h3><ul>\n<li>Bouw eerst een Alliance Outpost voordat je in andere koninkrijken actief wordt. Leden moeten teams sturen om de bouw te versnellen.</li>\n<li>Na voltooiing kunnen Lords verplaatsen en Frost Mines binnen bereik bezetten. Bezette Frost Mines worden startpunten voor verbonden gebied.</li>\n<li>R4+ kan outposts bouwen. Maximaal 4 per alliantie, slechts 1 per koninkrijk, en gebouwde outposts kunnen niet worden verwijderd.</li>\n</ul>\n<h3>War Declaration</h3><ul>\n<li>Declarations zijn mogelijk op woensdag en zaterdag. R4+ kan steden in de seizoensgroep declareren.</li>\n<li>Een stad kan alleen worden gedeclareerd als een alliantie-Frost Mine verbonden is met de doelstad.</li>\n<li>Succesvolle bezetting geeft loot; de eerste buitenlandse bezetting geeft city loot die in de city list zichtbaar is.</li>\n</ul>\n<h3>Risico</h3><ul>\n<li>Zondag tot vrijdag kunnen blackland-kastelen door andere koninkrijken worden aangevallen. Op zaterdag kunnen vijandelijke kastelen in andere koninkrijken worden aangevallen.</li>\n<li>Oorlog, verdediging of diplomatie zijn leiderschapskeuzes; niet elke alliantie hoeft alles te gebruiken wat de regels toestaan.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-nl-5-strategy\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>5. Strategie, diplomatie & ervaring</h2>\n<h3>Kernstrategie</h3><ul>\n<li>Kracht komt uit route, warmte, Coal, Frost Mines, steden, class skills, stamina en duidelijke leiding.</li>\n<li>Frost Mines geven Coal en gebied. Steden geven Ice Crystals, warmte en strategische positie.</li>\n<li>Kastelen moeten warm, beschermd en verbonden staan; verspreide leden bevriezen sneller en reageren trager.</li>\n</ul>\n<h3>Diplomatie vs. oorlog</h3><ul>\n<li>Elke alliantie kiest haar eigen stijl. Oorlog brengt punten en loot, maar kost soldaten, healing, focus en diplomatie.</li>\n<li>Co-existentie, afspraken en korte bezettingsvensters kunnen efficiënter zijn dan constant aanvallen.</li>\n<li>Duidelijke regels voor tiles, blackland en city targets voorkomen onnodig conflict.</li>\n</ul>\n<h3>Eerste 4 weken</h3><ul>\n<li>Veel spelers onderschatten Coal, warmte, stamina en positionering. Juist deze basics bepalen of een alliantie operationeel blijft.</li>\n<li>Level-6 steden en hoge doelen vereisen vaak diplomatie of vroege planning. Laat pathing en late outposts kosten tempo.</li>\n<li>Iedereen kan bijdragen: verwarmen, doneren, monsters opruimen, treasures verzamelen, teams sturen, versterken en berichten lezen.</li>\n</ul>\n</article>\n<article class=\"chapter\" id=\"s1-nl-6-next\"><a class=\"toplink\" href=\"#guideTop\" title=\"Top\">↑</a><h2>6. Volgende 4 weken & endgame-plan</h2>\n<h3>Prioriteiten</h3><ul>\n<li>Zeker de best mogelijke stad- en Frost Mine-kwaliteit. Nuttige doelen vasthouden is belangrijker dan korte captures.</li>\n<li>Stabiliseer Coal-voorziening; zonder Coal vallen furnaces, overload en Cold Snap-taken stil.</li>\n<li>Ontwikkel Class EXP en class skills; normale skills blijven waardevol, seizoensskills kunnen resetten en terugbetalen.</li>\n<li>Bekijk boost-helden en Level Swap strategisch, vooral Crystal, Sera, Fenixia en Daphne.</li>\n</ul>\n<h3>Week 7/8</h3><ul>\n<li>Week 7 is waarschijnlijk de beslissende pushfase voor City Race, Ice Crystals, hoge steden en gebiedsveiligheid.</li>\n<li>Week 8 is settlement. Beloningen hangen af van alliantie-ranking; ongecoördineerde aanvallen kunnen meer schaden dan helpen.</li>\n<li>Royal City en Royal Furnace zijn prestigieus, maar korte beloningsvensters kunnen realistischer zijn dan permanent bezit.</li>\n</ul>\n<h3>Leadership checklist</h3><ul>\n<li>Post dagelijkse focus: warmte, stamina, Frost Mines, steden, treasures, Cold Snap, expeditie of oorlog.</li>\n<li>Verdeel R4/R5-taken: outposts, declarations, diplomatie, city list, beloningen, furnacepositie en member placement.</li>\n<li>Controleer vóór grote moves kalender, Frost Mine-connectie, temperatuur, Coal, stamina, diplomatie en fallback-plan.</li>\n</ul>\n</article>"},"s2Content":{"en":"<article class=\"chapter s2VerifiedHero\" id=\"s2-en-1-status\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge server\">Server-specific</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Season 2 - Desert Dynasty</h2>\n  <p>Season 2 is called <strong>Desert Dynasty</strong> and is structured as a <strong>56-day campaign</strong>. It moves the season focus from cold and furnace management toward desert development, Season Resistance, Red Copper, Sandflow Mines, Sand Beasts, Heroic Warriors, Greening Initiative and the later Dark Oil Battle.</p>\n  <div class=\"s2StatusPanel\">\n    <h3>Rollout status</h3>\n    <ul>\n      <li>Season 2 is released in server batches and does not start on every server at the same time.</li>\n      <li>The first rollout began on <strong>US 06/22/26 / EU 22.06.26</strong> for the first announced server groups.</li>\n      <li>The latest officially announced rollout in the current source set reaches <strong>Servers 193-224</strong>, announced for <strong>US 07/13/26 / EU 13.07.26</strong>.</li>\n      <li><strong>Server 353:</strong> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span> No official Season 2 start date is published in the current source set. Do not estimate it.</li>\n    </ul>\n  </div>\n  <div class=\"s2SystemCloud\">\n    <span>Tree of Life</span><span>Season Resistance</span><span>Season Quests</span><span>Red Copper</span><span>Composite Materials</span><span>Antibody Samples</span><span>Sandflow Mines</span><span>Sand Beasts</span><span>Desert Bazaar</span><span>Heroic Warriors</span><span>Greening Initiative</span><span>Desert Treasure</span><span>Chroma Shells</span><span>Dark Oil Battle</span><span>Seasonal Class Skills</span><span>Seasonal Artifact System</span>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-2-core\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Tree of Life, Resistance & Season Quests</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Tree of Life</h3><p>The Tree of Life is the central personal Season 2 building. Upgrading it increases Season Resistance for troops.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Resistance</h3><p>Season Resistance affects how effectively troops fight stronger desert monsters and how severe losses can become. It is not the same system as Season 1 furnace heating.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Quests</h3><p>Season 2 includes Main Quests, Side Quests and daily season rewards. Official guidance names <strong>325 daily points</strong> as the target to unlock all daily rewards.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-3-resources\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Resources & Exchange Systems</h2>\n  <table class=\"s2Table\"><tbody>\n    <tr><th>Red Copper</th><td>Main personal Season 2 resource for seasonal buildings and development. Sandflow Mines become an important source over time.</td></tr>\n    <tr><th>Composite Materials</th><td>Union-side seasonal resource used for seasonal Union development and buildings.</td></tr>\n    <tr><th>Antibody Samples</th><td>Union-side seasonal resource connected to seasonal Union development and building progress.</td></tr>\n    <tr><th>Sand Beast Scales</th><td>Rewards from defeated Sand Beasts. Used in the Desert Bazaar.</td></tr>\n    <tr><th>Chroma Shells</th><td>Used with Desert Treasure. Exact requirements and values must be checked in game because parts are visible only in official graphics.</td></tr>\n    <tr><th>Dark Oil</th><td>Later-season competition resource gained through controlled cities, Sandflow Mines and valuable objectives.</td></tr>\n  </tbody></table>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-4-map\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Map, Cities, Sandflow Mines & Royal City</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sandflow Mines</h3><p>Sandflow Mines matter for Red Copper production and later for Dark Oil competition. Their role changes as more Season 2 systems unlock.</p></section>\n    <section class=\"s2InfoCard\"><h3>Cities</h3><p>Cities are part of territorial control and can become relevant for Dark Oil production and season ranking.</p></section>\n    <section class=\"s2InfoCard\"><h3>Royal City</h3><p>Official hints mention an adjusted Royal City construction and occupation system. The current source set points to an important phase around <strong>Day 28</strong>, but the exact timing must be checked in the server's Season 2 calendar.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-5-pve\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Sand Beasts, Desert Bazaar & Desert Treasure</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sand Beasts</h3><p>Sand Beasts are central Season 2 PvE enemies. Defeating them grants Sand Beast Scales and other seasonal rewards.</p></section>\n    <section class=\"s2InfoCard\"><h3>Desert Bazaar</h3><p>The Desert Bazaar is the seasonal exchange connected to Sand Beast rewards. Exact item prices should only be entered after in-game verification.</p></section>\n    <section class=\"s2InfoCard\"><h3>Desert Treasure</h3><p>Desert Treasures appear in city areas after Season 2 begins. The system uses seasonal progress and Chroma Shells. Exact costs, rates and daily limits remain in-game verification points.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-6-union\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Heroic Warriors, Greening Initiative & Dark Oil</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Heroic Warriors</h3><p>Season 2 activates the Heroic Altar. Normal or fallen regular soldiers can be converted into Heroic Warriors, and another seasonal facility houses them.</p></section>\n    <section class=\"s2InfoCard\"><h3>Greening Initiative</h3><p>The Greening Initiative runs through the season and connects personal and shared progress while the desert is gradually restored.</p></section>\n    <section class=\"s2InfoCard\"><h3>Dark Oil Battle</h3><p>The Dark Oil Battle unlocks after a season milestone. Cities, Sandflow Mines and specific valuable objectives can contribute to Dark Oil production and Union season ranking.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-7-heroes\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Chakiss, Exclusive Gear & Season Boosts</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Chakiss Promotion</h3><ul><li>S-quality Chakiss can be promoted to S+ during Season 2.</li><li>Requirements include 5 Stars and Promotion Medals.</li><li>After promotion: quality becomes S+, hero level is retained, skills reset to Level 1 and invested Skill Book EXP is refunded.</li><li>The current source set also states a star reset to 3 Stars and refund handling for Honor Wall shards. Check the promotion screen before confirming.</li></ul></section>\n    <section class=\"s2InfoCard\"><h3>Season 2 Exclusive Gear</h3><table class=\"s2Table\"><tbody><tr><th>Day 4</th><td>Dragonic</td></tr><tr><th>Day 18</th><td>Andrew</td></tr><tr><th>Day 39</th><td>Belial</td></tr></tbody></table><p>These are the officially named new Season 2 Exclusive Gear heroes in the current source set. Do not add more from comments or speculation.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Boosts</h3><p>Season 2 includes temporary hero boosts against season monsters. Official notes mention Chakiss, Dragonic, Andrew and Belial, and a Week 3 note also names Sera, Fenixia, Daphne and Crystal with <strong>+5% monster damage</strong>.</p></section>\n  </div>\n  <p class=\"s2Note\">Sera, Fenixia and Daphne keep their Season 1 Exclusive Gear relevance. Sera's <strong>Realm Spirit</strong> is an appearance/skin for Exclusive Gear, not a fourth new Season 2 Exclusive Gear hero.</p>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-8-systems\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Class Skills, Artifacts & Medals</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Seasonal Class Skills</h3><p>Season 2 adds new class skills. The system is confirmed, but concrete effects are mainly shown in official graphics and must be checked in game before being listed as exact values.</p></section>\n    <section class=\"s2InfoCard\"><h3>Seasonal Artifact System</h3><p>Season 2 includes a revised Artifact system. The current official source set describes artifact categories such as Epic, Rare and Uncommon; complete rankings remain unconfirmed.</p></section>\n    <section class=\"s2InfoCard\"><h3>Universal Legendary Hero Medals</h3><p>The Week 4 official note announces universal legendary hero medals from Union achievement quests, with up to <strong>16</strong> mentioned in the current source set.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-9-awaiting\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Awaiting Official Confirmation</h2>\n  <ul class=\"s2AwaitList\">\n    <li>Server 353 Season 2 start date</li>\n    <li>Future rollout batches after Server 224</li>\n    <li>Exact duration and end date for Server 353</li>\n    <li>Exact Server 353 Dark Oil unlock timing</li>\n    <li>Exact Royal City timing for Server 353</li>\n    <li>Complete Class Skill effects and values</li>\n    <li>Complete Artifact list and ranking</li>\n    <li>Exact Desert Treasure costs, rates and daily limits</li>\n    <li>Exact Desert Bazaar prices</li>\n    <li>Any additional playable heroes beyond officially displayed in-game pools</li>\n  </ul>\n</article>\n\n<article class=\"chapter\" id=\"s2-en-10-source\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Source Status</h2>\n  <p><strong>Last updated: US 07/16/26 / EU 16.07.26</strong></p>\n  <table class=\"s2Table\"><tbody><tr><th>Official Information</th><td>Current official X-Clash Facebook posts and information visible in official graphics or in game.</td></tr><tr><th>Awaiting Official Confirmation</th><td>Not officially announced for Server 353, not fully visible in text, or only visible through comments/speculation.</td></tr></tbody></table>\n  <p class=\"s2Note\">Comment speculation is not treated as confirmed. Names or mechanics from comments are not added as facts.</p>\n</article>","de":"<article class=\"chapter s2VerifiedHero\" id=\"s2-de-1-status\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span> <span class=\"s2StatusBadge server\">Serverspezifisch</span> <span class=\"s2StatusBadge awaiting\">Wartet auf offizielle Bestätigung</span></div>\n  <h2>Season 2 - Desert Dynasty</h2>\n  <p>Season 2 heißt <strong>Desert Dynasty</strong> und ist als <strong>56-tägige Kampagne</strong> aufgebaut. Der Fokus verschiebt sich von Kälte und Ofenmanagement hin zu Wüstenentwicklung, Saison-Widerstand, Rotem Kupfer, Sandstromminen, Sandbestien, Heroischen Kriegern, Begrünungsinitiative und später dem Kampf um Dunkles Öl.</p>\n  <div class=\"s2StatusPanel\">\n    <h3>Rollout-Status</h3>\n    <ul>\n      <li>Season 2 wird in Servergruppen veröffentlicht und startet nicht gleichzeitig auf allen Servern.</li>\n      <li>Der erste Rollout begann am <strong>US 06/22/26 / EU 22.06.26</strong> für die ersten angekündigten Servergruppen.</li>\n      <li>Der aktuell offiziell angekündigte Rollout in diesem Quellenstand reicht bis <strong>Server 193-224</strong>, angekündigt für <strong>US 07/13/26 / EU 13.07.26</strong>.</li>\n      <li><strong>Server 353:</strong> <span class=\"s2StatusBadge awaiting\">Wartet auf offizielle Bestätigung</span> In diesem Quellenstand ist kein offizieller Season-2-Starttermin veröffentlicht. Nicht schätzen.</li>\n    </ul>\n  </div>\n  <div class=\"s2SystemCloud\">\n    <span>Tree of Life</span><span>Saison-Widerstand</span><span>Season Quests</span><span>Rotes Kupfer</span><span>Verbundmaterialien</span><span>Antikörperproben</span><span>Sandstromminen</span><span>Sandbestien</span><span>Wüstenbasar</span><span>Heroische Krieger</span><span>Begrünungsinitiative</span><span>Wüstenschatz</span><span>Chromaschalen</span><span>Dunkles Öl</span><span>Saison-Klassenskills</span><span>Saison-Artefaktsystem</span>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-2-core\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span></div>\n  <h2>Baum des Lebens, Widerstand & Saisonquests</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Baum des Lebens</h3><p>Der Baum des Lebens ist das zentrale persönliche Season-2-Gebäude. Sein Ausbau erhöht den Saison-Widerstand der Truppen.</p></section>\n    <section class=\"s2InfoCard\"><h3>Saison-Widerstand</h3><p>Saison-Widerstand beeinflusst, wie effektiv Truppen gegen stärkere Wüstenmonster kämpfen und wie schwer Verluste ausfallen können. Es ist nicht identisch mit dem Season-1-Ofenheizen.</p></section>\n    <section class=\"s2InfoCard\"><h3>Saisonquests</h3><p>Season 2 enthält Hauptquests, Nebenquests und tägliche Saisonbelohnungen. Offizielle Hinweise nennen <strong>325 tägliche Punkte</strong> als Ziel für alle Tagesbelohnungen.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-3-resources\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span></div>\n  <h2>Ressourcen & Tauschsysteme</h2>\n  <table class=\"s2Table\"><tbody>\n    <tr><th>Rotes Kupfer</th><td>Wichtige persönliche Season-2-Ressource für Saisongebäude und Ausbau. Sandstromminen werden im Verlauf eine wichtige Quelle.</td></tr>\n    <tr><th>Verbundmaterialien</th><td>Union-Ressource für saisonale Unionsentwicklung und Gebäude.</td></tr>\n    <tr><th>Antikörperproben</th><td>Union-Ressource für saisonale Unionsentwicklung und Gebäudefortschritt.</td></tr>\n    <tr><th>Sandbestien-Schuppen</th><td>Belohnung von besiegten Sandbestien. Wird im Wüstenbasar verwendet.</td></tr>\n    <tr><th>Chromaschalen</th><td>Werden beim Wüstenschatz verwendet. Exakte Anforderungen und Werte müssen im Spiel geprüft werden, weil Teile nur in offiziellen Grafiken sichtbar sind.</td></tr>\n    <tr><th>Dunkles Öl</th><td>Spätere Wettbewerbsressource durch kontrollierte Städte, Sandstromminen und wertvolle Ziele.</td></tr>\n  </tbody></table>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-4-map\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span> <span class=\"s2StatusBadge later\">Spätere Saison</span></div>\n  <h2>Karte, Städte, Sandstromminen & Königsstadt</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sandstromminen</h3><p>Sandstromminen sind für Rotes Kupfer und später für den Dunkles-Öl-Wettbewerb relevant. Ihre Rolle verändert sich, sobald weitere Season-2-Systeme freigeschaltet werden.</p></section>\n    <section class=\"s2InfoCard\"><h3>Städte</h3><p>Städte gehören zur Gebietskontrolle und können für Dunkles-Öl-Produktion und Saisonranking relevant werden.</p></section>\n    <section class=\"s2InfoCard\"><h3>Königsstadt</h3><p>Offizielle Hinweise nennen ein angepasstes Aufbau- und Besetzungssystem der Königsstadt. Der aktuelle Quellenstand verweist auf eine wichtige Phase um <strong>Tag 28</strong>; der exakte Zeitpunkt muss im Season-2-Kalender des Servers geprüft werden.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-5-pve\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span></div>\n  <h2>Sandbestien, Wüstenbasar & Wüstenschatz</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sandbestien</h3><p>Sandbestien sind zentrale Season-2-PvE-Gegner. Beim Besiegen erhält man Sandbestien-Schuppen und weitere saisonale Belohnungen.</p></section>\n    <section class=\"s2InfoCard\"><h3>Wüstenbasar</h3><p>Der Wüstenbasar ist der saisonale Tauschbereich für Sandbestien-Belohnungen. Exakte Preise sollten erst nach Ingame-Bestätigung eingetragen werden.</p></section>\n    <section class=\"s2InfoCard\"><h3>Wüstenschatz</h3><p>Wüstenschätze erscheinen nach Saisonbeginn in Stadtgebieten. Das System nutzt Saisonfortschritt und Chromaschalen. Exakte Kosten, Raten und Tageslimits bleiben Ingame-Prüfpunkte.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-6-union\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span> <span class=\"s2StatusBadge later\">Spätere Saison</span></div>\n  <h2>Heroische Krieger, Begrünungsinitiative & Dunkles Öl</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Heroische Krieger</h3><p>Season 2 aktiviert den Heroischen Altar. Normale beziehungsweise gefallene reguläre Soldaten können in Heroische Krieger umgewandelt werden; ein weiteres Saisongebäude beherbergt sie.</p></section>\n    <section class=\"s2InfoCard\"><h3>Begrünungsinitiative</h3><p>Die Begrünungsinitiative läuft über die Saison und verbindet persönlichen und gemeinsamen Fortschritt, während die Wüste schrittweise zurückgewonnen wird.</p></section>\n    <section class=\"s2InfoCard\"><h3>Dunkles Öl</h3><p>Der Kampf um Dunkles Öl wird nach einem Saisonmeilenstein freigeschaltet. Städte, Sandstromminen und bestimmte wertvolle Ziele können Dunkles Öl und das Union-Saisonranking beeinflussen.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-7-heroes\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span> <span class=\"s2StatusBadge awaiting\">Wartet auf offizielle Bestätigung</span></div>\n  <h2>Chakiss, Exklusive Ausrüstung & Saisonboosts</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Chakiss-Beförderung</h3><ul><li>Chakiss in S-Qualität kann während Season 2 zu S+ befördert werden.</li><li>Voraussetzungen sind 5 Sterne und Beförderungsmedaillen.</li><li>Nach der Beförderung: Qualität wird S+, Heldenlevel bleibt erhalten, Skills werden auf Stufe 1 zurückgesetzt und investierte Skillbuch-EXP wird erstattet.</li><li>Der aktuelle Quellenstand nennt außerdem einen Stern-Reset auf 3 Sterne und Erstattungsregeln für Ehrenwand-Splitter. Vor Bestätigung im Promotion-Screen prüfen.</li></ul></section>\n    <section class=\"s2InfoCard\"><h3>Season-2-Exklusive-Ausrüstung</h3><table class=\"s2Table\"><tbody><tr><th>Tag 4</th><td>Dragonic</td></tr><tr><th>Tag 18</th><td>Andrew</td></tr><tr><th>Tag 39</th><td>Belial</td></tr></tbody></table><p>Das sind im aktuellen Quellenstand die offiziell genannten neuen Season-2-Exclusive-Gear-Helden. Keine weiteren aus Kommentaren oder Spekulation ergänzen.</p></section>\n    <section class=\"s2InfoCard\"><h3>Saisonboosts</h3><p>Season 2 enthält temporäre Heldenboosts gegen Saisonmonster. Offizielle Hinweise nennen Chakiss, Dragonic, Andrew und Belial; ein Week-3-Hinweis nennt zusätzlich Sera, Fenixia, Daphne und Crystal mit <strong>+5% Monsterschaden</strong>.</p></section>\n  </div>\n  <p class=\"s2Note\">Sera, Fenixia und Daphne behalten ihre Season-1-Exclusive-Gear-Relevanz. Seras <strong>Realm Spirit</strong> ist eine Optik/Skin für exklusive Ausrüstung, kein vierter neuer Season-2-Exclusive-Gear-Held.</p>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-8-systems\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span> <span class=\"s2StatusBadge awaiting\">Wartet auf offizielle Bestätigung</span></div>\n  <h2>Klassenskills, Artefakte & Medaillen</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Saison-Klassenskills</h3><p>Season 2 bringt neue Klassenskills. Das System ist bestätigt, konkrete Effekte sind aber hauptsächlich in offiziellen Grafiken sichtbar und sollten vor exakten Zahlen im Spiel geprüft werden.</p></section>\n    <section class=\"s2InfoCard\"><h3>Saison-Artefaktsystem</h3><p>Season 2 enthält ein überarbeitetes Artefaktsystem. Der aktuelle offizielle Quellenstand beschreibt Kategorien wie Epic, Rare und Uncommon; vollständige Ranglisten sind nicht bestätigt.</p></section>\n    <section class=\"s2InfoCard\"><h3>Universelle legendäre Heldenmedaillen</h3><p>Der offizielle Week-4-Hinweis kündigt universelle legendäre Heldenmedaillen aus Unions-Erfolgsquests an; im aktuellen Quellenstand werden bis zu <strong>16</strong> genannt.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-9-awaiting\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge awaiting\">Wartet auf offizielle Bestätigung</span></div>\n  <h2>Wartet auf offizielle Bestätigung</h2>\n  <ul class=\"s2AwaitList\">\n    <li>Season-2-Startdatum für Server 353</li>\n    <li>Künftige Rollout-Batches nach Server 224</li>\n    <li>Exakte Dauer und Enddatum für Server 353</li>\n    <li>Exakter Dark-Oil-Unlock für Server 353</li>\n    <li>Exaktes Königsstadt-Timing für Server 353</li>\n    <li>Vollständige Klassenskill-Effekte und Werte</li>\n    <li>Vollständige Artefaktliste und Rangliste</li>\n    <li>Exakte Wüstenschatz-Kosten, Raten und Tageslimits</li>\n    <li>Exakte Wüstenbasar-Preise</li>\n    <li>Zusätzliche spielbare Helden außerhalb klar bestätigter Ingame-Pools</li>\n  </ul>\n</article>\n\n<article class=\"chapter\" id=\"s2-de-10-source\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Offizielle Information</span> <span class=\"s2StatusBadge awaiting\">Wartet auf offizielle Bestätigung</span></div>\n  <h2>Quellenstatus</h2>\n  <p><strong>Letzte Aktualisierung: US 07/16/26 / EU 16.07.2026</strong></p>\n  <table class=\"s2Table\"><tbody><tr><th>Offizielle Information</th><td>Aktuelle offizielle X-Clash-Facebook-Beiträge sowie Informationen aus offiziellen Grafiken oder dem Spiel.</td></tr><tr><th>Wartet auf offizielle Bestätigung</th><td>Nicht offiziell für Server 353 angekündigt, nicht vollständig als Text sichtbar oder nur aus Kommentaren/Spekulation erkennbar.</td></tr></tbody></table>\n  <p class=\"s2Note\">Kommentar-Spekulation wird nicht als bestätigt behandelt. Namen oder Mechaniken aus Kommentaren werden nicht als Fakten eingebaut.</p>\n</article>","es":"<article class=\"chapter s2VerifiedHero\" id=\"s2-es-1-status\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge server\">Server-specific</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Season 2 - Desert Dynasty</h2>\n  <p>Season 2 is called <strong>Desert Dynasty</strong> and is structured as a <strong>56-day campaign</strong>. It moves the season focus from cold and furnace management toward desert development, Season Resistance, Red Copper, Sandflow Mines, Sand Beasts, Heroic Warriors, Greening Initiative and the later Dark Oil Battle.</p>\n  <div class=\"s2StatusPanel\">\n    <h3>Rollout status</h3>\n    <ul>\n      <li>Season 2 is released in server batches and does not start on every server at the same time.</li>\n      <li>The first rollout began on <strong>US 06/22/26 / EU 22.06.26</strong> for the first announced server groups.</li>\n      <li>The latest officially announced rollout in the current source set reaches <strong>Servers 193-224</strong>, announced for <strong>US 07/13/26 / EU 13.07.26</strong>.</li>\n      <li><strong>Server 353:</strong> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span> No official Season 2 start date is published in the current source set. Do not estimate it.</li>\n    </ul>\n  </div>\n  <div class=\"s2SystemCloud\">\n    <span>Tree of Life</span><span>Season Resistance</span><span>Season Quests</span><span>Red Copper</span><span>Composite Materials</span><span>Antibody Samples</span><span>Sandflow Mines</span><span>Sand Beasts</span><span>Desert Bazaar</span><span>Heroic Warriors</span><span>Greening Initiative</span><span>Desert Treasure</span><span>Chroma Shells</span><span>Dark Oil Battle</span><span>Seasonal Class Skills</span><span>Seasonal Artifact System</span>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-2-core\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Tree of Life, Resistance & Season Quests</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Tree of Life</h3><p>The Tree of Life is the central personal Season 2 building. Upgrading it increases Season Resistance for troops.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Resistance</h3><p>Season Resistance affects how effectively troops fight stronger desert monsters and how severe losses can become. It is not the same system as Season 1 furnace heating.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Quests</h3><p>Season 2 includes Main Quests, Side Quests and daily season rewards. Official guidance names <strong>325 daily points</strong> as the target to unlock all daily rewards.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-3-resources\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Resources & Exchange Systems</h2>\n  <table class=\"s2Table\"><tbody>\n    <tr><th>Red Copper</th><td>Main personal Season 2 resource for seasonal buildings and development. Sandflow Mines become an important source over time.</td></tr>\n    <tr><th>Composite Materials</th><td>Union-side seasonal resource used for seasonal Union development and buildings.</td></tr>\n    <tr><th>Antibody Samples</th><td>Union-side seasonal resource connected to seasonal Union development and building progress.</td></tr>\n    <tr><th>Sand Beast Scales</th><td>Rewards from defeated Sand Beasts. Used in the Desert Bazaar.</td></tr>\n    <tr><th>Chroma Shells</th><td>Used with Desert Treasure. Exact requirements and values must be checked in game because parts are visible only in official graphics.</td></tr>\n    <tr><th>Dark Oil</th><td>Later-season competition resource gained through controlled cities, Sandflow Mines and valuable objectives.</td></tr>\n  </tbody></table>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-4-map\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Map, Cities, Sandflow Mines & Royal City</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sandflow Mines</h3><p>Sandflow Mines matter for Red Copper production and later for Dark Oil competition. Their role changes as more Season 2 systems unlock.</p></section>\n    <section class=\"s2InfoCard\"><h3>Cities</h3><p>Cities are part of territorial control and can become relevant for Dark Oil production and season ranking.</p></section>\n    <section class=\"s2InfoCard\"><h3>Royal City</h3><p>Official hints mention an adjusted Royal City construction and occupation system. The current source set points to an important phase around <strong>Day 28</strong>, but the exact timing must be checked in the server's Season 2 calendar.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-5-pve\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Sand Beasts, Desert Bazaar & Desert Treasure</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sand Beasts</h3><p>Sand Beasts are central Season 2 PvE enemies. Defeating them grants Sand Beast Scales and other seasonal rewards.</p></section>\n    <section class=\"s2InfoCard\"><h3>Desert Bazaar</h3><p>The Desert Bazaar is the seasonal exchange connected to Sand Beast rewards. Exact item prices should only be entered after in-game verification.</p></section>\n    <section class=\"s2InfoCard\"><h3>Desert Treasure</h3><p>Desert Treasures appear in city areas after Season 2 begins. The system uses seasonal progress and Chroma Shells. Exact costs, rates and daily limits remain in-game verification points.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-6-union\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Heroic Warriors, Greening Initiative & Dark Oil</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Heroic Warriors</h3><p>Season 2 activates the Heroic Altar. Normal or fallen regular soldiers can be converted into Heroic Warriors, and another seasonal facility houses them.</p></section>\n    <section class=\"s2InfoCard\"><h3>Greening Initiative</h3><p>The Greening Initiative runs through the season and connects personal and shared progress while the desert is gradually restored.</p></section>\n    <section class=\"s2InfoCard\"><h3>Dark Oil Battle</h3><p>The Dark Oil Battle unlocks after a season milestone. Cities, Sandflow Mines and specific valuable objectives can contribute to Dark Oil production and Union season ranking.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-7-heroes\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Chakiss, Exclusive Gear & Season Boosts</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Chakiss Promotion</h3><ul><li>S-quality Chakiss can be promoted to S+ during Season 2.</li><li>Requirements include 5 Stars and Promotion Medals.</li><li>After promotion: quality becomes S+, hero level is retained, skills reset to Level 1 and invested Skill Book EXP is refunded.</li><li>The current source set also states a star reset to 3 Stars and refund handling for Honor Wall shards. Check the promotion screen before confirming.</li></ul></section>\n    <section class=\"s2InfoCard\"><h3>Season 2 Exclusive Gear</h3><table class=\"s2Table\"><tbody><tr><th>Day 4</th><td>Dragonic</td></tr><tr><th>Day 18</th><td>Andrew</td></tr><tr><th>Day 39</th><td>Belial</td></tr></tbody></table><p>These are the officially named new Season 2 Exclusive Gear heroes in the current source set. Do not add more from comments or speculation.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Boosts</h3><p>Season 2 includes temporary hero boosts against season monsters. Official notes mention Chakiss, Dragonic, Andrew and Belial, and a Week 3 note also names Sera, Fenixia, Daphne and Crystal with <strong>+5% monster damage</strong>.</p></section>\n  </div>\n  <p class=\"s2Note\">Sera, Fenixia and Daphne keep their Season 1 Exclusive Gear relevance. Sera's <strong>Realm Spirit</strong> is an appearance/skin for Exclusive Gear, not a fourth new Season 2 Exclusive Gear hero.</p>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-8-systems\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Class Skills, Artifacts & Medals</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Seasonal Class Skills</h3><p>Season 2 adds new class skills. The system is confirmed, but concrete effects are mainly shown in official graphics and must be checked in game before being listed as exact values.</p></section>\n    <section class=\"s2InfoCard\"><h3>Seasonal Artifact System</h3><p>Season 2 includes a revised Artifact system. The current official source set describes artifact categories such as Epic, Rare and Uncommon; complete rankings remain unconfirmed.</p></section>\n    <section class=\"s2InfoCard\"><h3>Universal Legendary Hero Medals</h3><p>The Week 4 official note announces universal legendary hero medals from Union achievement quests, with up to <strong>16</strong> mentioned in the current source set.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-9-awaiting\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Awaiting Official Confirmation</h2>\n  <ul class=\"s2AwaitList\">\n    <li>Server 353 Season 2 start date</li>\n    <li>Future rollout batches after Server 224</li>\n    <li>Exact duration and end date for Server 353</li>\n    <li>Exact Server 353 Dark Oil unlock timing</li>\n    <li>Exact Royal City timing for Server 353</li>\n    <li>Complete Class Skill effects and values</li>\n    <li>Complete Artifact list and ranking</li>\n    <li>Exact Desert Treasure costs, rates and daily limits</li>\n    <li>Exact Desert Bazaar prices</li>\n    <li>Any additional playable heroes beyond officially displayed in-game pools</li>\n  </ul>\n</article>\n\n<article class=\"chapter\" id=\"s2-es-10-source\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Source Status</h2>\n  <p><strong>Last updated: US 07/16/26 / EU 16.07.26</strong></p>\n  <table class=\"s2Table\"><tbody><tr><th>Official Information</th><td>Current official X-Clash Facebook posts and information visible in official graphics or in game.</td></tr><tr><th>Awaiting Official Confirmation</th><td>Not officially announced for Server 353, not fully visible in text, or only visible through comments/speculation.</td></tr></tbody></table>\n  <p class=\"s2Note\">Comment speculation is not treated as confirmed. Names or mechanics from comments are not added as facts.</p>\n</article>","br":"<article class=\"chapter s2VerifiedHero\" id=\"s2-br-1-status\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge server\ -source\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Source Status</h2>\n  <p><strong>Last updated: US 07/16/26 / EU 16.07.26</strong></p>\n  <table class=\"s2Table\"><tbody><tr><th>Official Information</th><td>Current official X-Clash Facebook posts and information visible in official graphics or in game.</td></tr><tr><th>Awaiting Official Confirmation</th><td>Not officially announced for Server 353, not fully visible in text, or only visible through comments/speculation.</td></tr></tbody></table>\n  <p class=\"s2Note\">Comment speculation is not treated as confirmed. Names or mechanics from comments are not added as facts.</p>\n</article>","gr":"<article class=\"chapter s2VerifiedHero\" id=\"s2-gr-1-status\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge server\">Server-specific</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Season 2 - Desert Dynasty</h2>\n  <p>Season 2 is called <strong>Desert Dynasty</strong> and is structured as a <strong>56-day campaign</strong>. It moves the season focus from cold and furnace management toward desert development, Season Resistance, Red Copper, Sandflow Mines, Sand Beasts, Heroic Warriors, Greening Initiative and the later Dark Oil Battle.</p>\n  <div class=\"s2StatusPanel\">\n    <h3>Rollout status</h3>\n    <ul>\n      <li>Season 2 is released in server batches and does not start on every server at the same time.</li>\n      <li>The first rollout began on <strong>US 06/22/26 / EU 22.06.26</strong> for the first announced server groups.</li>\n      <li>The latest officially announced rollout in the current source set reaches <strong>Servers 193-224</strong>, announced for <strong>US 07/13/26 / EU 13.07.26</strong>.</li>\n      <li><strong>Server 353:</strong> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span> No official Season 2 start date is published in the current source set. Do not estimate it.</li>\n    </ul>\n  </div>\n  <div class=\"s2SystemCloud\">\n    <span>Tree of Life</span><span>Season Resistance</span><span>Season Quests</span><span>Red Copper</span><span>Composite Materials</span><span>Antibody Samples</span><span>Sandflow Mines</span><span>Sand Beasts</span><span>Desert Bazaar</span><span>Heroic Warriors</span><span>Greening Initiative</span><span>Desert Treasure</span><span>Chroma Shells</span><span>Dark Oil Battle</span><span>Seasonal Class Skills</span><span>Seasonal Artifact System</span>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-gr-2-core\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Tree of Life, Resistance & Season Quests</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Tree of Life</h3><p>The Tree of Life is the central personal Season 2 building. Upgrading it increases Season Resistance for troops.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Resistance</h3><p>Season Resistance affects how effectively troops fight stronger desert monsters and how severe losses can become. It is not the same system as Season 1 furnace heating.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Quests</h3><p>Season 2 includes Main Quests, Side Quests and daily season rewards. Official guidance names <strong>325 daily points</strong> as the target to unlock all daily rewards.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-gr-3-resources\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Resources & Exchange Systems</h2>\n  <table class=\"s2Table\"><tbody>\n    <tr><th>Red Copper</th><td>Main personal Season 2 resource for seasonal buildings and development. Sandflow Mines become an important source over time.</td></tr>\n    <tr><th>Composite Materials</th><td>Union-side seasonal resource used for seasonal Union development and buildings.</td></tr>\n    <tr><th>Antibody Samples</th><td>Union-side seasonal resource connected to seasonal Union development and building progress.</td></tr>\n    <tr><th>Sand Beast Scales</th><td>Rewards from defeated Sand Beasts. Used in the Desert Bazaar.</td></tr>\n    <tr><th>Chroma Shells</th><td>Used with Desert Treasure. Exact requirements and values must be checked in game because parts are visible only in official graphics.</td></tr>\n    <tr><th>Dark Oil</th><td>Later-season competition resource gained through controlled cities, Sandflow Mines and valuable objectives.</td></tr>\n  </tbody></table>\n</article>\n\n<article class=\"chapter\" id=\"s2-gr-4-map\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Map, Cities, Sandflow Mines & Royal City</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sandflow Mines</h3><p>Sandflow Mines matter for Red Copper production and later for Dark Oil competition. Their role changes as more Season 2 systems unlock.</p></section>\n    <section class=\"s2InfoCard\"><h3>Cities</h3><p>Cities are part of territorial control and can become relevant for Dark Oil production and season ranking.</p></section>\n    <section class=\"s2InfoCard\"><h3>Royal City</h3><p>Official hints mention an adjusted Royal City construction and occupation system. The current source set points to an important phase around <strong>Day 28</strong>, but the exact timing must be checked in the server's Season 2 calendar.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-gr-5-pve\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Sand Beasts, Desert  server\">Server-specific</span> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span></div>\n  <h2>Season 2 - Desert Dynasty</h2>\n  <p>Season 2 is called <strong>Desert Dynasty</strong> and is structured as a <strong>56-day campaign</strong>. It moves the season focus from cold and furnace management toward desert development, Season Resistance, Red Copper, Sandflow Mines, Sand Beasts, Heroic Warriors, Greening Initiative and the later Dark Oil Battle.</p>\n  <div class=\"s2StatusPanel\">\n    <h3>Rollout status</h3>\n    <ul>\n      <li>Season 2 is released in server batches and does not start on every server at the same time.</li>\n      <li>The first rollout began on <strong>US 06/22/26 / EU 22.06.26</strong> for the first announced server groups.</li>\n      <li>The latest officially announced rollout in the current source set reaches <strong>Servers 193-224</strong>, announced for <strong>US 07/13/26 / EU 13.07.26</strong>.</li>\n      <li><strong>Server 353:</strong> <span class=\"s2StatusBadge awaiting\">Awaiting Official Confirmation</span> No official Season 2 start date is published in the current source set. Do not estimate it.</li>\n    </ul>\n  </div>\n  <div class=\"s2SystemCloud\">\n    <span>Tree of Life</span><span>Season Resistance</span><span>Season Quests</span><span>Red Copper</span><span>Composite Materials</span><span>Antibody Samples</span><span>Sandflow Mines</span><span>Sand Beasts</span><span>Desert Bazaar</span><span>Heroic Warriors</span><span>Greening Initiative</span><span>Desert Treasure</span><span>Chroma Shells</span><span>Dark Oil Battle</span><span>Seasonal Class Skills</span><span>Seasonal Artifact System</span>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-pl-2-core\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Tree of Life, Resistance & Season Quests</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Tree of Life</h3><p>The Tree of Life is the central personal Season 2 building. Upgrading it increases Season Resistance for troops.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Resistance</h3><p>Season Resistance affects how effectively troops fight stronger desert monsters and how severe losses can become. It is not the same system as Season 1 furnace heating.</p></section>\n    <section class=\"s2InfoCard\"><h3>Season Quests</h3><p>Season 2 includes Main Quests, Side Quests and daily season rewards. Official guidance names <strong>325 daily points</strong> as the target to unlock all daily rewards.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-pl-3-resources\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Resources & Exchange Systems</h2>\n  <table class=\"s2Table\"><tbody>\n    <tr><th>Red Copper</th><td>Main personal Season 2 resource for seasonal buildings and development. Sandflow Mines become an important source over time.</td></tr>\n    <tr><th>Composite Materials</th><td>Union-side seasonal resource used for seasonal Union development and buildings.</td></tr>\n    <tr><th>Antibody Samples</th><td>Union-side seasonal resource connected to seasonal Union development and building progress.</td></tr>\n    <tr><th>Sand Beast Scales</th><td>Rewards from defeated Sand Beasts. Used in the Desert Bazaar.</td></tr>\n    <tr><th>Chroma Shells</th><td>Used with Desert Treasure. Exact requirements and values must be checked in game because parts are visible only in official graphics.</td></tr>\n    <tr><th>Dark Oil</th><td>Later-season competition resource gained through controlled cities, Sandflow Mines and valuable objectives.</td></tr>\n  </tbody></table>\n</article>\n\n<article class=\"chapter\" id=\"s2-pl-4-map\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Map, Cities, Sandflow Mines & Royal City</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sandflow Mines</h3><p>Sandflow Mines matter for Red Copper production and later for Dark Oil competition. Their role changes as more Season 2 systems unlock.</p></section>\n    <section class=\"s2InfoCard\"><h3>Cities</h3><p>Cities are part of territorial control and can become relevant for Dark Oil production and season ranking.</p></section>\n    <section class=\"s2InfoCard\"><h3>Royal City</h3><p>Official hints mention an adjusted Royal City construction and occupation system. The current source set points to an important phase around <strong>Day 28</strong>, but the exact timing must be checked in the server's Season 2 calendar.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-pl-5-pve\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span></div>\n  <h2>Sand Beasts, Desert Bazaar & Desert Treasure</h2>\n  <div class=\"s2InfoGrid\">\n    <section class=\"s2InfoCard\"><h3>Sand Beasts</h3><p>Sand Beasts are central Season 2 PvE enemies. Defeating them grants Sand Beast Scales and other seasonal rewards.</p></section>\n    <section class=\"s2InfoCard\"><h3>Desert Bazaar</h3><p>The Desert Bazaar is the seasonal exchange connected to Sand Beast rewards. Exact item prices should only be entered after in-game verification.</p></section>\n    <section class=\"s2InfoCard\"><h3>Desert Treasure</h3><p>Desert Treasures appear in city areas after Season 2 begins. The system uses seasonal progress and Chroma Shells. Exact costs, rates and daily limits remain in-game verification points.</p></section>\n  </div>\n</article>\n\n<article class=\"chapter\" id=\"s2-pl-6-union\">\n  <div class=\"chapterKicker\"><span class=\"s2StatusBadge confirmed\">Official Information</span> <span class=\"s2StatusBadge later\">Later Season</span></div>\n  <h2>Heroic Warriors, Greening
